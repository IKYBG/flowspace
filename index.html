<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowSpace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --theme-c1-rgb: 100, 120, 255;
      --theme-c2-rgb: 160, 100, 255;
      --theme-c1: rgb(100, 120, 255);
      --theme-c2: rgb(160, 100, 255);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #07070d;
      color: rgba(248, 246, 252, 0.95);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 70% 55% at var(--bg-g1-x, 18%) var(--bg-g1-y, 15%), var(--bg-g1, rgba(100, 120, 255, 0.07)) 0%, transparent 65%), radial-gradient(ellipse 55% 45% at var(--bg-g2-x, 82%) var(--bg-g2-y, 82%), var(--bg-g2, rgba(160, 100, 255, 0.05)) 0%, transparent 65%);
      transition: background 1.1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.055) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.5;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.97);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes widgetSettle {
      0% {
        transform: scale(1.04);
      }

      55% {
        transform: scale(0.978);
      }

      80% {
        transform: scale(1.008);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes handleIn {
      from {
        transform: scale(0.4);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes selRingIn {
      from {
        opacity: 0;
        transform: scale(0.97);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes dragHandlePulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
      }

      50% {
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0);
      }
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ── Toast system ───────────────────────────────────────────── */
    @keyframes toastIn {
      from { transform: translateY(18px) scale(0.96); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes toastOut {
      from { transform: translateY(0) scale(1); opacity: 1; }
      to   { transform: translateY(12px) scale(0.96); opacity: 0; }
    }
    @keyframes toastProgress {
      from { width: 100%; }
      to   { width: 0%; }
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.85);
      }
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
    }

    input,
    button,
    select,
    textarea {
      font-family: inherit;
    }

    input::placeholder {
      color: rgba(248, 246, 252, 0.22);
    }

    /* ── Crystallization Reveal ─────────────────────────────────────── */
    .cr-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #07070d;
    }

    .cr-halo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 220px;
    }

    .cr-halo {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%,
          rgba(var(--theme-c1-rgb, 100, 120, 255), 0.26) 0%,
          rgba(var(--theme-c2-rgb, 160, 100, 255), 0.14) 44%,
          transparent 72%);
      box-shadow:
        inset 0 0 0 1px rgba(var(--theme-c1-rgb, 100, 120, 255), 0.24),
        0 0 70px rgba(var(--theme-c1-rgb, 100, 120, 255), 0.13),
        0 0 130px rgba(var(--theme-c2-rgb, 160, 100, 255), 0.08);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      will-change: transform, opacity;
    }

    .cr-logo-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      will-change: transform, opacity;
    }

    .cr-logo {
      width: 54px;
      height: 54px;
      fill: none;
      stroke: var(--theme-c1, #a5b8ff);
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 16px rgba(var(--theme-c1-rgb, 100, 120, 255), 0.55));
    }

    .cr-wordmark {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.04em;
      color: rgba(248, 246, 252, 0.95);
    }

    /* CSS-only fallback (no GSAP) */
    .cr-overlay.cr-css-anim .cr-logo-wrap {
      animation: crLogoIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .cr-overlay.cr-css-anim .cr-halo {
      animation: crHaloPulse 0.56s ease-out both;
    }

    @keyframes crLogoIn {
      from {
        opacity: 0;
        transform: scale(0.92);
        filter: blur(8px);
      }

      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0px);
      }
    }

    @keyframes crHaloPulse {
      0% {
        opacity: 0;
        transform: scale(0.85);
      }

      40% {
        opacity: 0.6;
        transform: scale(1.12);
      }

      100% {
        opacity: 0;
        transform: scale(1.62);
      }
    }

    /* Reduced-motion: skip the overlay entirely */
    @media (prefers-reduced-motion: reduce) {
      .cr-overlay {
        display: none;
      }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>

  <script>
    /* ── Supabase client + full sync layer ─────────────────────────────────
       Auth + persistence for ALL user data: tasks, notes, widgets, theme,
       style, images, sessions.  Local-first with real-time cross-device sync
       via Supabase Realtime (postgres_changes).                               */
    const SUPABASE_URL = 'https://qlukumjqgagrukbavtvg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsdWt1bWpxZ2FncnVrYmF2dHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTk5NTEsImV4cCI6MjA5Mjc5NTk1MX0.fOgW1587adYgOUb2n3_0E-8XOYgOJNOI9b3bJ3VJRLs';

    const _fsSb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, storageKey: 'fs_sb_session' }
    });
    window._fsSb = _fsSb;
    window._fsSbUser = null;
    window._fsRealtimeChannel = null;
    window._fsSessionChannel = null;

    /* All localStorage keys that trigger a sync push */
    const SYNC_KEYS = ['fs_tasks', 'fs_notes', 'fs_widgets', 'fs_onboarded',
                       'fs_bgtheme', 'fs_custom_bg', 'fs_widget_style'];

    /* Raw setItem/removeItem that bypass our sync patch */
    const _fsOrigSetItem = Storage.prototype.setItem;
    const _fsOrigRemoveItem = Storage.prototype.removeItem;
    function _fsRawSet(k, v) { _fsOrigSetItem.call(localStorage, k, v); }
    function _fsRawRemove(k) { _fsOrigRemoveItem.call(localStorage, k); }

    /* Flag to prevent push-back loops when seeding from remote */
    let _fsIgnorePush = false;

    async function _fsLoadRemote(userId) {
      try {
        const { data, error } = await _fsSb
          .from('user_data')
          .select('tasks, notes, widgets, name, onboarded, bg_theme, custom_bg, widget_style, images, email')
          .eq('user_id', userId)
          .maybeSingle();
        if (error) { console.warn('[fs] load remote failed', error); return null; }
        return data;
      } catch (e) { console.warn('[fs] load remote threw', e); return null; }
    }
    window._fsLoadRemote = _fsLoadRemote;

    /* Replace local cache with remote payload */
    function _fsSeedLocalFromRemote(remote) {
      _fsIgnorePush = true;

      if (remote && remote.tasks != null) _fsRawSet('fs_tasks', JSON.stringify(remote.tasks));
      else _fsRawRemove('fs_tasks');
      if (remote && remote.notes != null) _fsRawSet('fs_notes', String(remote.notes));
      else _fsRawRemove('fs_notes');
      if (remote && remote.widgets != null) _fsRawSet('fs_widgets', JSON.stringify(remote.widgets));
      else _fsRawRemove('fs_widgets');
      if (remote && remote.onboarded) _fsRawSet('fs_onboarded', '1');
      else _fsRawRemove('fs_onboarded');

      /* Theme & style */
      if (remote && remote.bg_theme != null) _fsRawSet('fs_bgtheme', remote.bg_theme);
      else _fsRawRemove('fs_bgtheme');
      if (remote && remote.custom_bg != null) _fsRawSet('fs_custom_bg', JSON.stringify(remote.custom_bg));
      else _fsRawRemove('fs_custom_bg');
      if (remote && remote.widget_style != null) _fsRawSet('fs_widget_style', JSON.stringify(remote.widget_style));
      else _fsRawRemove('fs_widget_style');

      /* Images – clear old keys then restore from remote */
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.startsWith('fs_img_')) _fsRawRemove(k);
      }
      if (remote && remote.images && typeof remote.images === 'object') {
        Object.entries(remote.images).forEach(([k, v]) => _fsRawSet(k, v));
      }

      setTimeout(() => { _fsIgnorePush = false; }, 2000);
    }
    window._fsSeedLocalFromRemote = _fsSeedLocalFromRemote;

    /* Debounced upsert of ALL localStorage values into user_data */
    let _fsPushTimer = null;
    async function _fsFlushPush() {
      const u = window._fsSbUser;
      if (!u) return;
      const payload = { user_id: u.id, updated_at: new Date().toISOString() };

      try { const v = localStorage.getItem('fs_tasks');   if (v != null) payload.tasks = JSON.parse(v); } catch (_) { }
      try { const v = localStorage.getItem('fs_notes');   if (v != null) payload.notes = v; } catch (_) { }
      try { const v = localStorage.getItem('fs_widgets'); if (v != null) payload.widgets = JSON.parse(v); } catch (_) { }
      payload.onboarded = localStorage.getItem('fs_onboarded') === '1';

      /* Theme & style */
      const bg = localStorage.getItem('fs_bgtheme');
      if (bg != null) payload.bg_theme = bg;
      try { const v = localStorage.getItem('fs_custom_bg'); if (v != null) payload.custom_bg = JSON.parse(v); } catch (_) { }
      try { const v = localStorage.getItem('fs_widget_style'); if (v != null) payload.widget_style = JSON.parse(v); } catch (_) { }

      /* Images – aggregate all fs_img_* keys */
      const images = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('fs_img_')) images[k] = localStorage.getItem(k);
      }
      payload.images = images;

      const { error } = await _fsSb.from('user_data').upsert(payload, { onConflict: 'user_id' });
      if (error) console.warn('[fs] push failed', error);
    }
    window._fsFlushPush = _fsFlushPush;

    /* Monkey-patch localStorage.setItem — catches all synced keys + image keys */
    Storage.prototype.setItem = function (key, value) {
      _fsOrigSetItem.call(this, key, value);
      if (this === localStorage && window._fsSbUser && !_fsIgnorePush
          && (SYNC_KEYS.includes(key) || key.startsWith('fs_img_'))) {
        clearTimeout(_fsPushTimer);
        _fsPushTimer = setTimeout(_fsFlushPush, 800);
      }
    };

    /* Flush pending writes when the tab is closing */
    window.addEventListener('beforeunload', () => {
      if (_fsPushTimer) { clearTimeout(_fsPushTimer); _fsFlushPush(); }
    });

    /* ── Realtime: cross-device live sync for user_data ─────────────────── */
    function _fsStartRealtime(userId) {
      _fsStopRealtime();
      const ch = _fsSb.channel('user-data-sync')
        .on('postgres_changes', {
          event: 'UPDATE', schema: 'public', table: 'user_data',
          filter: 'user_id=eq.' + userId
        }, payload => {
          if (_fsIgnorePush) return;
          _fsSeedLocalFromRemote(payload.new);
          window.dispatchEvent(new CustomEvent('fs-remote-update', { detail: payload.new }));
        })
        .subscribe();
      window._fsRealtimeChannel = ch;
    }
    function _fsStopRealtime() {
      if (window._fsRealtimeChannel) {
        _fsSb.removeChannel(window._fsRealtimeChannel);
        window._fsRealtimeChannel = null;
      }
    }
    window._fsStartRealtime = _fsStartRealtime;
    window._fsStopRealtime = _fsStopRealtime;

    /* ── Realtime: session invites for Together mode ────────────────────── */
    function _fsStartSessionRealtime(userId) {
      _fsStopSessionRealtime();
      const ch = _fsSb.channel('session-sync')
        .on('postgres_changes', {
          event: '*', schema: 'public', table: 'sessions',
          filter: 'friend_id=eq.' + userId
        }, payload => {
          if (payload.eventType === 'INSERT' && payload.new.active) {
            window.dispatchEvent(new CustomEvent('fs-session-invite', { detail: payload.new }));
          }
          if (payload.eventType === 'UPDATE' && !payload.new.active) {
            window.dispatchEvent(new CustomEvent('fs-session-end', { detail: payload.new }));
          }
        })
        .subscribe();
      window._fsSessionChannel = ch;
    }
    function _fsStopSessionRealtime() {
      if (window._fsSessionChannel) {
        _fsSb.removeChannel(window._fsSessionChannel);
        window._fsSessionChannel = null;
      }
    }
    window._fsStartSessionRealtime = _fsStartSessionRealtime;
    window._fsStopSessionRealtime = _fsStopSessionRealtime;

    /* ── Helper: look up a FlowSpace user by email ─────────────────────── */
    async function _fsLookupUserByEmail(email) {
      try {
        const trimmed = email.trim().toLowerCase();
        const { data, error } = await _fsSb
          .from('user_data')
          .select('user_id, name, email')
          .ilike('email', trimmed)
          .maybeSingle();
        if (error) { console.warn('[fs] email lookup error:', error); return null; }
        if (!data) { console.warn('[fs] no user found for email:', trimmed); return null; }
        return { id: data.user_id, name: data.name || trimmed.split('@')[0], email: data.email,
                 initial: (data.name || '?')[0].toUpperCase(),
                 color: '#4ade80' };
      } catch (e) { console.warn('[fs] email lookup threw:', e); return null; }
    }
    window._fsLookupUserByEmail = _fsLookupUserByEmail;
  </script>

                    </div>

                    <input type="range" min={15} max={120} step={5} value={cfg.duration} onChange={e => setCfg(c => ({ ...c, duration: +e.target.value }))} style={{ width: '100%', accentColor: acol }} />
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8 }}>
                      <Sub ch="15 min" /><Sub ch="60 min" /><Sub ch="2 h" />
                    </div>
                  </div>
                  <div>
                    <span style={{ fontSize: 13, fontWeight: 600, display: 'block', marginBottom: 12 }}>Musique</span>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                      {MUSIC.map(m => (
                        <button key={m} onClick={() => setCfg(c => ({ ...c, music: m }))}
                          style={{ background: cfg.music === m ? `${acol}18` : 'rgba(255,255,255,0.04)', border: `1px solid ${cfg.music === m ? `${acol}44` : 'rgba(255,255,255,0.07)'}`, borderRadius: 99, padding: '7px 16px', cursor: 'pointer', color: cfg.music === m ? acol : T.muted, fontSize: 11, fontWeight: 600, fontFamily: T.font, transition: 'all 0.2s' }}>

                      ))}

                      <span style={{ fontSize: 13, fontWeight: 600, display: 'block' }}>Pauses Pomodoro</span>

                    </div>
                    <div onClick={() => setCfg(c => ({ ...c, breaks: !c.breaks }))} style={{ width: 44, height: 24, borderRadius: 99, background: cfg.breaks ? acol : 'rgba(255,255,255,0.1)', cursor: 'pointer', position: 'relative', transition: 'background 0.3s', flexShrink: 0 }}>
                      <div style={{ position: 'absolute', top: 3, left: cfg.breaks ? 21 : 3, width: 18, height: 18, borderRadius: '50%', background: '#fff', transition: 'left 0.3s', boxShadow: '0 1px 4px rgba(0,0,0,0.3)' }} />
                    </div>
                  </div>
                </div>
              )}

              {/* ── Step 3: Launch ── */}
              {step === 3 && (
                <div style={{ paddingBottom: 28 }}>
                  {/* Mode banner */}
                  <div style={{ background: `${acol}0e`, border: `1px solid ${acol}22`, borderRadius: 20, padding: '22px 24px', marginBottom: 18, display: 'flex', alignItems: 'center', gap: 16 }}>
                    <div style={{ width: 52, height: 52, borderRadius: 16, background: `${acol}18`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>

                        : <svg width={28} height={24} viewBox="0 0 30 24" fill="none"><circle cx={10} cy={8} r={4} stroke={acol} strokeWidth={1.8} /><path d="M2 20c0-4 3.6-6.5 8-6.5" stroke={acol} strokeWidth={1.8} strokeLinecap="round" /><circle cx={20} cy={8} r={4} stroke={acol} strokeWidth={1.8} /><path d="M28 20c0-4-3.6-6.5-8-6.5s-8 2.5-8 6.5" stroke={acol} strokeWidth={1.8} strokeLinecap="round" /></svg>}
                    </div>
                    <div>
                      <div style={{ fontSize: 17, fontWeight: 800, fontFamily: T.display, letterSpacing: '-0.02em', color: T.text }}>{mode === 'solo' ? 'Session Solo' : 'Session Together'}</div>

                  <div style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.06)', borderRadius: 16, overflow: 'hidden' }}>

                      { k: 'Durée', v: `${cfg.duration} minutes` },
                      { k: 'Musique', v: cfg.music },
                      { k: 'Pauses', v: cfg.breaks ? 'Pomodoro · 5 min' : 'Aucune' },
                    ].map((r, i, arr) => (
                      <div key={r.k} style={{ display: 'flex', justifyContent: 'space-between', padding: '13px 20px', borderBottom: i < arr.length - 1 ? '1px solid rgba(255,255,255,0.04)' : 'none', alignItems: 'center' }}>
                        <Sub ch={r.k} /><span style={{ fontSize: 12, fontWeight: 600, color: T.text }}>{r.v}</span>
                      </div>

                  </div>

              )}

            <div style={{ padding: '20px 36px 28px', display: 'flex', justifyContent: 'space-between', borderTop: '1px solid rgba(255,255,255,0.05)' }}>
              {step > 1
                ? <button onClick={() => setStep(s => s - 1)} style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 12, padding: '11px 22px', color: T.muted, fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: T.font, transition: 'all 0.15s' }}

                  onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.05)'; e.currentTarget.style.color = T.muted; }}>← Retour</button>
                : <div />}
              <button onClick={handleNext}
                disabled={step === 1 && !step1Ready}
                style={{ background: step === 3 ? `linear-gradient(135deg,${acol},${mode === 'together' ? '#34d399' : '#c4b5fd'})` : `${acol}`, border: 'none', borderRadius: 12, padding: '11px 28px', color: '#07070d', fontSize: 12, fontWeight: 700, cursor: step === 1 && !step1Ready ? 'not-allowed' : 'pointer', fontFamily: T.font, boxShadow: step === 3 ? `0 0 28px ${acol}44` : `0 0 18px ${acol}33`, opacity: step === 1 && !step1Ready ? 0.45 : 1, transition: 'all 0.22s' }}>
                {step === 3 ? '▶  Démarrer' : 'Continuer →'}

          </div>
        </div>
      );
    }

    window.SessionModal = SessionModal;
  </script>

  <script type="text/babel">
    const { useState: _uSB } = React;

      const STEPS = [
        {
          kicker: 'Welcome', title: 'Your space,\nyour rules.',

        {
          kicker: 'Layout', title: 'Drag. Drop.\nMake it yours.',
          body: 'Every widget is resizable and repositionable. Build the exact layout your workflow needs.',

                <div style={{ gridRow: '1/3', background: `${c1(0.078)}`, border: `1.5px solid ${c1(0.267)}`, borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <span style={{ fontFamily: T.display, fontWeight: 800, fontSize: 32, color: T.c1, letterSpacing: '-0.04em' }}>09:41</span>

                <div style={{ background: 'rgba(255,255,255,0.04)', border: '1px dashed rgba(255,255,255,0.12)', borderRadius: 14 }} />
                <div style={{ background: 'rgba(255,255,255,0.04)', border: '1px dashed rgba(255,255,255,0.12)', borderRadius: 14 }} />

              <div style={{ position: 'absolute', left: 'calc(2/3 * 100% + 2px)', bottom: '2px', width: 12, height: 12, background: T.c1, borderRadius: 3, boxShadow: `0 0 10px ${c1(0.533)}` }} />

          body: 'Launch a timed session, block distractions, and track your consistency — one day at a time.',
          visual: (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16 }}>
              <div style={{ position: 'relative', width: 140, height: 140 }}>
                <Ring value={0.68} size={140} stroke={3.5} color={T.c1}>
                  <div style={{ textAlign: 'center' }}>
                    <div style={{ fontFamily: T.display, fontWeight: 800, fontSize: 32, letterSpacing: '-0.04em' }}>24:00</div>
                    <Sub ch="focus" style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.1em', marginTop: 3 }} />
                  </div>
                </Ring>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                {[...Array(4)].map((_, i) => <div key={i} style={{ width: 8, height: 8, borderRadius: '50%', background: i < 2 ? T.c1 : 'rgba(255,255,255,0.1)', boxShadow: i < 2 ? `0 0 6px ${c1(0.533)}` : '' }} />)}
              </div>
            </div>
          ),
        },
      ];
      const cur = STEPS[step];
      return (
        <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
          <div style={{ position: 'absolute', width: 500, height: 500, borderRadius: '50%', background: `radial-gradient(circle, ${c1(0.039)} 0%, transparent 70%)`, top: '50%', left: '50%', transform: 'translate(-50%,-50%)', pointerEvents: 'none' }} />
          <div style={{ width: '100%', maxWidth: 480, padding: '0 40px', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>

              {STEPS.map((_, i) => (
                <div key={i} onClick={() => setStep(i)} style={{ height: 3, width: i === step ? 32 : 8, borderRadius: 99, background: i === step ? T.c1 : 'rgba(255,255,255,0.12)', transition: 'all 0.45s cubic-bezier(0.34,1.56,0.64,1)', cursor: 'pointer' }} />

                onMouseLeave={e => { e.currentTarget.style.boxShadow = `0 0 40px ${c1(0.267)}`; e.currentTarget.style.transform = 'scale(1)'; }}>
                {step < STEPS.length - 1 ? 'Continue' : 'Enter FlowSpace'}

              {step < STEPS.length - 1 && (

          </div>
        </div>
      );

    window.OnboardingScreen = OnboardingScreen;

  <script type="text/babel">
    const { useState: _uSAuth } = React;

    if (!document.getElementById('fs-auth-css')) {
      const s = document.createElement('style');
      s.id = 'fs-auth-css';
      s.textContent = `

  `;

    function AuthScreen({ onAuth }) {
      const [mode, setMode] = _uSAuth('login');
      const [uname, setUname] = _uSAuth('');
      const [email, setEmail] = _uSAuth('');
      const [pass, setPass] = _uSAuth('');
      const [showPw, setShowPw] = _uSAuth(false);
      const [status, setStatus] = _uSAuth('idle');
      const [errMsg, setErrMsg] = _uSAuth('');
      const [shaking, setShaking] = _uSAuth(false);

      const validate = () => {
        if (mode === 'signup' && !uname.trim()) return "Entrez un nom d'utilisateur";
        if (!email.trim() || !email.includes('@')) return 'Adresse email invalide';
        if (pass.length < 6) return 'Mot de passe min. 6 caractères';
        return null;
      };

      const submit = async () => {
        const err = validate();
        if (err) {
          setErrMsg(err); setShaking(true);
          setTimeout(() => setShaking(false), 460);
          return;
        }
        setStatus('loading'); setErrMsg('');

        const sb = window._fsSb;
        const trimmedEmail = email.trim();
        const displayName = uname.trim() || trimmedEmail.split('@')[0];

        try {
          const authResult = mode === 'signup'
            ? await sb.auth.signUp({ email: trimmedEmail, password: pass, options: { data: { name: displayName } } })
            : await sb.auth.signInWithPassword({ email: trimmedEmail, password: pass });

          if (authResult.error) throw authResult.error;
          const sbUser = authResult.data.user;
          const session = authResult.data.session;

          if (!session) {
            setStatus('idle');
            setErrMsg('Vérifiez votre email pour confirmer votre compte.');
            return;
          }

          const remote = await window._fsLoadRemote(sbUser.id);
          window._fsSeedLocalFromRemote(remote);

          const finalName = (remote && remote.name) || sbUser.user_metadata?.name || displayName;
          const u = { name: finalName, email: trimmedEmail, id: sbUser.id, ts: Date.now() };
          try { localStorage.setItem('fs_user', JSON.stringify(u)); } catch (e) { }
          window._fsSbUser = sbUser;

          /* Always upsert name + email so friend lookup always works */
          try {
            await sb.from('user_data').upsert(
              { user_id: sbUser.id, name: finalName, email: trimmedEmail.toLowerCase(), updated_at: new Date().toISOString() },
              { onConflict: 'user_id' }
            );
          } catch (e) { console.warn('[fs] save user info failed', e); }

          setStatus('success');
          const isNewUser = mode === 'signup' || !remote || !remote.onboarded;
          setTimeout(() => onAuth(u, isNewUser, remote), 680);
        } catch (e) {
          console.warn('[fs] auth failed', e);
          setStatus('idle');
          setShaking(true);
          setTimeout(() => setShaking(false), 460);
          let msg = e?.message || 'Erreur de connexion';
          if (/Invalid login credentials/i.test(msg)) msg = 'Email ou mot de passe incorrect';
          else if (/already registered|already exists/i.test(msg)) msg = 'Compte existant — connectez-vous';
          else if (/Password should be/i.test(msg)) msg = 'Mot de passe min. 6 caractères';
          else if (/rate limit|too many/i.test(msg)) msg = 'Trop de tentatives, réessayez dans quelques minutes';
          else if (/Email not confirmed/i.test(msg)) msg = 'Confirmez votre email avant de vous connecter';
          setErrMsg(msg);
        }
      };

      const switchMode = () => {
        setMode(m => m === 'login' ? 'signup' : 'login');
        setErrMsg(''); setStatus('idle'); setUname(''); setEmail(''); setPass('');
      };

      const busy = status === 'loading' || status === 'success';
      const isOk = status === 'success';

      const FL = ({ ch, htmlFor, required }) => (
        <label htmlFor={htmlFor} style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(248,246,252,0.35)', marginBottom: 8, display: 'block', cursor: htmlFor ? 'pointer' : 'default' }}>{ch}{required && <span style={{ color: '#fb7185', marginLeft: 4 }}>*</span>}</label>

    /* ── Crystallization Reveal ─────────────────────────────────────────────── */
    window._crShown = false; // reset to false on every page load

    function CrystalReveal({ onComplete }) {
      const overlayRef = React.useRef(null);
      const logoRef = React.useRef(null);
      const haloRef = React.useRef(null);

      React.useEffect(() => {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { onComplete(); return; }

        const staggerTargets = [sidebar, ...widgetEls].filter(Boolean);

        document.addEventListener('touchstart', skipCSS, { once: true, passive: true });

            el.style.transform = 'none'; el.style.willChange = 'auto';
          });

        <div ref={overlayRef} className="cr-overlay" aria-hidden="true">
          <div className="cr-halo-wrap">
            <div ref={haloRef} className="cr-halo" />
            <div ref={logoRef} className="cr-logo-wrap">

      _uEC(() => { try { localStorage.setItem('fs_widgets', JSON.stringify(widgets)); } catch (e) { } }, [widgets]);
      const [activeSession, setActiveSession] = _uSC(null);

      /* Crystallization Reveal – show once per session on dashboard entry */
      const [showReveal, setShowReveal] = _uSC(() => {
        if (screen !== 'dashboard') return false;
        return !window._crShown;
      });
      _uEC(() => {
        if (screen === 'dashboard' && !window._crShown) setShowReveal(true);
      }, [screen]);

      const myEmailRef = _uRC(user?.email || '');
      _uEC(() => { myEmailRef.current = user?.email || ''; }, [user]);

      /* ── Supabase Realtime: session invites (Together mode) ── */
      _uEC(() => {
        const onInvite = async (e) => {
          const s = e.detail;
          /* Fetch host info */
          const { data: hostData } = await window._fsSb.from('user_data').select('name, email').eq('user_id', s.host_id).maybeSingle();
          setActiveSession({
            type: s.type, duration: s.duration, music: s.music, breaks: s.breaks,
            startTime: new Date(s.started_at).getTime(),
            broadcastId: s.id, isGuest: true,
            hostEmail: hostData?.email || '',
            friendUser: { name: hostData?.name || '?', initial: (hostData?.name || '?')[0].toUpperCase(), color: '#4ade80' },
          });
          setScreen('dashboard');
        };
        const onEnd = (e) => {
          setActiveSession(a => a && a.broadcastId === e.detail.id ? null : a);
        };
        window.addEventListener('fs-session-invite', onInvite);
        window.addEventListener('fs-session-end', onEnd);
        return () => {
          window.removeEventListener('fs-session-invite', onInvite);
          window.removeEventListener('fs-session-end', onEnd);
        };
      }, []);

      /* ── Realtime: cross-device sync for widgets, theme, style ── */
      _uEC(() => {
        const handler = (e) => {
          const r = e.detail;
          if (r.widgets) setWidgets(r.widgets);
          if (r.bg_theme) setBgThemeId(r.bg_theme);
          if (r.widget_style) setWidgetStyle(r.widget_style);
        };
        window.addEventListener('fs-remote-update', handler);
        return () => window.removeEventListener('fs-remote-update', handler);
      }, []);

      const handleLaunch = async (session) => {
        const enriched = { ...session, broadcastId: `${Date.now()}`, hostEmail: user?.email || '', startTime: Date.now() };
        setActiveSession(enriched);
        setShowSession(false);
        /* Insert into Supabase sessions table for cross-device Together */
        if (session.type === 'together' && session.friendId) {
          try {
            const { data } = await window._fsSb.from('sessions').insert({
              host_id: window._fsSbUser?.id, friend_id: session.friendId,
              type: 'together', duration: session.duration,
              music: session.music, breaks: session.breaks, active: true,
            }).select('id').single();
            if (data) setActiveSession(prev => ({ ...prev, broadcastId: data.id }));
          } catch (e) { console.warn('[fs] session insert failed', e); }
        }
      };

      const handleEndSession = async () => {
        if (activeSession?.type === 'together' && activeSession.broadcastId) {
          try {
            await window._fsSb.from('sessions').update({ active: false, ended_at: new Date().toISOString() }).eq('id', activeSession.broadcastId);
          } catch (e) { console.warn('[fs] session end failed', e); }
        }
        setActiveSession(null);
      };
      const [bgThemeId, setBgThemeId] = _uSC(() => {
        try { return localStorage.getItem('fs_bgtheme') || 'cosmos'; } catch (e) { return 'cosmos'; }
      });
      _uEC(() => {
        let theme = (window.BG_THEMES || []).find(t => t.id === bgThemeId);
        if (!theme && bgThemeId === 'custom' && window.buildCustomTheme) {
          try {
            const cb = JSON.parse(localStorage.getItem('fs_custom_bg') || '{}');
            theme = window.buildCustomTheme(cb.c1 || '#a5b8ff', cb.c2 || '#c084fc');
          } catch (e) { }
        }
        if (!theme) return;
        const r = document.documentElement.style;
        r.setProperty('--bg-g1', `rgba(${theme.g1.rgb},${theme.g1.o})`);
        r.setProperty('--bg-g1-x', theme.g1.x);
        r.setProperty('--bg-g1-y', theme.g1.y);
        r.setProperty('--bg-g2', `rgba(${theme.g2.rgb},${theme.g2.o})`);
        r.setProperty('--bg-g2-x', theme.g2.x);
        r.setProperty('--bg-g2-y', theme.g2.y);
        r.setProperty('--theme-c1-rgb', theme.g1.rgb);
        r.setProperty('--theme-c2-rgb', theme.g2.rgb);
        r.setProperty('--theme-c1', `rgb(${theme.g1.rgb})`);
        r.setProperty('--theme-c2', `rgb(${theme.g2.rgb})`);
        document.body.style.background = theme.base;
      }, [bgThemeId]);

      const applyBgTheme = theme => {
        document.body.style.transition = 'background 1.1s cubic-bezier(0.4,0,0.2,1)';
        try { localStorage.setItem('fs_bgtheme', theme.id); } catch (e) { }
        setBgThemeId(theme.id);
      };

      const [widgetStyle, setWidgetStyle] = _uSC(() => {
        try { return JSON.parse(localStorage.getItem('fs_widget_style') || 'null') || { opacity: 1, radius: 24, glowColor: '#a5b8ff', glowIntensity: 0 }; } catch (e) { return { opacity: 1, radius: 24, glowColor: '#a5b8ff', glowIntensity: 0 }; }
      });
      _uEC(() => {
        const { opacity, radius, glowColor, glowIntensity } = widgetStyle;
        const h2r = (hex, a) => {
          const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
          return `rgba(${r},${g},${b},${a.toFixed(3)})`;
        };
        const root = document.documentElement.style;
        root.setProperty('--widget-opacity', String(opacity));
        root.setProperty('--widget-radius', `${radius}px`);
        root.setProperty('--widget-glow-size', glowIntensity > 0 ? `${(glowIntensity * 60).toFixed(1)}px` : '0px');
        root.setProperty('--widget-glow', glowIntensity > 0 ? h2r(glowColor, glowIntensity * 0.50) : 'transparent');
        root.setProperty('--widget-glow-ring', glowIntensity > 0 ? h2r(glowColor, glowIntensity * 0.78) : 'transparent');
        try { localStorage.setItem('fs_widget_style', JSON.stringify(widgetStyle)); } catch (e) { }
      }, [widgetStyle]);

      const handleUseVariant = (type, variant) => {
        setWidgets(ws => {
          const idx = ws.findIndex(w => w.id === type || w.id.startsWith(type + '_'));
          if (idx >= 0) return ws.map((w, i) => i === idx ? { ...w, variant } : w);
          return [...ws, { id: type, label: type.charAt(0).toUpperCase() + type.slice(1), col: '1/4', row: '1/2', variant }];
        });
      };

      const handleLogout = async () => {
        window._fsStopRealtime();
        window._fsStopSessionRealtime();
        try { await window._fsSb.auth.signOut(); } catch (e) { }
        window._fsSbUser = null;
        try {
          localStorage.removeItem('fs_user');
          localStorage.removeItem('fs_onboarded');
          localStorage.removeItem('fs_tasks');
          localStorage.removeItem('fs_notes');
          localStorage.removeItem('fs_widgets');
          localStorage.removeItem('fs_bgtheme');
          localStorage.removeItem('fs_custom_bg');
          localStorage.removeItem('fs_widget_style');
          /* Clear all image keys */
          for (let i = localStorage.length - 1; i >= 0; i--) {
            const k = localStorage.key(i);
            if (k && k.startsWith('fs_img_')) localStorage.removeItem(k);
          }
        } catch (e) { }
        setUser(null);
        setActiveSession(null);
        setShowSession(false);
        setWidgets(DEFAULT_WIDGETS);
        setBgThemeId('cosmos');
        setWidgetStyle({ opacity: 1, radius: 24, glowColor: '#a5b8ff', glowIntensity: 0 });
        setScreen('auth');
      };

      const go = s => {
        if (s === 'session') { setShowSession(true); return; }
        setScreen(s);
      };

      const handleAuth = (authUser, isNew, remote) => {
        if (remote && remote.widgets) setWidgets(remote.widgets);
        else setWidgets(DEFAULT_WIDGETS);
        if (remote && remote.bg_theme) setBgThemeId(remote.bg_theme);
        if (remote && remote.widget_style) setWidgetStyle(remote.widget_style);
        setUser(authUser);
        /* Start Realtime subscriptions */
        if (authUser?.id) {
          window._fsStartRealtime(authUser.id);
          window._fsStartSessionRealtime(authUser.id);
        }
        setScreen(isNew ? 'onboarding' : 'dashboard');
      };

      /* Validate the persisted session at startup. If there's a stale fs_user
         in localStorage but no live Supabase session (expired / signed out
         elsewhere), drop back to the auth screen. If a session is alive,
         expose its user to the sync layer so saves start replicating. */
      _uEC(() => {
        let mounted = true;
        (async () => {
          try {
            const { data } = await window._fsSb.auth.getSession();
            if (!mounted) return;
            const session = data?.session;
            if (session?.user) {
              window._fsSbUser = session.user;
              /* Start Realtime for returning users */
              window._fsStartRealtime(session.user.id);
              window._fsStartSessionRealtime(session.user.id);
            } else if (localStorage.getItem('fs_user')) {
              try {
                localStorage.removeItem('fs_user');
                localStorage.removeItem('fs_onboarded');
                localStorage.removeItem('fs_tasks');
                localStorage.removeItem('fs_notes');
                localStorage.removeItem('fs_widgets');
                localStorage.removeItem('fs_bgtheme');
                localStorage.removeItem('fs_custom_bg');
                localStorage.removeItem('fs_widget_style');
              } catch (_) { }
              setUser(null);
              setWidgets(DEFAULT_WIDGETS);
              setScreen('auth');
            }
          } catch (e) { console.warn('[fs] session check failed', e); }
        })();
        const { data: sub } = window._fsSb.auth.onAuthStateChange((event, session) => {
          if (event === 'SIGNED_OUT') {
            window._fsSbUser = null;
            window._fsStopRealtime();
            window._fsStopSessionRealtime();
          } else if (session?.user) {
            window._fsSbUser = session.user;
          }
        });
        return () => { mounted = false; try { sub?.subscription?.unsubscribe(); } catch (_) { } };
      }, []);

      const handleOnboardDone = () => {
        try { localStorage.setItem('fs_onboarded', '1'); } catch (e) { }
        setScreen('dashboard');
      };

      const isApp = screen !== 'auth' && screen !== 'onboarding';

      return (
        <>
          {screen === 'auth' && (
            <div key="auth" style={{ width: '100%', height: '100%', animation: 'scaleIn 0.35s cubic-bezier(0.4,0,0.2,1) both' }}>
              <AuthScreen onAuth={handleAuth} />
            </div>
          )}
          {screen === 'onboarding' && (
            <div key="onboarding" style={{ width: '100%', height: '100%', animation: 'scaleIn 0.35s cubic-bezier(0.4,0,0.2,1) both' }}>
              <OnboardingScreen onDone={handleOnboardDone} />
            </div>
          )}
          {isApp && (
            <div key={screen} style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', gap: 24, height: '100%', padding: 28, boxSizing: 'border-box', animation: 'scaleIn 0.35s cubic-bezier(0.4,0,0.2,1) both' }}>
              <Sidebar screen={screen} onNavigate={go} user={user} onLogout={handleLogout} />
              <div style={{ position: 'relative', overflow: 'hidden', borderRadius: 34, background: 'linear-gradient(180deg,rgba(255,255,255,0.045),rgba(255,255,255,0.02))', border: '1px solid rgba(255,255,255,0.06)', boxShadow: '0 10px 34px rgba(0,0,0,0.28)' }}>
                {screen === 'dashboard' && <DashboardScreen onNavigate={go} widgets={widgets} session={activeSession} onEndSession={handleEndSession} />}
                {screen === 'tasks' && <TasksScreen />}
                {screen === 'edit' && <EditModeScreen onNavigate={go} widgets={widgets} onSave={setWidgets} />}
                {screen === 'perso' && <PersonnalisationScreen onNavigate={go} bgThemeId={bgThemeId} />}
                {screen === 'fond' && <FondScreen onNavigate={go} bgThemeId={bgThemeId} onApply={applyBgTheme} />}
                {screen === 'variants' && <WidgetVariantsScreen onNavigate={go} onUseVariant={handleUseVariant} widgetStyle={widgetStyle} onWidgetStyleChange={setWidgetStyle} />}
              </div>
            </div>
          )}
          {showSession && <SessionModal onClose={() => setShowSession(false)} onLaunch={handleLaunch} />}
          {isApp && showReveal && <CrystalReveal onComplete={() => setShowReveal(false)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App /></ToastProvider>);
  </script>

  <script type="text/babel">
    /* ── Friends System ─────────────────────────────────────────────────────── */
    if (!document.getElementById('fs-friends-css')) {
      const s = document.createElement('style');
      s.id = 'fs-friends-css';
      s.textContent = `

        from { opacity:0; transform:translateX(-16px) scale(0.97); }
        to   { opacity:1; transform:translateX(0)    scale(1);    }

        from { opacity:0; transform:translateY(8px); }
        to   { opacity:1; transform:translateY(0); }
      }
      .fs-friends-panel {
        position:fixed; top:28px; bottom:28px; left:136px; width:340px;
        z-index:9991;
        background:rgba(8,7,18,0.98);
        border:1px solid rgba(255,255,255,0.09);
        border-radius:28px;
        backdrop-filter:blur(60px) saturate(160%);
        -webkit-backdrop-filter:blur(60px) saturate(160%);
        box-shadow:0 32px 80px rgba(0,0,0,0.75),0 0 0 1px rgba(255,255,255,0.04),0 0 80px rgba(100,120,255,0.06);
        display:flex; flex-direction:column; overflow:hidden;
        animation: friendsSlideIn 0.36s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      .fs-friends-panel::before {

        background:linear-gradient(90deg,transparent,rgba(165,184,255,0.55),transparent);
        pointer-events:none;
      }
      .fs-friends-panel::after {
        content:''; position:absolute; top:-60px; left:50%; transform:translateX(-50%);
        width:280px; height:180px; border-radius:50%;

      }
      .fs-friend-actions { display:none; gap:6px; align-items:center; flex-shrink:0; }
      .fs-friend-card:hover .fs-friend-actions { display:flex; }
      .fs-add-input {
        width:100%; background:rgba(255,255,255,0.06);
        border:1.5px solid rgba(255,255,255,0.1); border-radius:14px;
        padding:12px 16px; color:rgba(248,246,252,0.95);
        font-size:13px; font-family:'DM Sans',sans-serif;
        outline:none; box-sizing:border-box;
        transition:border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
      }
      .fs-add-input:focus {
        border-color:rgba(165,184,255,0.55);
        background:rgba(165,184,255,0.05);
        box-shadow:0 0 0 3.5px rgba(165,184,255,0.12);
      }
      .fs-add-input::placeholder { color:rgba(248,246,252,0.22); }
      .fs-preview-modal {
        position:fixed; inset:0; z-index:9999;
        background:rgba(0,0,0,0.82);
        backdrop-filter:blur(28px);
        display:flex; align-items:center; justify-content:center; padding:40px;
      }
      .fs-preview-inner {
        width:100%; max-width:1120px; height:84vh;
        background:rgba(8,7,18,0.99);
        border:1px solid rgba(255,255,255,0.08);
        border-radius:34px;
        backdrop-filter:blur(60px);
        box-shadow:0 52px 130px rgba(0,0,0,0.92),0 0 0 1px rgba(255,255,255,0.04);
        display:flex; flex-direction:column; overflow:hidden;
        animation:scaleIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      `;
      document.head.appendChild(s);
    }

    const FRIEND_COLORS = ['#a5b8ff','#4ade80','#c084fc','#ffd27d','#2dd4bf','#fb7185','#fb923c','#67e8f9'];
    function friendColor(name) {
      const code = (name||'?').charCodeAt(0) % FRIEND_COLORS.length;
      return FRIEND_COLORS[code];
    }

    /* ── FriendDashboardPreview ─────────────────────────────────────────── */
    function FriendDashboardPreview({ friend, onClose }) {
      const [data, setData] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const fc = friendColor(friend.name || friend.email);
      const initials = (friend.name || friend.email || '?')[0].toUpperCase();

      React.useEffect(() => {
        (async () => {
          const remote = await window._fsLoadRemote(friend.id);
          setData(remote);
          setLoading(false);
        })();
      }, [friend.id]);

      const widgets = data?.widgets || [];

      return (
        <div className="fs-preview-modal" onClick={onClose}>
          <div className="fs-preview-inner" onClick={e => e.stopPropagation()}>
            {/* Ambient top glow */}
            <div style={{ position:'absolute', top:-80, left:'50%', transform:'translateX(-50%)', width:500, height:200, borderRadius:'50%', background:`radial-gradient(ellipse,${fc}18 0%,transparent 70%)`, pointerEvents:'none' }}/>
            {/* Top shimmer */}
            <div style={{ position:'absolute', top:0, left:'20%', right:'20%', height:1, background:`linear-gradient(90deg,transparent,${fc}55,transparent)`, pointerEvents:'none' }}/>

            {/* Header */}
            <div style={{ padding:'24px 32px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid rgba(255,255,255,0.06)', flexShrink:0, position:'relative' }}>
              <div style={{ display:'flex', alignItems:'center', gap:16 }}>
                <div style={{ width:50, height:50, borderRadius:'50%', background:`linear-gradient(135deg,${fc},${fc}99)`, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:T.display, fontWeight:800, fontSize:20, color:'#07070d', boxShadow:`0 8px 24px ${fc}44,0 0 0 2px ${fc}22`, flexShrink:0 }}>
                  {initials}
                </div>
                <div>
                  <div style={{ fontSize:9, fontWeight:800, letterSpacing:'0.14em', textTransform:'uppercase', color:T.muted, marginBottom:5 }}>Dashboard Preview · Read-only</div>
                  <div style={{ fontFamily:T.display, fontWeight:800, fontSize:22, letterSpacing:'-0.035em' }}>{friend.name || friend.email.split('@')[0]}</div>
                  <div style={{ fontSize:11, color:T.muted, marginTop:2 }}>{friend.email}</div>
                </div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, background:'rgba(74,222,128,0.09)', border:'1px solid rgba(74,222,128,0.22)', borderRadius:99, padding:'7px 14px' }}>
                  <div style={{ width:6, height:6, borderRadius:'50%', background:T.green, boxShadow:`0 0 8px ${T.green}`, animation:'livePulse 2s ease-in-out infinite' }}/>
                  <span style={{ fontSize:9, fontWeight:800, color:T.green, letterSpacing:'0.12em', textTransform:'uppercase' }}>Live View</span>
                </div>
                <button onClick={onClose} style={{ width:36, height:36, borderRadius:'50%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.08)', cursor:'pointer', color:T.muted, fontSize:18, display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.18s' }}
                  onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.1)';e.currentTarget.style.color=T.text;}}
                  onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.05)';e.currentTarget.style.color=T.muted;}}>×</button>
              </div>
            </div>

            {/* Dashboard grid */}
            <div style={{ flex:1, padding:'20px 28px 28px', overflow:'hidden', position:'relative' }}>
              {loading ? (
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:16 }}>
                  <svg width={36} height={36} viewBox="0 0 24 24" fill="none" style={{animation:'fwSpin 1s linear infinite'}}>
                    <circle cx={12} cy={12} r={10} stroke="rgba(165,184,255,0.14)" strokeWidth={2}/>
                    <path d="M12 2a10 10 0 0 1 10 10" stroke={T.c1} strokeWidth={2} strokeLinecap="round"/>
                  </svg>
                  <div style={{ fontSize:13, color:T.muted, letterSpacing:'-0.01em' }}>Loading {friend.name}'s space…</div>
                </div>
              ) : widgets.length === 0 ? (
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:12 }}>
                  <div style={{ fontSize:14, fontWeight:700, color:T.text }}>No widgets configured</div>
                  <div style={{ fontSize:12, color:T.muted }}>This space is still empty.</div>
                </div>
              ) : (
                <div style={{ display:'grid', gridTemplateColumns:'repeat(12,1fr)', gridTemplateRows:'repeat(4,1fr)', gap:12, height:'100%', pointerEvents:'none' }}>
                  {widgets.map(w => (
                    <div key={w.id} style={{ gridColumn:w.col, gridRow:w.row, overflow:'hidden', borderRadius:20 }}>
                      {window.WIDGET_COMPONENTS?.[w.label?.toLowerCase?.()]
                        ? window.WIDGET_COMPONENTS[w.label.toLowerCase()](w.variant||1, w.id)
                        : <div style={{ width:'100%', height:'100%', background:'rgba(255,255,255,0.04)', borderRadius:20, display:'flex', alignItems:'center', justifyContent:'center' }}><span style={{ fontSize:10, color:T.muted, textTransform:'uppercase', letterSpacing:'0.06em', fontWeight:600 }}>{w.label}</span></div>
                      }
                    </div>
                  ))}
                </div>
              )}
              {/* Read-only overlay */}
              {!loading && <div style={{ position:'absolute', inset:0, zIndex:10, cursor:'default' }}/>}
            </div>
          </div>
        </div>
      );
    }

    /* ── FriendCard ─────────────────────────────────────────────────────── */
    function FriendCard({ friend, onPreview, onRemove, index }) {
      const [hov, setHov] = React.useState(false);
      const fc = friendColor(friend.name || friend.email);
      const initials = (friend.name || friend.email || '?')[0].toUpperCase();
      return (
        <div className="fs-friend-card" style={{ animationDelay: `${index * 0.05}s` }}
          onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
          onClick={onPreview}>
          {/* Avatar */}
          <div style={{ width:42, height:42, borderRadius:'50%', background:`linear-gradient(135deg,${fc},${fc}88)`, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:T.display, fontWeight:800, fontSize:17, color:'#07070d', flexShrink:0, boxShadow:`0 4px 16px ${fc}44` }}>
            {initials}
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:13, fontWeight:700, color:T.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{friend.name || friend.email.split('@')[0]}</div>
            <div style={{ fontSize:11, color:T.muted, marginTop:2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{friend.email}</div>
          </div>
          <div className="fs-friend-actions">
            <div style={{ display:'flex', alignItems:'center', gap:4, background:c1(0.1), border:`1px solid ${c1(0.26)}`, borderRadius:10, padding:'5px 10px', fontSize:10, fontWeight:700, color:T.c1, letterSpacing:'0.04em', cursor:'pointer', transition:'all 0.18s' }}
              onClick={e=>{e.stopPropagation();onPreview();}}
              onMouseEnter={e=>{e.currentTarget.style.background=c1(0.2);}}
              onMouseLeave={e=>{e.currentTarget.style.background=c1(0.1);}}>
              View
              <svg width={9} height={9} viewBox="0 0 10 10" fill="none" style={{marginLeft:3}}><path d="M2 5h6M5.5 2l3 3-3 3" stroke="currentColor" strokeWidth={1.6} strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <div style={{ width:28, height:28, borderRadius:9, background:'rgba(251,113,133,0.09)', border:'1px solid rgba(251,113,133,0.2)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'all 0.18s', flexShrink:0 }}
              onClick={e=>{e.stopPropagation();onRemove();}}
              onMouseEnter={e=>{e.currentTarget.style.background='rgba(251,113,133,0.2)';}}
              onMouseLeave={e=>{e.currentTarget.style.background='rgba(251,113,133,0.09)';}}>
              <svg width={9} height={9} viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2L2 8" stroke="#fb7185" strokeWidth={1.6} strokeLinecap="round"/></svg>
            </div>
          </div>
        </div>
      );
    }

    /* ── FriendsPanel ───────────────────────────────────────────────────── */
    function FriendsPanel({ open, onClose, user }) {
      const [friends, setFriends] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem('fs_friends')||'[]'); } catch(e) { return []; }
      });
      const [email, setEmail] = React.useState('');
      const [status, setStatus] = React.useState('idle'); // idle|loading|success|error
      const [msg, setMsg] = React.useState('');
      const [preview, setPreview] = React.useState(null);
      const inputRef = React.useRef(null);

      React.useEffect(() => {
        try { localStorage.setItem('fs_friends', JSON.stringify(friends)); } catch(e) {}
      }, [friends]);

      React.useEffect(() => {
        if (open && inputRef.current) setTimeout(() => inputRef.current?.focus(), 200);
      }, [open]);

      const addFriend = async () => {
        const trimmed = email.trim();
        if (!trimmed || !trimmed.includes('@')) return;
        setStatus('loading');
        const found = await window._fsLookupUserByEmail(trimmed);
        if (!found) { setStatus('error'); setMsg('No FlowSpace account found'); setTimeout(()=>setStatus('idle'),2600); return; }
        if (found.id === window._fsSbUser?.id) { setStatus('error'); setMsg("That's your own account!"); setTimeout(()=>setStatus('idle'),2600); return; }
        if (friends.some(f=>f.id===found.id)) { setStatus('error'); setMsg('Already in your friends'); setTimeout(()=>setStatus('idle'),2600); return; }
        setFriends(prev => [...prev, { ...found, addedAt: Date.now() }]);
        setEmail('');
        setStatus('success'); setMsg(`${found.name} added! 🎉`);
        setTimeout(()=>setStatus('idle'), 2200);
      };

      const removeFriend = id => setFriends(prev => prev.filter(f => f.id !== id));

      const btnBg = { idle: T.c1, loading: c1(0.3), success: T.green, error: T.rose }[status];

      if (!open) return null;
      return (
        <>
          <div className="fs-friends-backdrop" onClick={onClose}/>
          <div className="fs-friends-panel">
            {/* Header */}
            <div style={{ padding:'26px 24px 20px', flexShrink:0 }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:22 }}>
                <div>
                  <div style={{ fontSize:9, fontWeight:800, letterSpacing:'0.14em', textTransform:'uppercase', color:T.muted, marginBottom:6 }}>FlowSpace</div>
                  <div style={{ fontFamily:T.display, fontWeight:800, fontSize:24, letterSpacing:'-0.04em', lineHeight:1 }}>Friends</div>
                  {friends.length>0 && <div style={{ fontSize:11, color:T.muted, marginTop:5 }}>{friends.length} connection{friends.length>1?'s':''}</div>}
                </div>
                <button onClick={onClose} style={{ width:34, height:34, borderRadius:'50%', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.08)', cursor:'pointer', color:T.muted, fontSize:18, display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.18s' }}
                  onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.1)';e.currentTarget.style.color=T.text;}}
                  onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.color=T.muted;}}>×</button>
              </div>

              {/* Add friend input */}
              <div style={{ marginBottom:4 }}>
                <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:T.muted, marginBottom:9 }}>Add a friend</div>
                <div style={{ display:'flex', gap:8 }}>
                  <input ref={inputRef} className="fs-add-input" type="email" value={email}
                    onChange={e=>setEmail(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&addFriend()}
                    placeholder="friend@example.com"
                    style={{ flex:1 }}/>
                  <button onClick={addFriend} disabled={status==='loading'}
                    style={{ width:46, height:46, borderRadius:14, background:btnBg, border:'none', cursor:status==='loading'?'default':'pointer', color:'#07070d', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'all 0.28s cubic-bezier(0.34,1.56,0.64,1)', boxShadow:`0 4px 20px ${btnBg}44` }}
                    onMouseEnter={e=>{if(status==='idle')e.currentTarget.style.transform='scale(1.08) translateY(-1px)';}}
                    onMouseLeave={e=>{e.currentTarget.style.transform='scale(1) translateY(0)';}}>
                    {status==='loading'
                      ? <svg width={16} height={16} viewBox="0 0 24 24" fill="none" style={{animation:'fwSpin 0.8s linear infinite'}}><circle cx={12} cy={12} r={10} stroke="rgba(255,255,255,0.2)" strokeWidth={2}/><path d="M12 2a10 10 0 0 1 10 10" stroke="#07070d" strokeWidth={2} strokeLinecap="round"/></svg>
                      : status==='success'
                      ? <svg width={14} height={14} viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-7" stroke="#07070d" strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round"/></svg>
                      : status==='error'
                      ? <svg width={13} height={13} viewBox="0 0 13 13" fill="none"><path d="M2 2l9 9M11 2L2 11" stroke="#07070d" strokeWidth={2} strokeLinecap="round"/></svg>
                      : <svg width={14} height={14} viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="#07070d" strokeWidth={2.2} strokeLinecap="round"/></svg>
                    }
                  </button>
                </div>
                {msg && (
                  <div style={{ fontSize:11, color:status==='error'?T.rose:T.green, marginTop:8, paddingLeft:2, display:'flex', alignItems:'center', gap:5, animation:'scaleIn 0.2s ease both' }}>
                    {status==='error'
                      ? <svg width={11} height={11} viewBox="0 0 12 12" fill="none"><circle cx={6} cy={6} r={5} stroke="currentColor" strokeWidth={1.4}/><path d="M6 3.5v3M6 8.5h.01" stroke="currentColor" strokeWidth={1.4} strokeLinecap="round"/></svg>
                      : <svg width={11} height={11} viewBox="0 0 12 12" fill="none"><circle cx={6} cy={6} r={5} stroke="currentColor" strokeWidth={1.4}/><path d="M3.5 6l2 2 3-3" stroke="currentColor" strokeWidth={1.4} strokeLinecap="round" strokeLinejoin="round"/></svg>
                    }
                    {msg}
                  </div>
                )}
              </div>
            </div>

            {/* Divider */}
            <div style={{ height:1, background:'rgba(255,255,255,0.06)', flexShrink:0, margin:'0 0 4px' }}/>

            {/* Friends list */}
            <div style={{ flex:1, overflowY:'auto', padding:'12px 16px 24px' }}>
              {friends.length===0 ? (
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'80%', gap:16, padding:'20px 0' }}>
                  <div style={{ width:70, height:70, borderRadius:'50%', background:c1(0.07), border:`1px solid ${c1(0.15)}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <svg width={30} height={30} viewBox="0 0 24 24" fill="none">
                      <circle cx={9} cy={7} r={4} stroke={T.c1} strokeWidth={1.5}/>
                      <path d="M2 20c0-4 3.1-7 7-7s7 3 7 7" stroke={T.c1} strokeWidth={1.5} strokeLinecap="round"/>
                      <path d="M19 8v6M16 11h6" stroke={T.c1} strokeWidth={1.5} strokeLinecap="round"/>
                    </svg>
                  </div>
                  <div style={{ textAlign:'center' }}>
                    <div style={{ fontSize:14, fontWeight:700, color:T.text, marginBottom:7 }}>No friends yet</div>
                    <div style={{ fontSize:12, color:T.muted, lineHeight:1.7 }}>Add a friend by their email<br/>to see their dashboard live.</div>
                  </div>
                </div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  <div style={{ fontSize:9, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:T.muted, paddingLeft:4, marginBottom:4 }}>Your friends</div>
                  {friends.map((f, i) => (
                    <FriendCard key={f.id} friend={f} index={i}
                      onPreview={()=>setPreview(f)}
                      onRemove={()=>removeFriend(f.id)}/>
                  ))}
                </div>
              )}
            </div>
          </div>
          {preview && <FriendDashboardPreview friend={preview} onClose={()=>setPreview(null)}/>}
        </>
      );
    }

    window.FriendsPanel = FriendsPanel;
    window.FriendCard = FriendCard;
    window.FriendDashboardPreview = FriendDashboardPreview;
  </script>
</body>

</html>
