<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumenOS</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8fdcff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LumenOS" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --theme-c1-rgb: 143, 220, 255;
      --theme-c2-rgb: 184, 145, 255;
      --theme-c1: rgb(143, 220, 255);
      --theme-c2: rgb(184, 145, 255);
      --mineral-bg: #070810;
      --mineral-bg-2: #0b0d18;
      --mineral-bg-rgb: 7, 8, 16;
      --mineral-bg-2-rgb: 11, 13, 24;
      --mineral-surface: #10131f;
      --mineral-surface-2: #171b2a;
      --mineral-surface-rgb: 16, 19, 31;
      --mineral-surface-2-rgb: 23, 27, 42;
      --mineral-line: rgba(220, 230, 255, 0.08);
      --mineral-line-strong: rgba(220, 230, 255, 0.13);
      --mineral-text: #f4f6fb;
      --mineral-muted: rgba(207, 216, 235, 0.56);
      --mineral-quiet: rgba(207, 216, 235, 0.32);
      --mineral-cyan: #8fdcff;
      --mineral-orchid: #b891ff;
      --mineral-teal: #49f0d2;
      --mineral-rose: #ff6b8a;
      --mineral-green: #7af6a4;
      --mineral-ease: cubic-bezier(.16, 1, .3, 1);
      --mineral-radius-sm: 12px;
      --mineral-radius-md: 16px;
      --mineral-radius-lg: 22px;
      --font-body: 'Inter', 'DM Sans', sans-serif;
      --font-display: 'Sora', 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--mineral-bg);
      color: var(--mineral-text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    #root {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 64% 48% at var(--bg-g1-x, 18%) var(--bg-g1-y, 12%), var(--bg-g1, rgba(143, 220, 255, 0.075)) 0%, transparent 62%),
        radial-gradient(ellipse 58% 44% at var(--bg-g2-x, 84%) var(--bg-g2-y, 82%), var(--bg-g2, rgba(184, 145, 255, 0.06)) 0%, transparent 66%),
        linear-gradient(180deg, rgba(255,255,255,0.012), transparent 38%);
      transition: background 1.1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 44px 44px;
      opacity: 0.36;
    }

    @media (min-width: 769px) {
      html,
      body {
        height: auto;
        min-height: 100%;
        overflow: auto;
        overscroll-behavior: contain;
      }

      #root {
        min-height: 100dvh;
        height: auto;
      }

      .fs-app-shell {
        min-height: max(100dvh, 760px);
        height: max(100dvh, 760px) !important;
        overflow: visible !important;
      }

      .fs-app-main {
        min-height: 0;
        overflow: hidden auto !important;
      }

      .fs-sidebar {
        min-height: 0;
        max-height: calc(max(100dvh, 760px) - 56px);
      }
    }

    @media (min-width: 769px) and (max-height: 760px) {
      .fs-app-shell {
        padding-top: 18px !important;
        padding-bottom: 18px !important;
      }

      .fs-sidebar {
        height: 100% !important;
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.97);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes widgetSettle {
      0% {
        transform: scale(1.04);
      }

      55% {
        transform: scale(0.978);
      }

      80% {
        transform: scale(1.008);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes dashboardWidgetIn {
      0% {
        opacity: 0;
        transform: translate3d(0, 28px, 0) scale(0.955);
      }

      68% {
        opacity: 1;
        transform: translate3d(0, -2px, 0) scale(1.006);
      }

      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    .fs-dashboard-widget-in {
      opacity: 0;
      transform-origin: center;
      animation: dashboardWidgetIn 520ms cubic-bezier(0.16, 1, 0.3, 1) both;
      will-change: opacity, transform;
    }

    .fs-dashboard-widget-wait {
      opacity: 0;
      transform: translate3d(0, 28px, 0) scale(0.955);
      pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .fs-dashboard-widget-in,
      .fs-dashboard-widget-wait {
        opacity: 1;
        animation: none;
        transform: none;
        filter: none;
      }
    }

    html.fs-perf-lite body::after { display: none; }
    html.fs-perf-lite body::before { opacity: 0.55; }
    html.fs-perf-lite *,
    html.fs-perf-lite *::before,
    html.fs-perf-lite *::after {
      scroll-behavior: auto !important;
    }
    html.fs-perf-lite .fs-dashboard-widget-in {
      animation-duration: 260ms !important;
      will-change: opacity, transform !important;
    }
    html.fs-perf-lite .fs-mobile-nav,
    html.fs-perf-lite .fs-sidebar,
    html.fs-perf-lite .fs-popover,
    html.fs-perf-lite .fs-account-panel,
    html.fs-perf-lite .fs-friends-panel,
    html.fs-perf-lite .fs-preview-inner {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }

    /* Mineral OS: opinionated premium layer */
    .fs-app-main {
      background:
        radial-gradient(ellipse 70% 42% at 16% 0%, rgba(var(--theme-c1-rgb),0.055), transparent 62%),
        radial-gradient(ellipse 58% 45% at 88% 98%, rgba(var(--theme-c2-rgb),0.045), transparent 64%),
        linear-gradient(180deg, rgba(var(--mineral-surface-rgb),0.94), rgba(var(--mineral-bg-rgb),0.985)) !important;
      border-color: var(--mineral-line) !important;
      box-shadow: 0 30px 90px rgba(0,0,0,0.46), inset 0 1px 0 rgba(255,255,255,0.035) !important;
    }
    [data-cr-widget] > div {
      border-radius: var(--widget-radius, var(--mineral-radius-lg)) !important;
    }
    button, input, textarea, select {
      -webkit-tap-highlight-color: transparent;
    }
    button {
      touch-action: manipulation;
    }
    button:active {
      transform: translateY(1px) scale(0.985);
    }
    .fs-premium-focus,
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: none !important;
      box-shadow: 0 0 0 3px rgba(143,220,255,0.14), 0 0 0 1px rgba(143,220,255,0.34) !important;
    }
    .fs-dashboard-header,
    .fs-notes-head,
    .fs-tasks-head {
      background: linear-gradient(180deg, rgba(var(--mineral-bg-rgb),0.42), rgba(var(--mineral-bg-rgb),0)) !important;
    }
    .fs-note-card,
    .fs-task-row,
    .fs-cave-stat {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.035) !important;
    }
    .fs-note-card,
    .fs-task-row {
      border-color: var(--mineral-line) !important;
    }
    .fs-note-card:active,
    .fs-task-row:active {
      transform: scale(0.992) !important;
    }
    .fs-notes-title-input,
    .fs-note-textarea {
      caret-color: var(--mineral-cyan);
    }
    .fs-note-textarea,
    .fs-notes-preview {
      background:
        linear-gradient(180deg, rgba(var(--mineral-surface-rgb),0.72), rgba(var(--mineral-bg-2-rgb),0.86)) !important;
      border-color: var(--mineral-line) !important;
    }
    .fs-task-filters button,
    .fs-notes-actions button,
    .fs-notes-back {
      transition: transform 0.18s var(--mineral-ease), background 0.18s var(--mineral-ease), border-color 0.18s var(--mineral-ease), color 0.18s var(--mineral-ease) !important;
    }
    .fs-cristaux-panel.embedded {
      background: linear-gradient(180deg, rgba(var(--mineral-surface-rgb),0.88), rgba(var(--mineral-bg-rgb),0.97)) !important;
    }
    .fs-cave-title {
      max-width: min(440px, 62vw);
    }
    html.fs-perf-lite body::before {
      background: linear-gradient(180deg, rgba(143,220,255,0.035), rgba(184,145,255,0.026)) !important;
    }

    /* ══════════════ MOBILE RESPONSIVE ══════════════ */
    @media (max-width: 768px) {
      /* ─── Shell ───────────────────────────────────── */
      .fs-app-shell { grid-template-columns: 1fr !important; padding: 0 !important; gap: 0 !important; height: 100% !important; }
      .fs-sidebar { display: none !important; }
      .fs-mobile-nav { display: flex !important; }
      .fs-app-main { border-radius: 0 !important; border: none !important; box-shadow: none !important; }

      /* ─── Dashboard ────────────────────────────────── */
      .fs-dashboard-header { padding: 16px 16px 0 !important; flex-wrap: nowrap !important; gap: 8px !important; }
      .fs-dh-greeting { display: none !important; }
      .fs-dh-sep { display: none !important; }
      .fs-dashboard-grid {
        display: flex !important; flex-direction: column !important;
        overflow-y: auto !important; overflow-x: hidden !important;
        padding: 10px 12px 94px !important; gap: 10px !important;
        height: auto !important; max-height: 100% !important;
        -webkit-overflow-scrolling: touch;
      }
      .fs-dashboard-grid > * {
        grid-column: unset !important; grid-row: unset !important;
        min-height: 168px !important; height: 168px !important; flex-shrink: 0 !important;
      }
      .fs-widget-tall { height: 238px !important; min-height: 238px !important; }

      /* ─── Focus / Session ──────────────────────────── */
      .fs-focus-screen-head { padding: 22px 16px 0 !important; }
      .fs-focus-screen-head-inner { flex-direction: column !important; align-items: flex-start !important; gap: 10px !important; margin-bottom: 14px !important; }
      .fs-focus-screen-title { font-size: 30px !important; letter-spacing: -0.04em !important; }
      .fs-focus-screen-desc { display: block !important; font-size: 13px !important; margin-top: 4px !important; max-width: 100% !important; }
      .fs-focus-screen-badges { gap: 6px !important; align-self: flex-start !important; }
      .fs-focus-screen-content { padding: 10px 12px 94px !important; }
      /* Focus tabs */
      .fs-focus-tabs { gap: 6px !important; padding: 3px !important; border-radius: 20px !important; }
      .fs-focus-tab-btn { padding: 14px 10px !important; border-radius: 17px !important; min-height: 64px !important; }
      /* FocusHomeTab grid → single column on mobile */
      .fs-fht-root { padding: 14px 14px 94px !important; }
      .fs-fht-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
      .fs-fht-cta { min-height: auto !important; padding: 22px 20px 20px !important; border-radius: 24px !important; }
      .fs-fht-cta-title { font-size: 26px !important; line-height: 1.1 !important; }
      .fs-fht-cta-desc { display: none !important; }
      .fs-fht-start-btn { width: 100% !important; justify-content: center !important; align-self: stretch !important; padding: 15px 20px !important; border-radius: 14px !important; font-size: 14px !important; margin-top: 16px !important; }
      .fs-fht-stats { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; }
      .fs-fht-stat-card { padding: 14px 10px !important; border-radius: 16px !important; text-align: center !important; }
      .fs-fht-stat-card > div:first-child { font-size: 20px !important; }
      .fs-fht-history { margin-top: 12px !important; border-radius: 20px !important; }

      /* ─── Évolution ───────────────────────────────── */
      .fs-evo-head { padding: 20px 16px 0 !important; }
      .fs-evo-head-inner { flex-direction: column !important; gap: 10px !important; margin-bottom: 14px !important; align-items: flex-start !important; }
      .fs-evo-title { font-size: 28px !important; }
      .fs-evo-desc { display: none !important; }
      .fs-evo-badges { align-self: flex-start !important; }
      .fs-evo-tabs { display: flex !important; overflow-x: auto !important; gap: 6px !important; padding: 4px !important; scrollbar-width: none !important; -webkit-overflow-scrolling: touch; border-radius: 20px !important; }
      .fs-evo-tabs::-webkit-scrollbar { display: none !important; }
      .fs-evo-tab-btn { flex: 0 0 auto !important; min-width: 100px !important; padding: 11px 13px !important; border-radius: 16px !important; }
      .fs-evo-content { padding: 10px 12px 94px !important; }
      .fs-evo-stats-grid { grid-template-columns: repeat(2,1fr) !important; gap: 8px !important; margin-bottom: 10px !important; }
      .fs-evo-content-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
      .fs-prog-body { padding: 16px 14px 94px !important; }
      .fs-prog-stats { grid-template-columns: repeat(3,1fr) !important; gap: 8px !important; }
      .fs-heatmap-wrap { overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; }

      /* ─── Note edit modal → bottom sheet ─────────── */
      .fs-note-edit-overlay { padding: 0 !important; align-items: flex-end !important; }
      .fs-note-edit-dialog {
        border-radius: 28px 28px 0 0 !important;
        height: 92dvh !important; max-height: 92dvh !important;
        border-left: none !important; border-right: none !important; border-bottom: none !important;
        box-shadow: 0 -20px 60px rgba(0,0,0,0.52), inset 0 1px 0 rgba(255,255,255,0.06) !important;
      }
      .fs-note-edit-head { padding: 16px 20px 12px !important; }
      .fs-note-edit-head-meta { flex-wrap: wrap !important; gap: 6px !important; }
      .fs-note-edit-head-meta input { flex: 1 1 100px !important; }
      .fs-note-edit-head-actions { flex-shrink: 0 !important; }
      .fs-note-edit-title { font-size: 25px !important; }
      .fs-note-edit-body { padding: 14px 20px 20px !important; }

      /* ─── Mind map: FAB nouvelle note ─────────────── */
      .fs-map-mobile-fab { display: flex !important; }
    }

    @media (max-width: 480px) {
      .fs-dashboard-header { padding: 12px 12px 0 !important; }
      .fs-dashboard-grid { padding: 8px 10px 94px !important; gap: 8px !important; }
      .fs-note-edit-dialog { height: 96dvh !important; max-height: 96dvh !important; }
      .fs-focus-screen-title { font-size: 24px !important; }
    }

    /* Safe area — notch / home indicator */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      @media (max-width: 768px) {
        .fs-mobile-nav {
          padding-bottom: calc(8px + env(safe-area-inset-bottom)) !important;
          height: calc(76px + env(safe-area-inset-bottom)) !important;
        }
        .fs-dashboard-grid,
        .fs-task-list,
        .fs-notes-list,
        .fs-notes-body {
          padding-bottom: calc(94px + env(safe-area-inset-bottom)) !important;
        }
        .fs-note-edit-dialog {
          padding-bottom: env(safe-area-inset-bottom) !important;
        }
        .fs-map-mobile-fab {
          bottom: calc(88px + env(safe-area-inset-bottom)) !important;
        }
      }
    }

    /* ─── FAB base (hidden desktop, shown mobile) ────── */
    .fs-map-mobile-fab {
      display: none;
      position: absolute;
      bottom: 90px; left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      height: 50px; padding: 0 22px;
      border-radius: 25px; border: none;
      background: linear-gradient(135deg, var(--theme-c1), var(--theme-c2));
      color: #07070d; font-size: 13px; font-weight: 900;
      font-family: var(--font-body); letter-spacing: -0.01em;
      cursor: pointer; white-space: nowrap;
      align-items: center; gap: 8px;
      box-shadow: 0 14px 38px rgba(var(--theme-c1-rgb), 0.34), 0 4px 10px rgba(0,0,0,0.28);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Mobile bottom navigation bar */
    .fs-mobile-nav {
      display: none;
      position: fixed;
      bottom: 10px; left: 12px; right: 12px;
      height: 66px;
      z-index: 200;
      background: rgba(9,10,22,0.92);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      align-items: center;
      justify-content: space-between;
      padding: 7px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.44), inset 0 1px 0 rgba(255,255,255,0.07);
      overflow: hidden;
      transform: translateZ(0);
    }
    .fs-mobile-nav-btn {
      position: relative;
      flex: 1 1 0;
      min-width: 0;
      height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 4px;
      background: none;
      border: none;
      color: rgba(206,214,231,0.56);
      cursor: pointer;
      border-radius: 18px;
      font-family: var(--font-body);
      transition: color 0.18s ease, background 0.18s ease, transform 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .fs-mobile-nav-btn:active { transform: scale(0.96); }
    .fs-mobile-nav-btn::before {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(var(--theme-c1-rgb),0.18), rgba(var(--theme-c2-rgb),0.12));
      opacity: 0;
      transition: opacity 0.18s ease;
    }
    .fs-mobile-nav-btn svg {
      position: relative;
      z-index: 1;
      width: 21px; height: 21px;
      stroke: currentColor; fill: none;
      stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round;
      transition: transform 0.18s ease, stroke 0.18s ease;
    }
    .fs-mobile-nav-btn.active {
      color: rgba(248,246,252,0.98);
      background: rgba(255,255,255,0.055);
    }
    .fs-mobile-nav-btn.active::before { opacity: 1; }
    .fs-mobile-nav-btn.active::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 18px;
      height: 3px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--theme-c1), var(--theme-c2));
      transform: translateX(-50%);
    }
    .fs-mobile-nav-btn.active svg {
      transform: translateY(-1px);
    }
    .fs-mobile-nav-label {
      position: relative;
      z-index: 1;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 10px;
      line-height: 1;
      font-weight: 750;
      white-space: nowrap;
    }
    html.fs-perf-lite .fs-mobile-nav {
      box-shadow: 0 10px 28px rgba(0,0,0,0.36);
    }
    html.fs-perf-lite .fs-mobile-nav-btn::before {
      display: none;
    }

    @keyframes handleIn {
      from {
        transform: scale(0.4);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes selRingIn {
      from {
        opacity: 0;
        transform: scale(0.97);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes dragHandlePulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
      }

      50% {
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0);
      }
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ── Toast system ───────────────────────────────────────────── */
    @keyframes toastIn {
      from { transform: translateY(18px) scale(0.96); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes toastOut {
      from { transform: translateY(0) scale(1); opacity: 1; }
      to   { transform: translateY(12px) scale(0.96); opacity: 0; }
    }
    @keyframes toastProgress {
      from { width: 100%; }
      to   { width: 0%; }
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.85);
      }
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
    }

    input,
    button,
    select,
    textarea {
      font-family: inherit;
    }

    input::placeholder {
      color: rgba(248, 246, 252, 0.22);
    }

    /* ── Crystallization Reveal ─────────────────────────────────────── */
    .cr-overlay {
      position: fixed;
      inset: 0;

  <script>
    /* ── Supabase client + full sync layer ─────────────────────────────────
       Auth + persistence for ALL user data: tasks, notes, widgets, theme,
       style, images, sessions.  Local-first with real-time cross-device sync
       via Supabase Realtime (postgres_changes).                               */
    const SUPABASE_URL = 'https://qlukumjqgagrukbavtvg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsdWt1bWpxZ2FncnVrYmF2dHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTk5NTEsImV4cCI6MjA5Mjc5NTk1MX0.fOgW1587adYgOUb2n3_0E-8XOYgOJNOI9b3bJ3VJRLs';

    const _fsSb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, storageKey: 'fs_sb_session' }
    });
    window._fsSb = _fsSb;
    window._fsSbUser = null;
    window._fsRealtimeChannel = null;
    window._fsSessionChannel = null;

    /* All localStorage keys that trigger a sync push */
    const SYNC_KEYS = ['fs_tasks', 'fs_notes', 'fs_widgets', 'fs_onboarded',
                       'fs_bgtheme', 'fs_custom_bg', 'fs_widget_style', 'fs_note_map_style'];
    const FS_SYNC_LOCAL_WRITE_KEY = 'fs_sync_local_write_at';
    const FS_SYNC_REMOTE_APPLIED_KEY = 'fs_sync_remote_applied_at';

    /* Raw setItem/removeItem that bypass our sync patch */
    const _fsOrigSetItem = Storage.prototype.setItem;
    const _fsOrigRemoveItem = Storage.prototype.removeItem;
    function _fsRawSet(k, v) { _fsOrigSetItem.call(localStorage, k, v); }
    function _fsRawRemove(k) { _fsOrigRemoveItem.call(localStorage, k); }

    /* Flag to prevent push-back loops when seeding from remote */
    let _fsIgnorePush = false;

    function _fsIsoMs(v) {
      const ms = Date.parse(v || '');
      return Number.isFinite(ms) ? ms : 0;
    }

    function _fsSameLocalUser(userId) {
      try {
        const u = JSON.parse(localStorage.getItem('fs_user') || 'null');
        return !!(userId && u && u.id === userId);
      } catch (_) { return false; }

    function _fsUserScopedSyncKey(key, userId = window._fsSbUser?.id) {
      return !!(userId && (
        key === `fs_gamif_${userId}` ||
        key === `fs_friends_${userId}` ||
        key === `fs_crystals_${userId}` ||
        key === `fs_session_history_${userId}`
      ));
    }

    function _fsShouldSyncKey(key) {
      return SYNC_KEYS.includes(key) || key.startsWith('fs_img_') || _fsUserScopedSyncKey(key);
    }

    function _fsMarkLocalWrite() {
      try { _fsRawSet(FS_SYNC_LOCAL_WRITE_KEY, new Date().toISOString()); } catch (_) { }
    }

    function _fsLocalLooksNewer(userId, remote) {
      if (!_fsSameLocalUser(userId)) return false;
      const localMs = _fsIsoMs(localStorage.getItem(FS_SYNC_LOCAL_WRITE_KEY));
      const remoteMs = _fsIsoMs(remote?.updated_at);
      return localMs > 0 && (!remoteMs || localMs > remoteMs + 1500);
    }

    async function _fsLoadRemote(userId) {
      try {
        const { data, error } = await _fsSb
          .from('user_data')
          .select('tasks, notes, widgets, name, onboarded, bg_theme, custom_bg, widget_style, images, email, friends, gamification, updated_at')
          .eq('user_id', userId)
          .maybeSingle();
        if (error) { console.warn('[fs] load remote failed', error); return null; }
        return data;
      } catch (e) { console.warn('[fs] load remote threw', e); return null; }
    }
    window._fsLoadRemote = _fsLoadRemote;

    /* Replace local cache with remote payload */
    function _fsSeedLocalFromRemote(remote, userId = remote?.user_id || window._fsSbUser?.id) {
      _fsIgnorePush = true;

      if (remote && remote.tasks != null) _fsRawSet('fs_tasks', JSON.stringify(remote.tasks));
      else _fsRawRemove('fs_tasks');
      if (remote && remote.notes != null) _fsRawSet('fs_notes', String(remote.notes));
      else _fsRawRemove('fs_notes');
      if (remote && remote.widgets != null) _fsRawSet('fs_widgets', JSON.stringify(remote.widgets));
      else _fsRawRemove('fs_widgets');
      if (remote && remote.onboarded) _fsRawSet('fs_onboarded', '1');
      else _fsRawRemove('fs_onboarded');

      /* Theme & style */
      if (remote && remote.bg_theme != null) _fsRawSet('fs_bgtheme', remote.bg_theme);
      else _fsRawRemove('fs_bgtheme');
      if (remote && remote.custom_bg != null) _fsRawSet('fs_custom_bg', JSON.stringify(remote.custom_bg));
      else _fsRawRemove('fs_custom_bg');
      if (remote && remote.widget_style != null) {
        _fsRawSet('fs_widget_style', JSON.stringify(remote.widget_style));
        if (remote.widget_style.noteMapStyle) {
          _fsRawSet('fs_note_map_style', remote.widget_style.noteMapStyle);
          window._fsCurrentMapStyle = remote.widget_style.noteMapStyle;
          window.dispatchEvent(new CustomEvent('fs-note-map-style'));
        }
      } else {
        _fsRawRemove('fs_widget_style');
      }

      /* Images – clear old keys then restore from remote */
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.startsWith('fs_img_')) _fsRawRemove(k);
      }
      if (remote && remote.images && typeof remote.images === 'object' && Object.keys(remote.images).length > 0) {
        Object.entries(remote.images).forEach(([k, v]) => {
          if (k && k.startsWith('fs_img_') && typeof v === 'string' && v) _fsRawSet(k, v);
        });
      }

      if (userId) {
        if (remote && remote.gamification != null) {
          _fsRawSet(`fs_gamif_${userId}`, JSON.stringify(remote.gamification));
          window.dispatchEvent(new CustomEvent('fs-gamif-update', { detail: remote.gamification }));
        } else {
          _fsRawRemove(`fs_gamif_${userId}`);
          window.dispatchEvent(new CustomEvent('fs-gamif-update', { detail: null }));
        }
        if (remote && Array.isArray(remote.friends)) {
          _fsRawSet(`fs_friends_${userId}`, JSON.stringify(remote.friends));
        }
      }

      if (remote?.updated_at) _fsRawSet(FS_SYNC_REMOTE_APPLIED_KEY, remote.updated_at);

      setTimeout(() => { _fsIgnorePush = false; }, 2000);
    }
    window._fsSeedLocalFromRemote = _fsSeedLocalFromRemote;

    async function _fsReconcileRemote(userId, remote) {
      if (!userId) return { source: 'none', remote };
      if (!remote && _fsSameLocalUser(userId)) {
        await _fsFlushPush();
        return { source: 'local', remote };
      }
      if (_fsLocalLooksNewer(userId, remote)) {
        await _fsFlushPush();
        return { source: 'local', remote };
      }
      _fsSeedLocalFromRemote(remote, userId);
      return { source: 'remote', remote };
    }
    window._fsReconcileRemote = _fsReconcileRemote;

    function _fsSnapshotLocalData(userId = window._fsSbUser?.id) {
      const r = {};
      try { const v = localStorage.getItem('fs_tasks'); if (v != null) r.tasks = JSON.parse(v); } catch (_) { }
      try { const v = localStorage.getItem('fs_notes'); if (v != null) r.notes = v; } catch (_) { }
      try { const v = localStorage.getItem('fs_widgets'); if (v != null) r.widgets = JSON.parse(v); } catch (_) { }
      r.onboarded = localStorage.getItem('fs_onboarded') === '1';
      const bg = localStorage.getItem('fs_bgtheme');
      if (bg != null) r.bg_theme = bg;
      try { const v = localStorage.getItem('fs_custom_bg'); if (v != null) r.custom_bg = JSON.parse(v); } catch (_) { }
      try { const v = localStorage.getItem('fs_widget_style'); if (v != null) r.widget_style = JSON.parse(v); } catch (_) { }
      try {
        const v = localStorage.getItem('fs_note_map_style');
        if (v != null) r.widget_style = { ...(r.widget_style || {}), noteMapStyle: v };
      } catch (_) { }
      try { const v = userId ? localStorage.getItem(`fs_gamif_${userId}`) : null; if (v != null) r.gamification = JSON.parse(v); } catch (_) { }
      return r;
    }
    window._fsSnapshotLocalData = _fsSnapshotLocalData;

    /* Debounced upsert of ALL localStorage values into user_data */
    let _fsPushTimer = null;
    async function _fsFlushPush() {
      const u = window._fsSbUser;
      if (!u) return;
      const payload = { user_id: u.id, updated_at: new Date().toISOString() };

      try { const v = localStorage.getItem('fs_tasks');   if (v != null) payload.tasks = JSON.parse(v); } catch (_) { }
      try { const v = localStorage.getItem('fs_notes');   if (v != null) payload.notes = v; } catch (_) { }
      try { const v = localStorage.getItem('fs_widgets'); if (v != null) payload.widgets = JSON.parse(v); } catch (_) { }
      payload.onboarded = localStorage.getItem('fs_onboarded') === '1';

      /* Theme & style */
      const bg = localStorage.getItem('fs_bgtheme');
      if (bg != null) payload.bg_theme = bg;
      try { const v = localStorage.getItem('fs_custom_bg'); if (v != null) payload.custom_bg = JSON.parse(v); } catch (_) { }
      try { const v = localStorage.getItem('fs_widget_style'); if (v != null) payload.widget_style = JSON.parse(v); } catch (_) { }
      try {
        const v = localStorage.getItem('fs_note_map_style');
        if (v != null) payload.widget_style = { ...(payload.widget_style || {}), noteMapStyle: v };
      } catch (_) { }
      try { const v = localStorage.getItem(`fs_gamif_${u.id}`); if (v != null) payload.gamification = JSON.parse(v); } catch (_) { }
      try { const v = localStorage.getItem(`fs_friends_${u.id}`); if (v != null) payload.friends = JSON.parse(v); } catch (_) { }

      /* Images – aggregate all fs_img_* keys */
      const images = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('fs_img_')) images[k] = localStorage.getItem(k);
      }
      if (Object.keys(images).length > 0) payload.images = images;

      const { error } = await _fsSb.from('user_data').upsert(payload, { onConflict: 'user_id' });
      if (error) console.warn('[fs] push failed', error);
    }
    window._fsFlushPush = _fsFlushPush;

    /* Monkey-patch localStorage.setItem — catches all synced keys + image keys */
    function _fsSchedulePushForKey(key) {
      if (!window._fsSbUser || _fsIgnorePush || !_fsShouldSyncKey(key)) return;
      _fsMarkLocalWrite();
      clearTimeout(_fsPushTimer);
      _fsPushTimer = setTimeout(_fsFlushPush, 800);
    }

    Storage.prototype.setItem = function (key, value) {
      _fsOrigSetItem.call(this, key, value);
      if (this === localStorage) _fsSchedulePushForKey(key);
    };

    Storage.prototype.removeItem = function (key) {
      _fsOrigRemoveItem.call(this, key);
      if (this === localStorage) _fsSchedulePushForKey(key);
    };

    /* Flush pending writes when the tab is closing */
    window.addEventListener('beforeunload', () => {
      if (_fsPushTimer) { clearTimeout(_fsPushTimer); _fsFlushPush(); }
    });

    /* ── Realtime: cross-device live sync for user_data ─────────────────── */
    function _fsStartRealtime(userId) {
      _fsStopRealtime();
      const ch = _fsSb.channel('user-data-sync')
        .on('postgres_changes', {
          event: '*', schema: 'public', table: 'user_data',
          filter: 'user_id=eq.' + userId
        }, payload => {
          if (_fsIgnorePush) return;
          _fsSeedLocalFromRemote(payload.new, userId);
          window.dispatchEvent(new CustomEvent('fs-remote-update', { detail: payload.new }));
        })
        .subscribe();
      window._fsRealtimeChannel = ch;
    }
    function _fsStopRealtime() {
      if (window._fsRealtimeChannel) {
        _fsSb.removeChannel(window._fsRealtimeChannel);
        window._fsRealtimeChannel = null;
      }
    }
    window._fsStartRealtime = _fsStartRealtime;
    window._fsStopRealtime = _fsStopRealtime;

    /* ── Realtime: session invites for Together mode ────────────────────── */
    function _fsStartSessionRealtime(userId) {
      _fsStopSessionRealtime();
      const ch = _fsSb.channel('session-sync')
        .on('postgres_changes', {
          event: '*', schema: 'public', table: 'sessions',
          filter: 'friend_id=eq.' + userId
        }, payload => {
          if (payload.eventType === 'INSERT' && payload.new.active) {
            window.dispatchEvent(new CustomEvent('fs-session-invite', { detail: payload.new }));
          }
          if (payload.eventType === 'UPDATE' && !payload.new.active) {
            window.dispatchEvent(new CustomEvent('fs-session-end', { detail: payload.new }));
          }
        })
        .subscribe();
      window._fsSessionChannel = ch;
    }
    function _fsStopSessionRealtime() {
      if (window._fsSessionChannel) {
        _fsSb.removeChannel(window._fsSessionChannel);
        window._fsSessionChannel = null;
      }
    }
    window._fsStartSessionRealtime = _fsStartSessionRealtime;
    window._fsStopSessionRealtime = _fsStopSessionRealtime;

    /* ── Helper: look up a FlowSpace user by email ─────────────────────── */
    async function _fsLookupUserByEmail(email) {
      try {
        const trimmed = email.trim().toLowerCase();
        const { data, error } = await _fsSb
          .from('user_data')
          .select('user_id, name, email, updated_at')
          .ilike('email', trimmed)
          .maybeSingle();
        if (error) { console.warn('[fs] email lookup error:', error); return null; }
        if (!data) { console.warn('[fs] no user found for email:', trimmed); return null; }
        return { id: data.user_id, name: data.name || trimmed.split('@')[0], email: data.email,
                 initial: (data.name || '?')[0].toUpperCase(),
                 color: '#4ade80', updatedAt: data.updated_at };
      } catch (e) { console.warn('[fs] email lookup threw:', e); return null; }
    }
    window._fsLookupUserByEmail = _fsLookupUserByEmail;
  </script>

    function FocusHomeTab({ user, sessions = [], onStart }) {

        { label:'Temps focus', value:Math.round(total), unit:'min' },

                  <div style={{fontFamily:T.mono,fontSize:24,fontWeight:850,color:T.text,letterSpacing:'-0.035em',lineHeight:1}}>{s.value}</div>

              <span style={{fontSize:10,fontWeight:850,letterSpacing:'0.12em',textTransform:'uppercase',color:T.c1,flexShrink:0}}>{sessions.length} total</span>

                : null}

          </div>
        </div>

    }

    function FocusScreen({ user, sessions, onStart, initialTab = 'focus' }) {
      const [tab, setTab] = React.useState(initialTab);
      React.useEffect(() => setTab(initialTab), [initialTab]);
      const crystalKey = user?.id ? `fs_crystals_${user.id}` : 'fs_crystals';
      const [crystalCount, setCrystalCount] = React.useState(0);
      React.useEffect(() => {
        const sync = () => {
          try { setCrystalCount(JSON.parse(localStorage.getItem(crystalKey)||'[]').length); } catch(e) { setCrystalCount(0); }
        };
        sync();
        window.addEventListener('fs-crystal-update', sync);
        return () => window.removeEventListener('fs-crystal-update', sync);
      }, [crystalKey]);
      const total = sessions.reduce((sum,s)=>sum + (Number(s.actualMinutes || s.duration) || 0), 0);
      const TABS = [
        { id:'focus', label:'Focus', meta:'Démarrer' },
        { id:'cristaux', label:'Mes cristaux', meta:crystalCount > 0 ? `${crystalCount} gemme${crystalCount>1?'s':''}` : 'Grotte vide' },
      ];

              {TABS.map(t => {
                const active = tab === t.id;
                return (
                  <button key={t.id} onClick={() => setTab(t.id)} className={"fs-focus-tab-btn"+(active?" active":"")} style={{
                    minWidth:0,borderRadius:20,padding:'14px 16px',cursor:'pointer',
                    background:active?'linear-gradient(180deg,rgba(var(--theme-c1-rgb),0.20),rgba(255,255,255,0.07))':'transparent',
                    color:active?T.text:T.muted,
                    boxShadow:active?'0 14px 30px rgba(var(--theme-c1-rgb),0.14), inset 0 1px 0 rgba(255,255,255,0.10)':'none',
                    border:`1px solid ${active?'rgba(var(--theme-c1-rgb),0.22)':'transparent'}`,
                    fontFamily:T.font,textAlign:'left',transition:'all 0.22s cubic-bezier(0.34,1.56,0.64,1)'
                  }}>
                    <div style={{fontSize:13,fontWeight:850,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.label}</div>
                    <div style={{fontSize:10,color:active?'rgba(248,246,252,0.52)':T.muted,marginTop:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.meta}</div>
                  </button>
                );
              })}
            </div>
          </div>
          <div className="fs-focus-screen-content" style={{flex:1,overflow:'hidden',padding:'20px 36px 36px'}}>
            <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',borderRadius:28,background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.06)',boxShadow:'inset 0 1px 0 rgba(255,255,255,0.035)'}}>
              {tab === 'focus' && <FocusHomeTab user={user} sessions={sessions} onStart={onStart} />}
              {tab === 'cristaux' && window.MesCristauxPanel && React.createElement(window.MesCristauxPanel, { open:true, user, embedded:true })}
            </div>
          </div>
        </div>
      );
    }
    window.FocusScreen = FocusScreen;
  </script>

  <script type="text/babel">

        linear-gradient(180deg, rgba(255,255,255,0.065), rgba(255,255,255,0.03));
      color: rgba(248,246,252,0.92);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.075), 0 12px 26px rgba(var(--theme-c1-rgb),0.08);

    .fs-account-install:hover {
      transform: translateY(-1px);
      border-color: rgba(var(--theme-c1-rgb),0.36);

    .fs-account-secondary {
      width: 46px;
      grid-column: 2;
      grid-row: 1 / span 2;
      height: auto;
      color: rgba(248,246,252,0.62);
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .fs-account-secondary:hover {
      color: #fb7185;
      background: rgba(251,113,133,0.12);
      box-shadow: 0 12px 24px rgba(251,113,133,0.12);

    @media (max-width: 768px) {
      .fs-account-actions {
        grid-template-columns: 1fr;
        gap: 9px;
      }
      .fs-account-install,
      .fs-account-secondary {
        grid-column: 1;
        grid-row: auto;
        width: 100%;
        height: 44px;
      }
      .fs-account-secondary {
        color: rgba(248,246,252,0.76);
      }
    }
  `;
      document.head.appendChild(s);
    }

    function Sidebar({ screen, onNavigate, user, onLogout, onUserUpdate }) {
      const { addToast } = window.useToast ? window.useToast() : { addToast: () => {} };
      const [popOpen, setPopOpen] = React.useState(false);
      const [accountOpen, setAccountOpen] = React.useState(false);
      const [friendsOpen, setFriendsOpen] = React.useState(false);
      const [cristauxOpen, setCristauxOpen] = React.useState(false);
      const [focusMenuOpen, setFocusMenuOpen] = React.useState(false);
      const [evolutionMenuOpen, setEvolutionMenuOpen] = React.useState(false);

      const [installPrompt, setInstallPrompt] = React.useState(null);
      const [isInstalled, setIsInstalled] = React.useState(
        window.matchMedia('(display-mode: standalone)').matches
      );
      const [installTooltip, setInstallTooltip] = React.useState(false);
      const [installDismissed, setInstallDismissed] = React.useState(
        () => localStorage.getItem('fs_install_dismissed') === '1'
      );

      React.useEffect(() => {
        const handler = (e) => { e.preventDefault(); setInstallPrompt(e); };
        window.addEventListener('beforeinstallprompt', handler);
        const mq = window.matchMedia('(display-mode: standalone)');
        const mqHandler = (e) => setIsInstalled(e.matches);
        mq.addEventListener('change', mqHandler);
        return () => {
          window.removeEventListener('beforeinstallprompt', handler);
          mq.removeEventListener('change', mqHandler);
        };
      }, []);

      const handleInstall = async () => {
        if (installPrompt) {
          installPrompt.prompt();
          const { outcome } = await installPrompt.userChoice;
          if (outcome === 'accepted') { setInstallPrompt(null); setIsInstalled(true); }
        } else {
          setInstallTooltip(t => !t);
          addToast({
            message: "Ouvre les paramètres de ton navigateur pour installer LumenOS.",
            type: 'info',
            icon: '+',
            duration: 5200
          });
        }
      };

      const dismissInstallCard = e => {
        e?.stopPropagation?.();
        try { localStorage.setItem('fs_install_dismissed', '1'); } catch(e) {}
        setInstallDismissed(true);
        addToast({
          message: "Si vous changez d'avis, vous pourrez l'installer via les paramètres.",
          type: 'info',
          icon: 'i',
          duration: 5600
        });
      };

      const closeAllPanels = () => {
        setFriendsOpen(false);
        setCristauxOpen(false);
        setAccountOpen(false);
        setFocusMenuOpen(false);
        setEvolutionMenuOpen(false);
      };
      const [popPos, setPopPos] = React.useState({ bottom: 0, left: 0, width: 0 });
      const [accountPos, setAccountPos] = React.useState({ top: 28, left: 136 });
      const cardRef = React.useRef(null);
      const gearRef = React.useRef(null);
      const accountRef = React.useRef(null);
      const fileRef = React.useRef(null);
      const friendsOpenedAtRef = React.useRef(0);
      const sidebarActionRef = React.useRef({ key: '', at: 0 });
      const [friends, setFriendsCount] = React.useState(0);
      const [crystalCount, setCrystalCount] = React.useState(0);
      const [activeTaskCount, setActiveTaskCount] = React.useState(0);
      const displayName = user?.name || 'LumenOS';
      const displayEmail = user?.email || 'Crystal Productivity Focus';
      const userInitial = (displayName || displayEmail || 'F')[0].toUpperCase();
      const profilePhoto = user?.photo || user?.avatar || null;

      React.useEffect(() => {
        const key = user?.id ? `fs_friends_${user.id}` : 'fs_friends';
        const sync = () => {
          try { setFriendsCount(JSON.parse(localStorage.getItem(key)||'[]').length); } catch(e) {}
        };
        sync();
        window.addEventListener('storage', sync);
        const id = setInterval(sync, 1200);
        return () => { window.removeEventListener('storage', sync); clearInterval(id); };
      }, [user?.id]);

      React.useEffect(() => {
        const key = user?.id ? `fs_crystals_${user.id}` : 'fs_crystals';
        const sync = () => {
          try { setCrystalCount(JSON.parse(localStorage.getItem(key)||'[]').length); } catch(e) {}
        };
        sync();
        window.addEventListener('fs-crystal-update', sync);
        return () => window.removeEventListener('fs-crystal-update', sync);
      }, [user?.id]);

      React.useEffect(() => {
        const sync = () => {
          try {
            const tasks = JSON.parse(localStorage.getItem('fs_tasks') || '[]');
            setActiveTaskCount(Array.isArray(tasks) ? tasks.filter(t => !t?.done).length : 0);
          } catch(e) { setActiveTaskCount(0); }
        };
        sync();
        window.addEventListener('storage', sync);
        window.addEventListener('fs-remote-update', sync);
        const id = setInterval(sync, 1200);
        return () => {
          window.removeEventListener('storage', sync);
          window.removeEventListener('fs-remote-update', sync);
          clearInterval(id);
        };
      }, []);

      React.useEffect(() => {
        if (!popOpen) return;
        if (cardRef.current) {
          const r = cardRef.current.getBoundingClientRect();
          setPopPos({ bottom: window.innerHeight - r.top + 10, left: r.left, width: r.width });
        }
        const close = e => { if (cardRef.current && !cardRef.current.contains(e.target)) setPopOpen(false); };
        document.addEventListener('mousedown', close);
        return () => document.removeEventListener('mousedown', close);
      }, [popOpen]);

      React.useEffect(() => {
        if (!accountOpen) return;
        const place = () => {
          if (!gearRef.current) return;
          const r = gearRef.current.getBoundingClientRect();
          const panelW = 372;
          const left = Math.min(r.right + 14, window.innerWidth - panelW - 20);
          setAccountPos({ top: Math.max(20, r.top - 8), left: Math.max(20, left) });
        };
        place();
        const close = e => {
          const inGear = gearRef.current && gearRef.current.contains(e.target);
          const inPanel = accountRef.current && accountRef.current.contains(e.target);
          if (!inGear && !inPanel) setAccountOpen(false);
        };
        window.addEventListener('resize', place);
        document.addEventListener('mousedown', close);
        return () => {
          window.removeEventListener('resize', place);
          document.removeEventListener('mousedown', close);
        };
      }, [accountOpen]);

      const renderAvatar = className => (
        <div className={className}>
          {profilePhoto ? <img src={profilePhoto} alt={displayName} /> : userInitial}
        </div>
      );

      const updateProfilePhoto = dataUrl => {
        const nextUser = { ...(user || {}), name: displayName, email: displayEmail, photo: dataUrl };
        try { localStorage.setItem('fs_user', JSON.stringify(nextUser)); } catch (e) { }
        onUserUpdate && onUserUpdate(nextUser);
      };

      const handlePhotoFile = e => {
        const file = e.target.files && e.target.files[0];
        e.target.value = '';
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = () => {
          if (typeof reader.result !== 'string') return;
          const img = new Image();
          img.onload = () => {
            const max = 512;
            const scale = Math.min(1, max / Math.max(img.width, img.height));
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(img.width * scale));
            canvas.height = Math.max(1, Math.round(img.height * scale));
            const ctx = canvas.getContext('2d');
            if (!ctx) { updateProfilePhoto(reader.result); return; }
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            updateProfilePhoto(canvas.toDataURL('image/jpeg', 0.86));
          };
          img.onerror = () => updateProfilePhoto(reader.result);
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      };

      const openPersonalization = () => {
        setAccountOpen(false);
        setPopOpen(false);
        closeAllPanels();
        onNavigate('perso');
      };
      const runSidebarAction = (key, e, fn) => {
        e?.preventDefault?.();
        e?.stopPropagation?.();
        const now = Date.now();
        const prev = sidebarActionRef.current;
        if (prev.key === key && now - prev.at < 420) return;
        sidebarActionRef.current = { key, at: now };
        fn();
      };
      const openFriendsPanel = e => {
        runSidebarAction('friends', e, () => {
          if (friendsOpen) return;
          closeAllPanels();
          setPopOpen(false);
          friendsOpenedAtRef.current = Date.now();
          setFriendsOpen(true);
        });
      };
      const closeFriendsPanel = () => {
        if (Date.now() - friendsOpenedAtRef.current < 700) return;
        setFriendsOpen(false);
      };
      const openAccountPanel = e => {
        runSidebarAction('account', e, () => {
          if (accountOpen) return;
          closeAllPanels();
          setPopOpen(false);
          setAccountOpen(true);
        });
      };
      const openFocusMenu = e => {
        runSidebarAction('focus-menu', e, () => {
          closeAllPanels();
          setPopOpen(false);
          setFocusMenuOpen(true);
        });
      };
      const openEvolutionMenu = e => {
        runSidebarAction('evolution-menu', e, () => {
          closeAllPanels();
          setPopOpen(false);
          setEvolutionMenuOpen(true);
        });
      };
      const openUserPopover = e => {
        runSidebarAction('user-popover', e, () => {
          if (popOpen) return;
          closeAllPanels();
          setPopOpen(true);
        });
      };
      const goEvolutionTab = tab => {
        try { localStorage.setItem('fs_evolution_initial_tab', tab); } catch(e) {}
        closeAllPanels();
        setPopOpen(false);
        onNavigate(tab === 'progression' ? 'progression' : 'evolution');
      };
      const currentEvolutionTab = (() => {
        try { return localStorage.getItem('fs_evolution_initial_tab') || 'streaks'; } catch(e) { return 'overview'; }
      })();

      const NAV = [
        {
          target: 'dashboard', label: 'Tableau de bord', meta: 'Vue principale',
          icon: <svg className="fs-icon" viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5" /><path d="M5 10.5V20h14v-9.5" /></svg>,
        },
        {
          target: 'tasks', label: 'Tâches', meta: activeTaskCount > 0 ? `${activeTaskCount} en cours` : 'Aucune en cours',
          icon: <svg className="fs-icon" viewBox="0 0 24 24"><path d="M8 6h13" /><path d="M8 12h13" /><path d="M8 18h13" /><path d="M3.5 6h.01" /><path d="M3.5 12h.01" /><path d="M3.5 18h.01" /></svg>,
        },
        {
          target: 'notes', label: 'Notes', meta: 'Markdown & idées',
          icon: <svg className="fs-icon" viewBox="0 0 24 24"><path d="M5 4h10l4 4v12H5V4Z" /><path d="M15 4v5h5" /><path d="M8 13h8" /><path d="M8 17h5" /></svg>,
        },
        {
          target: 'session', label: 'Focus', meta: 'Sessions & cristaux',
          icon: <svg className="fs-icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>,
        },
        {
          target: 'perso', label: 'Personnalisation', meta: 'Préférences',
          icon: <svg className="fs-icon" viewBox="0 0 24 24"><path d="M4 19.5V8" /><path d="M10 19.5V4" /><path d="M16 19.5v-8" /><path d="M22 19.5v-12" /></svg>,
        },
      ];
      const navByTarget = target => NAV.find(item => item.target === target);
      const renderNavButton = (item, key = item?.target) => item && (
        <button key={key}
          className={'fs-nav-item' + (screen === item.target ? ' active' : '')}
          onClick={() => { closeAllPanels(); setPopOpen(false); onNavigate(item.target); }}>
          <span className="fs-icon-wrap">{item.icon}</span>
          <span className="fs-label-wrap">
            <span className="fs-label">{item.label}</span>
            <span className="fs-meta">{item.meta}</span>
          </span>
        </button>
      );

      return (
        <>
          <aside className="fs-sidebar">
            <div>
              <div className="fs-brand">
                <div className="fs-brand-mark">
                  <img src="logo.png" alt="LumenOS" className="fs-brand-logo" style={{ objectFit:'contain' }}/>
                </div>
                <div className="fs-brand-copy">
                  <div className="fs-brand-title">LumenOS</div>
                  <div className="fs-brand-sub">Crystal Productivity </div>
                </div>
                <button ref={gearRef} type="button" className={'fs-gear-dot' + (accountOpen ? ' fs-account-open' : '')}
                  onClick={openAccountPanel}
                  aria-label="Ouvrir le compte">
                  <svg className="fs-gear-icon" viewBox="0 0 24 24">
                    <path d="M12 6.2a5.8 5.8 0 1 0 0 11.6a5.8 5.8 0 0 0 0-11.6Z" />
                    <path d="M12 1.8v2.4M12 19.8v2.4M1.8 12h2.4M19.8 12h2.4M4.5 4.5l1.7 1.7M17.8 17.8l1.7 1.7M4.5 19.5l1.7-1.7M17.8 6.2l1.7-1.7" />
                  </svg>
                </button>
              </div>
              <nav className="fs-nav-group">
                <div className="fs-nav-section fs-nav-section-primary">
                  {renderNavButton(navByTarget('dashboard'))}
                  {renderNavButton(navByTarget('perso'))}
                </div>

                <div className="fs-nav-divider" aria-hidden="true" />

                <div className="fs-nav-section">
                  {renderNavButton(navByTarget('tasks'))}
                  {renderNavButton(navByTarget('notes'))}

                <div className="fs-nav-cluster">
                  <button aria-expanded={focusMenuOpen} className={'fs-nav-item fs-nav-parent' + (['session','cristaux'].includes(screen) ? ' active' : '')}
                    onClick={openFocusMenu}>
                    <span className="fs-icon-wrap">
                      <svg className="fs-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/><path d="M5 3 3 5"/><path d="M19 3l2 2"/></svg>
                    </span>
                    <span className="fs-label-wrap">
                      <span className="fs-label">Focus</span>
                      <span className="fs-meta">Sessions & cristaux</span>
                    </span>
                    <span className={'fs-nav-caret' + (focusMenuOpen ? ' open' : '')}>⌄</span>
                  </button>
                  <div className={'fs-nav-submenu' + (focusMenuOpen ? ' open' : '')}>
                    <div className="fs-nav-submenu-inner">
                      <button className={'fs-nav-subitem' + (screen === 'session' ? ' active' : '')}
                        onClick={() => { closeAllPanels(); setPopOpen(false); onNavigate('session'); }}>Sessions</button>
                      <button className={'fs-nav-subitem' + (screen === 'cristaux' ? ' active' : '')}
                        onClick={() => { closeAllPanels(); setPopOpen(false); onNavigate('cristaux'); }}>Mes cristaux</button>
                    </div>
                  </div>
                </div>

                </div>

                <div className="fs-nav-divider" aria-hidden="true" />

                <div className="fs-nav-section">
                {/* ── Friends nav item ── */}
                <button
                  type="button"
                  className={'fs-nav-item' + (friendsOpen ? ' active' : '')}
                  onPointerDownCapture={e => e.stopPropagation()}
                  onClick={openFriendsPanel}
                  style={{ position: 'relative' }}>
                  <span className="fs-icon-wrap" style={{ position: 'relative' }}>
                    <svg className="fs-icon" viewBox="0 0 24 24">
                      <circle cx="9" cy="7" r="4" />
                      <path d="M2 20c0-4 3.1-7 7-7s7 3 7 7" />
                      <path d="M19 8v6M16 11h6" />
                    </svg>
                    {friends > 0 && (
                      <span style={{ position:'absolute', top:-3, right:-4, minWidth:16, height:16, borderRadius:99, background:'var(--theme-c1)', color:'#07070d', fontSize:9, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center', padding:'0 4px', lineHeight:1, fontFamily:"'DM Sans',sans-serif", boxShadow:'0 0 10px rgba(var(--theme-c1-rgb),0.55)' }}>
                        {friends}
                      </span>
                    )}
                  </span>
                  <span className="fs-label-wrap">
                    <span className="fs-label">Amis</span>
                    <span className="fs-meta">{friends > 0 ? `${friends} connexion${friends>1?'s':''}` : 'Découvrir des gens'}</span>
                  </span>
                </button>


                <div className="fs-nav-cluster">
                  <button aria-expanded={evolutionMenuOpen} className={'fs-nav-item fs-nav-parent' + (['evolution','progression'].includes(screen) ? ' active' : '')}
                    onClick={openEvolutionMenu}>
                    <span className="fs-icon-wrap">
                      <svg className="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 15l3-4 3 2 5-7"/><path d="M17 6h2v2"/>
                      </svg>
                    </span>
                    <span className="fs-label-wrap">
                      <span className="fs-label">Évolution</span>
                      <span className="fs-meta">Quêtes, boutique, progression</span>
                    </span>
                    <span className={'fs-nav-caret' + (evolutionMenuOpen ? ' open' : '')}>⌄</span>
                  </button>
                  <div className={'fs-nav-submenu' + (evolutionMenuOpen ? ' open' : '')}>
                    <div className="fs-nav-submenu-inner">
                      <button className={'fs-nav-subitem' + (screen === 'evolution' && currentEvolutionTab === 'streaks' ? ' active' : '')} onClick={() => goEvolutionTab('streaks')}>Régularité</button>
                      <button className={'fs-nav-subitem' + (screen === 'evolution' && currentEvolutionTab === 'quests' ? ' active' : '')} onClick={() => goEvolutionTab('quests')}>Quêtes</button>
                      <button className={'fs-nav-subitem' + (screen === 'evolution' && currentEvolutionTab === 'store' ? ' active' : '')} onClick={() => goEvolutionTab('store')}>Boutique</button>
                      <button className={'fs-nav-subitem' + (screen === 'progression' ? ' active' : '')} onClick={() => goEvolutionTab('progression')}>Progression</button>
                    </div>
                  </div>

      const remove = (id) => {
        const deleted = tasks.find(t => t.id === id);
