            <div className="fs-tasks-hero" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
              <div>
                <Lbl ch="focus queue" />
                <div style={{ fontFamily: T.display, fontWeight: 800, fontSize: 30, letterSpacing: '-0.04em', lineHeight: 1, marginTop: 8 }}>File de focus</div>
                <div style={{ fontSize: 13, color: T.muted, marginTop: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                    <span style={{ width: 6, height: 6, borderRadius: '50%', background: T.c1, display: 'inline-block', boxShadow: `0 0 6px ${T.c1}` }} />
                    <span style={{ color: T.c1, fontWeight: 600 }}>{totalActive}</span> en cours
                  </span>
                  <span style={{ opacity: 0.25 }}>·</span>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                    <span style={{ width: 6, height: 6, borderRadius: '50%', background: T.green, display: 'inline-block', boxShadow: `0 0 6px ${T.green}` }} />
                    <span style={{ color: T.green, fontWeight: 600 }}>{totalDone}</span> complétées
                  </span>
                </div>
              </div>
              {/* Progress ring */}
              <div className="fs-tasks-progress" style={{ position: 'relative', width: 64, height: 64 }}>
                <svg width={64} height={64} style={{ transform: 'rotate(-90deg)', position: 'absolute', inset: 0 }}>
                  <circle cx={32} cy={32} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={3.5} />
                  <circle cx={32} cy={32} r={r} fill="none" stroke={T.green} strokeWidth={3.5}
                    strokeDasharray={`${filled} ${circ}`} strokeLinecap="round"
                    style={{ filter: `drop-shadow(0 0 6px ${T.green}66)`, transition: 'stroke-dasharray 0.7s cubic-bezier(0.4,0,0.2,1)' }} />
                </svg>
                <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                  <span style={{ fontSize: 15, fontWeight: 800, fontFamily: T.display, letterSpacing: '-0.03em', lineHeight: 1 }}>{Math.round(prog * 100)}</span>
                  <span style={{ fontSize: 9, color: T.muted, fontWeight: 600 }}>%</span>
                </div>
              </div>
            </div>

            {/* ── Add task ── */}
            <div className="fs-task-composer" style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 16 }}>
              <div className="fs-task-input-wrap" style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 10, background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 14, padding: '0 14px', height: 44 }}>
                <svg width={14} height={14} viewBox="0 0 14 14" fill="none" style={{ flexShrink: 0, opacity: 0.3 }}>
                  <path d="M7 1v12M1 7h12" stroke="currentColor" strokeWidth={2} strokeLinecap="round" />
                </svg>
                <input
                  value={inputVal}
                  onChange={e => setInputVal(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addTask()}
                  placeholder="Ajouter une tâche…  (Entrée pour valider)"
                  style={{ flex: 1, background: 'none', border: 'none', outline: 'none', color: T.text, fontSize: 13, fontFamily: T.font }}
                />
              </div>
              {/* Priority dots */}
              <div className="fs-task-priority-row" style={{ display: 'flex', gap: 4 }}>
                {Object.entries(PRI).map(([key, p]) => (
                  <button key={key} onClick={() => setNewPri(key)} title={p.label}
                    style={{ width: 32, height: 32, borderRadius: 10, cursor: 'pointer', border: `1.5px solid ${newPri === key ? p.color : 'rgba(255,255,255,0.08)'}`, background: newPri === key ? p.bg : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s ease' }}>
                    <div style={{ width: 7, height: 7, borderRadius: '50%', background: p.color }} />
                  </button>
                ))}
              </div>
              <button className="fs-task-add-btn" onClick={addTask}
                style={{ height: 44, padding: '0 20px', background: T.c1, border: 'none', borderRadius: 12, color: '#07070d', fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: T.font, boxShadow: `0 0 20px ${c1(0.2)}`, transition: 'all 0.18s ease', flexShrink: 0 }}
                onMouseEnter={e => { e.currentTarget.style.boxShadow = `0 0 32px ${c1(0.333)}`; e.currentTarget.style.transform = 'scale(1.04)'; }}
                onMouseLeave={e => { e.currentTarget.style.boxShadow = `0 0 20px ${c1(0.2)}`; e.currentTarget.style.transform = 'scale(1)'; }}>
                Ajouter
              </button>
            </div>

            {/* ── Filters ── */}
            <div className="fs-task-filters" style={{ display: 'flex', gap: 6, paddingBottom: 18, borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
              {FILTERS.map(f => (
                <button key={f.id} onClick={() => setFilter(f.id)}
                  style={{ background: filter === f.id ? `${c1(0.094)}` : 'transparent', border: `1px solid ${filter === f.id ? `${c1(0.267)}` : 'rgba(255,255,255,0.07)'}`, borderRadius: 999, padding: '6px 14px', cursor: 'pointer', color: filter === f.id ? T.c1 : T.muted, fontSize: 11, fontWeight: 600, fontFamily: T.font, transition: 'all 0.2s', display: 'flex', alignItems: 'center', gap: 7 }}>
                  {f.label}
                  <span style={{ fontSize: 10, padding: '1px 6px', borderRadius: 999, background: filter === f.id ? `${c1(0.133)}` : 'rgba(255,255,255,0.06)', color: filter === f.id ? T.c1 : 'rgba(248,246,252,0.32)' }}>{f.count}</span>
                </button>
              ))}
            </div>
          </div>

          {/* ── Task list ── */}
          <div className="fs-task-list" style={{ flex: 1, overflowY: 'auto', padding: '0 32px 28px' }}>
            {activeTasks.length > 0 && <>
              <SectionHead label="En cours" count={activeTasks.length} />
              <div className="fs-task-section-list" style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                {activeTasks.map(t => <TaskRow key={t.id} task={t} />)}
              </div>
            </>}
            {doneTasks.length > 0 && <>
              {/* ── Done section header with clear-all action ── */}
              <div className="fs-task-done-head" style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '20px 0 10px' }}>
                <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.09em', textTransform: 'uppercase', color: 'rgba(248,246,252,0.28)', whiteSpace: 'nowrap' }}>Complétées</span>
                <span style={{ fontSize: 10, fontWeight: 600, padding: '1px 7px', borderRadius: 999, background: 'rgba(255,255,255,0.06)', color: 'rgba(248,246,252,0.35)' }}>{doneTasks.length}</span>
                <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.05)' }} />
                <button
                  onClick={clearDone}
                  onMouseEnter={() => setHovClear(true)}
                  onMouseLeave={() => setHovClear(false)}
                  aria-label="Effacer toutes les tâches complétées"
                  style={{
                    display: 'flex', alignItems: 'center', gap: 5,
                    background: hovClear ? 'rgba(251,113,133,0.10)' : 'transparent',
                    border: `1px solid ${hovClear ? 'rgba(251,113,133,0.28)' : 'rgba(255,255,255,0.07)'}`,
                    borderRadius: 99, padding: '4px 11px 4px 9px',
                    color: hovClear ? '#fb7185' : 'rgba(248,246,252,0.28)',
                    fontSize: 10, fontWeight: 600, cursor: 'pointer',
                    fontFamily: T.font, letterSpacing: '0.02em',
                    transition: 'all 0.22s cubic-bezier(0.34,1.56,0.64,1)',
                    transform: hovClear ? 'scale(1.06)' : 'scale(1)',
                    flexShrink: 0, outline: 'none',
                    boxShadow: hovClear ? '0 4px 16px rgba(251,113,133,0.16)' : 'none',
                  }}>
                  <svg width={10} height={10} viewBox="0 0 12 12" fill="none"
                    style={{ transform: hovClear ? 'rotate(-12deg)' : 'rotate(0deg)', transition: 'transform 0.25s ease', flexShrink: 0 }}>
                    <path d="M2 3h8M5 1h2M4 3l.6 7h2.8L8 3" stroke="currentColor" strokeWidth={1.45} strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                  Tout effacer
                </button>
              </div>
              <div className="fs-task-section-list" style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                {doneTasks.map(t => <TaskRow key={t.id} task={t} />)}
              </div>
            </>}
            {activeTasks.length === 0 && doneTasks.length === 0 && (
              <div className="fs-task-empty" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: 220, gap: 14 }}>
                <div style={{ width: 52, height: 52, borderRadius: 18, background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.07)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="rgba(248,246,252,0.3)" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round">
                    <path d="M9 11l3 3 8-8" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                  </svg>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: 'rgba(248,246,252,0.45)', marginBottom: 5 }}>Aucune tâche ici</div>
                  <div style={{ fontSize: 12, color: T.muted }}>Utilisez le champ ci-dessus pour en ajouter une</div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    window.TasksScreen = TasksScreen;
  </script>

  <script type="text/babel">
    function NotesScreen({ onNavigate }) {
      const { addToast } = window.useToast ? window.useToast() : { addToast: () => {} };
      const readMapStyle = () => {
        try {
          return window._fsCurrentMapStyle
            || localStorage.getItem('fs_note_map_style')
            || JSON.parse(localStorage.getItem('fs_widget_style') || '{}')?.noteMapStyle
            || 'organic';
        } catch(e) {
          return window._fsCurrentMapStyle || localStorage.getItem('fs_note_map_style') || 'organic';
        }
      };
      const [notes, setNotes] = React.useState(() => window.fsReadNotes ? window.fsReadNotes() : []);
      const [selectedId, setSelectedId] = React.useState(() => notes[0]?.id || null);
      const [query, setQuery] = React.useState('');
      const [tagFilter, setTagFilter] = React.useState('all');
      const [folderFilter, setFolderFilter] = React.useState('all');
      const [preview, setPreview] = React.useState(false);
      const returningToMap = !!window._fsMapReturn;
      if (window._fsMapReturn) delete window._fsMapReturn;
      const [view, setView] = React.useState(returningToMap ? 'map' : 'edit');
      const [mobilePane, setMobilePane] = React.useState(returningToMap ? 'editor' : 'list');
      const [mapStyle, setMapStyle] = React.useState(readMapStyle);
      const [mapPan, setMapPan] = React.useState({ x: 0, y: 0 });
      const [drag, setDrag] = React.useState(null);

      React.useEffect(() => { if (window.fsWriteNotes) window.fsWriteNotes(notes); }, [notes]);
      React.useEffect(() => {
        const handler = e => {
          if (e.detail?.notes != null && window.fsReadNotes) {
            const remote = window.fsReadNotes();
            setNotes(remote);
            setSelectedId(id => remote.some(n => n.id === id) ? id : remote[0]?.id || null);
          }
        };
        window.addEventListener('fs-remote-update', handler);
        return () => window.removeEventListener('fs-remote-update', handler);
      }, []);
      React.useEffect(() => {
        const sync = () => setMapStyle(readMapStyle());
        window.addEventListener('fs-note-map-style', sync);
        window.addEventListener('storage', sync);
        return () => {
          window.removeEventListener('fs-note-map-style', sync);
          window.removeEventListener('storage', sync);
        };
      }, []);
      React.useEffect(() => {
        if (!drag) return;
        const move = e => setMapPan({ x: e.clientX - drag.x, y: e.clientY - drag.y });
        const up = () => setDrag(null);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
        return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
      }, [drag]);

      const allTags = Array.from(new Set(notes.flatMap(n => n.tags || []))).sort();
      const folders = Array.from(new Set(notes.map(n => n.folder || FS_NOTE_DEFAULT_FOLDER))).sort();
      const selected = notes.find(n => n.id === selectedId) || notes[0] || null;
      const filtered = notes
        .filter(n => folderFilter === 'all' || (n.folder || FS_NOTE_DEFAULT_FOLDER) === folderFilter)
        .filter(n => tagFilter === 'all' || (n.tags || []).includes(tagFilter))
        .filter(n => {
          const q = query.trim().toLowerCase();
          if (!q) return true;
          return `${n.title} ${n.content} ${(n.tags || []).join(' ')} ${n.folder}`.toLowerCase().includes(q);
        })
        .sort((a,b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));

      const persistSelected = patch => {
        const now = new Date().toISOString();
        setNotes(list => list.map(n => n.id === selected?.id ? { ...n, ...patch, updatedAt:now } : n));
      };
      const createNote = (seed = {}) => {
        const now = new Date().toISOString();
        const note = fsNormalizeNote({
          id:`note-${Date.now()}`,
          title: seed.title || 'Nouvelle note',
          content: seed.content || '# Nouvelle note\n\n- Capture une idée\n- Relie-la avec [[une autre note]] ou un #tag',
          folder: seed.folder || (folderFilter !== 'all' ? folderFilter : FS_NOTE_DEFAULT_FOLDER),
          tags: seed.tags || (tagFilter !== 'all' ? [tagFilter] : []),
          createdAt:now,
          updatedAt:now,
        });
        setNotes(list => [note, ...list]);
        setSelectedId(note.id);
        setPreview(false);
        setView('edit');
        setMobilePane('editor');
        addToast({ message:'Nouvelle note créée', type:'success', icon:'+' });
      };
      const duplicateNote = () => {
        if (!selected) return;
        createNote({ title:`${selected.title || 'Note'} copie`, content:selected.content, folder:selected.folder, tags:selected.tags || [] });
      };
      const deleteNote = id => {
        const deleted = notes.find(n => n.id === id);
        const next = notes.filter(n => n.id !== id);
        setNotes(next);
        setSelectedId(next[0]?.id || null);
        setMobilePane('list');
        if (deleted) addToast({ message:`"${deleted.title}" supprimée`, type:'success', icon:'x', action:{ label:'Annuler', fn:() => { setNotes(list => [deleted, ...list]); setSelectedId(deleted.id); } } });
      };
      const fmtDate = iso => {
        try { return new Date(iso).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }); } catch(e) { return 'Maintenant'; }
      };
      const previewText = note => String(note.content || '').replace(/[#*_`[\]()]/g, '').split('\n').map(l => l.trim()).filter(Boolean).slice(0,2).join(' · ') || 'Aucun contenu';
      const noteWords = note => String(note?.content || '').trim().split(/\s+/).filter(Boolean).length;
      const backlinks = selected ? notes.filter(n => n.id !== selected.id && String(n.content || '').toLowerCase().includes((selected.title || '').toLowerCase())) : [];
      const graphNotes = filtered.slice(0, 34);
      const graphLinks = [];
      graphNotes.forEach(a => {
        graphNotes.forEach(b => {
          if (a.id !== b.id && String(a.content || '').toLowerCase().includes((b.title || '').toLowerCase())) graphLinks.push([a.id,b.id]);
        });
      });
      const graphPos = id => {
        const i = Math.max(0, graphNotes.findIndex(n => n.id === id));
        const angle = (i / Math.max(1, graphNotes.length)) * Math.PI * 2;
        const ring = 145 + (i % 3) * 54;
        return { x: 460 + Math.cos(angle) * ring + mapPan.x, y: 310 + Math.sin(angle) * ring + mapPan.y };
      };
      const mapAccentColor = mapStyle === 'blueprint' ? 'rgba(96,165,250,0.52)' : mapStyle === 'cosmos' ? 'rgba(167,139,250,0.52)' : 'rgba(168,197,160,0.52)';
      const mapActiveBg = mapStyle === 'blueprint' ? 'linear-gradient(180deg,rgba(96,165,250,0.16),rgba(13,27,46,0.92))' : mapStyle === 'cosmos' ? 'linear-gradient(180deg,rgba(167,139,250,0.16),rgba(8,4,18,0.94))' : 'linear-gradient(180deg,rgba(168,197,160,0.22),rgba(255,255,255,0.92))';
      const nodeMetrics = mapStyle === 'cosmos'
        ? { w: 126, h: 126, cx: 63, cy: 63 }
        : mapStyle === 'organic'
        ? { w: 196, h: 76, cx: 98, cy: 38 }
        : { w: 178, h: 78, cx: 89, cy: 39 };
      const nodeStyleForMap = active => ({
        width: nodeMetrics.w,
        minHeight: nodeMetrics.h,
        height: mapStyle === 'cosmos' ? nodeMetrics.h : undefined,
        borderColor: active ? mapAccentColor : undefined,
        background: active ? mapActiveBg : undefined,
        display: mapStyle === 'cosmos' ? 'flex' : undefined,
        flexDirection: mapStyle === 'cosmos' ? 'column' : undefined,
        alignItems: mapStyle === 'cosmos' ? 'center' : undefined,
        justifyContent: mapStyle === 'cosmos' ? 'center' : undefined,
        textAlign: mapStyle === 'cosmos' ? 'center' : 'left',
        padding: mapStyle === 'cosmos' ? '18px 14px' : undefined
      });

      return (
        <div className={`fs-notes-screen fs-notes-mobile-${mobilePane}`}>
          <style>{`
            .fs-notes-screen{width:100%;height:100%;display:grid;grid-template-columns:300px minmax(0,1fr) 260px;overflow:hidden;font-family:${T.font};background:linear-gradient(180deg,rgba(255,255,255,0.018),rgba(255,255,255,0.006));}
            .fs-notes-left{border-right:1px solid rgba(255,255,255,0.065);background:linear-gradient(180deg,rgba(var(--mineral-surface-rgb),0.42),rgba(var(--mineral-bg-rgb),0.34));display:flex;flex-direction:column;min-width:0;}
            .fs-notes-editor{display:flex;flex-direction:column;min-width:0;overflow:hidden;}
            .fs-notes-inspector{border-left:1px solid rgba(255,255,255,0.065);background:linear-gradient(180deg,rgba(255,255,255,0.026),rgba(255,255,255,0.01));display:flex;flex-direction:column;min-width:0;}
            .fs-note-card{transition:transform .2s cubic-bezier(.16,1,.3,1),background .2s,border-color .2s,box-shadow .2s;}
            .fs-note-card:hover{transform:translateY(-1px);background:rgba(255,255,255,0.052)!important;border-color:rgba(255,255,255,0.12)!important;}
            .fs-note-input::placeholder,.fs-note-textarea::placeholder{color:rgba(248,246,252,0.24);}
            .fs-note-textarea{scrollbar-width:thin;}
            .fs-notes-rail-btn{height:34px;border-radius:12px;border:1px solid rgba(255,255,255,0.065);background:rgba(255,255,255,0.03);color:${T.muted};font:800 11px var(--font-body);cursor:pointer;}
            .fs-notes-rail-btn.active{background:rgba(var(--theme-c1-rgb),0.12);border-color:rgba(var(--theme-c1-rgb),0.28);color:${T.c1};}
            .fs-map-canvas{position:relative;width:100%;height:100%;overflow:hidden;cursor:grab;}
            .fs-map-organic{background-color:#f4efe7;background-image:radial-gradient(circle,rgba(120,100,80,0.11) 1px,transparent 1px),radial-gradient(circle at 15% 80%,rgba(168,197,160,0.18),transparent 38%),radial-gradient(circle at 85% 15%,rgba(232,168,124,0.14),transparent 36%);background-size:24px 24px,auto,auto;color:#3d2e1e;}
            .fs-map-blueprint{background-color:#0b1725;background-image:linear-gradient(rgba(96,165,250,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,0.07) 1px,transparent 1px),radial-gradient(circle at 50% 50%,rgba(96,165,250,0.05),transparent 55%);background-size:32px 32px,32px 32px,auto;}
            .fs-map-cosmos{background-color:#040210;background-image:radial-gradient(circle at 50% 50%,rgba(167,139,250,0.09),transparent 52%),radial-gradient(circle at 20% 25%,rgba(251,191,36,0.06),transparent 35%),radial-gradient(circle at 80% 75%,rgba(167,139,250,0.1),transparent 38%),radial-gradient(rgba(255,255,255,0.09) 1px,transparent 1px);background-size:auto,auto,auto,42px 42px;}
            .fs-map-canvas.dragging{cursor:grabbing;}
            .fs-map-node{position:absolute;width:178px;min-height:82px;border-radius:20px;padding:14px 15px;text-align:left;border:1px solid rgba(255,255,255,0.08);background:rgba(var(--mineral-surface-rgb),0.78);color:${T.text};box-shadow:0 18px 42px rgba(0,0,0,0.28);transition:transform .18s,border-color .18s,background .18s,box-shadow .18s,border-radius .18s;overflow:hidden;}
            .fs-map-node:hover{transform:translateY(-2px);}
            .fs-map-organic .fs-map-node{border-radius:999px;background:rgba(255,255,255,0.9);border-color:rgba(120,100,80,0.16);color:#3d2e1e;box-shadow:0 6px 28px rgba(120,100,80,0.14),0 1px 4px rgba(120,100,80,0.1);}
            .fs-map-organic .fs-map-node:hover{background:#fffdf8;border-color:rgba(168,197,160,0.5);box-shadow:0 10px 36px rgba(168,197,160,0.22);}
            .fs-map-organic .fs-map-node div{color:inherit!important;}
            .fs-map-blueprint .fs-map-node{border-radius:2px;background:rgba(9,22,46,0.92);border-color:rgba(96,165,250,0.32);color:#bfdbfe;box-shadow:0 0 0 1px rgba(96,165,250,0.08),0 14px 44px rgba(0,0,0,0.45);}
            .fs-map-blueprint .fs-map-node::before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:rgba(96,165,250,0.65);}
            .fs-map-blueprint .fs-map-node::after{content:"";position:absolute;right:7px;bottom:7px;width:14px;height:14px;border-right:1px solid rgba(96,165,250,0.45);border-bottom:1px solid rgba(96,165,250,0.45);}
            .fs-map-blueprint .fs-map-node:hover{background:rgba(14,32,62,0.96);border-color:rgba(96,165,250,0.62);box-shadow:0 0 0 1px rgba(96,165,250,0.18),0 0 28px rgba(96,165,250,0.14);}
            .fs-map-blueprint .fs-map-node div{color:inherit!important;}
            .fs-map-cosmos .fs-map-node{border-radius:50%;background:radial-gradient(circle at 35% 25%,rgba(255,255,255,0.09),transparent 28%),linear-gradient(135deg,rgba(167,139,250,0.13),rgba(4,2,16,0.94));border-color:rgba(167,139,250,0.32);box-shadow:0 0 0 1px rgba(167,139,250,0.07),0 20px 56px rgba(0,0,0,0.52),0 0 36px rgba(167,139,250,0.12);}

      });

      React.useEffect(() => { if (window.fsWriteNotes) window.fsWriteNotes(notes); }, [notes]);
      React.useEffect(() => {
        const handler = e => {
          if (e.detail?.notes != null && window.fsReadNotes) {
            const remote = window.fsReadNotes();
            setNotes(remote);
            setSelectedId(id => remote.some(n => n.id === id) ? id : remote[0]?.id || null);

        };
        window.addEventListener('fs-remote-update', handler);
        return () => window.removeEventListener('fs-remote-update', handler);
      }, []);
      React.useEffect(() => {
        if (!drag) return;
        const move = e => setPan({ x: e.clientX - drag.x, y: e.clientY - drag.y });
        const up = () => setDrag(null);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
        const touchMove = e => {
          e.preventDefault();
          if (e.touches.length === 2) {
            const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (pinchRef.current != null) { const delta = (d - pinchRef.current) * 0.008; setZoom(z => Math.max(0.38, Math.min(2.0, Number((z + delta).toFixed(2))))); }
            pinchRef.current = d;
          } else if (e.touches.length === 1) {
            const t = e.touches[0]; setPan({ x: t.clientX - drag.x, y: t.clientY - drag.y });
          }
        };
        const touchEnd = () => { setDrag(null); pinchRef.current = null; };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
        window.addEventListener('touchmove', touchMove, { passive: false });
        window.addEventListener('touchend', touchEnd);
        return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); window.removeEventListener('touchmove', touchMove); window.removeEventListener('touchend', touchEnd); };
      }, [drag]);
      React.useEffect(() => {

      const selected = notes.find(n => n.id === selectedId) || notes[0] || null;
      const editingNote = editingId ? (notes.find(n => n.id === editingId) || null) : null;
      const normalizedQuery = query.trim().toLowerCase();
      const allTags = Array.from(new Set(notes.flatMap(n => n.tags?.length ? n.tags : ['sans-tag']))).sort();

      const exactMatch = normalizedQuery

      const matchesQuery = n => {

      const visibleNotes = normalizedQuery ? notes.filter(matchesQuery) : notes;

      const parseTags = value => String(value || '').split(',').map(t => t.trim().replace(/^#/, '')).filter(Boolean);
      const noteWords = note => String(note?.content || '').trim().split(/\s+/).filter(Boolean).length;

        const now = new Date().toISOString();

      const createNote = () => {
        const now = new Date().toISOString();
        const cleanTitle = draft.title.trim() || 'Nouvelle note';

          id: `note-${Date.now()}`,

          createdAt: now,
          updatedAt: now,

        setNotes(list => [note, ...list]);
        setSelectedId(note.id);
        setDraft({ title: '', folder: note.folder, tags: '', content: '' });
        addToast({ message: `"${note.title}" ajoutée à la carte`, type: 'success', icon: '+' });
      };
      const deleteSelected = () => {
        if (!selected) return;
        const deleted = selected;
        const next = notes.filter(n => n.id !== deleted.id);
        setNotes(next);

        addToast({ message: `"${deleted.title}" supprimée`, type:'success', icon:'x', action:{ label:'Annuler', fn:() => { setNotes(list => [deleted, ...list]); setSelectedId(deleted.id); } } });
      };

      // ── Layout constants ──────────────────────────────────────────────────

      const NH = isCosmosMap ? 128 : isOrganicMap ? 76 : 98;

      const CPH = 28, CPT = 54, CPB = 22; // cluster padding: horizontal, top, bottom
      const CGX = 46, CGY = 50;          // gap between clusters
      const SX = 56, SY = 56;            // canvas start offset
      const MRW = 1720;                  // max row width before wrapping
      // ── Flow layout: each cluster gets its real size, no overlaps ─────────
      let _rX = SX, _rY = SY, _rH = 0, _worldH = 800;
      const groups = allTags
        .map(tag => ({ tag, notes: visibleNotes.filter(n => primaryTag(n) === tag) }))
        .filter(g => g.notes.length)
        .map(g => {
          const cols = Math.min(3, Math.max(1, g.notes.length === 1 ? 1 : Math.ceil(Math.sqrt(g.notes.length))));

          const x = _rX, y = _rY;

        });
      const posById = {};

            <div className={`fs-map-canvas fs-map-${mapStyle}${drag?' dragging':''}`} onWheel={e=>{e.preventDefault(); zoomBy(e.deltaY > 0 ? -0.08 : 0.08);}} onMouseDown={e => { if (e.target === e.currentTarget || e.target.classList.contains('fs-map-world')) setDrag({ x:e.clientX-pan.x, y:e.clientY-pan.y }); }} onTouchStart={e=>{ if(e.touches.length===2){pinchRef.current=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);setDrag({x:(e.touches[0].clientX+e.touches[1].clientX)/2-pan.x,y:(e.touches[0].clientY+e.touches[1].clientY)/2-pan.y});}else if(e.touches.length===1){setDrag({x:e.touches[0].clientX-pan.x,y:e.touches[0].clientY-pan.y});} }}>
              <div className="fs-map-world" style={{transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`,width:MRW+200,height:_worldH}}>
                <svg width={MRW+200} height={_worldH} style={{position:'absolute',inset:0,pointerEvents:'none'}}>
                  {links.map(([a,b],i) => {
                    const pa = posById[a], pb = posById[b];
                    if (!pa || !pb) return null;
                    const x1=pa.x+NW/2, y1=pa.y+NH/2, x2=pb.x+NW/2, y2=pb.y+NH/2;
                    if (isBlueprintMap) {
                      const mx = (x1 + x2) / 2;
                      return <polyline key={i} points={`${x1},${y1} ${mx},${y1} ${mx},${y2} ${x2},${y2}`} stroke={c1(0.38)} strokeWidth="1.1" fill="none" strokeDasharray="5 4"/>;
                    }
                    if (isCosmosMap) {
                      const midY = Math.min(y1, y2) - 46;
                      return <path key={i} d={`M${x1},${y1} Q${(x1+x2)/2},${midY} ${x2},${y2}`} stroke={c2(0.46)} strokeWidth="1.45" fill="none" strokeLinecap="round"/>;
                    }
                    const cx1 = x1 + (x2 - x1) * 0.38;
                    const cx2 = x2 - (x2 - x1) * 0.38;
                    return <path key={i} d={`M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`} stroke={c1(0.46)} strokeWidth="1.8" fill="none" strokeLinecap="round"/>;
                  })}
                </svg>
                {groups.map(g => (
                  <div key={g.tag} className="fs-tag-cluster" style={{left:g.x,top:g.y,width:g.clW,height:g.clH}}>
                    <div style={{position:'absolute',left:CPH,top:16,display:'flex',alignItems:'center',gap:7}}>
                      <div style={{width:5,height:5,borderRadius:'50%',background:T.c1,opacity:.55,flexShrink:0}}/>
                      <span style={{fontSize:9,fontWeight:900,letterSpacing:'0.14em',textTransform:'uppercase',color:T.c1}}>#{g.tag}</span>
                      <span style={{fontSize:9,color:T.muted,opacity:.7,fontWeight:700,letterSpacing:'0.04em'}}>{g.notes.length} note{g.notes.length>1?'s':''}</span>
                    </div>
                  </div>
                ))}
                {visibleNotes.map(n => {
                  const p = posById[n.id] || {x:0,y:0};
                  const active = selected?.id === n.id;
                  const muted = normalizedQuery && !matchesQuery(n);
                  return (
                    <button key={n.id} className={'fs-map-node'+(active?' active':'')} onClick={()=>{ setSelectedId(n.id); setEditingId(n.id); setPreviewModal(false); }} style={{left:p.x,top:p.y,width:NW,height:NH,opacity:muted?0.22:1}}>
                      <div style={{fontSize:isCosmosMap?11:12,fontWeight:850,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',letterSpacing:'-0.025em',lineHeight:1.2,marginBottom:isCosmosMap?4:5,position:'relative',zIndex:1}}>{n.title||'Sans titre'}</div>
                      <div style={{fontSize:isCosmosMap?9:10,color:isOrganicMap?'rgba(248,246,252,0.58)':isBlueprintMap?c1(0.64):c2(0.62),lineHeight:1.42,display:'-webkit-box',WebkitLineClamp:isCosmosMap?1:2,WebkitBoxOrient:'vertical',overflow:'hidden',flex:isCosmosMap?'0 0 auto':1,position:'relative',zIndex:1}}>{previewText(n)}</div>
                      <div style={{display:'flex',gap:5,alignItems:'center',justifyContent:isCosmosMap?'center':'flex-start',marginTop:isCosmosMap?7:8,overflow:'hidden',position:'relative',zIndex:1}}>
                        {(n.tags?.length?n.tags:['sans-tag']).slice(0,1).map(t=><span key={t} style={{fontSize:8,color:isCosmosMap?T.c2:T.c1,background:isCosmosMap?c2(0.13):c1(0.13),border:`1px solid ${isCosmosMap?c2(0.24):c1(0.24)}`,borderRadius:isBlueprintMap?3:99,padding:'2px 6px',whiteSpace:'nowrap',maxWidth:isCosmosMap?72:100,overflow:'hidden',textOverflow:'ellipsis'}}>{t}</span>)}
                        {n.tags?.length>1&&!isCosmosMap&&<span style={{fontSize:8,color:T.muted,opacity:.55}}>+{n.tags.length-1}</span>}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          </main>

          {editingNote && (
            <div className="fs-note-edit-overlay" onClick={e=>{if(e.target===e.currentTarget)setEditingId(null);}} style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(7,8,16,0.82)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'28px 20px',animation:'noteOverlayIn .22s ease both'}}>
              <div className="fs-note-edit-dialog" style={{width:'100%',maxWidth:860,height:'90vh',maxHeight:900,borderRadius:28,border:'1px solid rgba(255,255,255,0.08)',background:'linear-gradient(180deg,rgba(16,19,31,0.99),rgba(7,8,16,0.995))',boxShadow:'0 48px 120px rgba(0,0,0,0.70),inset 0 1px 0 rgba(255,255,255,0.04)',display:'flex',flexDirection:'column',overflow:'hidden',animation:'noteModalIn .28s cubic-bezier(.16,1,.3,1) both'}}>
                <div className="fs-note-edit-head" style={{padding:'20px 28px 16px',borderBottom:'1px solid rgba(255,255,255,0.055)',flexShrink:0}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,marginBottom:14}}>
                    <div className="fs-note-edit-head-meta" style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',minWidth:0}}>
                      <input value={editingNote.folder||FS_NOTE_DEFAULT_FOLDER} onChange={e=>persistNote(editingNote.id,{folder:e.target.value||FS_NOTE_DEFAULT_FOLDER})} style={{height:30,width:120,borderRadius:10,background:'rgba(255,255,255,0.045)',border:'1px solid rgba(255,255,255,0.075)',color:T.text,fontFamily:T.font,fontSize:11,outline:'none',padding:'0 10px'}} />
                      <input value={(editingNote.tags||[]).join(', ')} onChange={e=>persistNote(editingNote.id,{tags:parseTags(e.target.value)})} placeholder="tags séparés par virgule" style={{height:30,minWidth:150,borderRadius:10,background:'rgba(255,255,255,0.045)',border:'1px solid rgba(255,255,255,0.075)',color:T.text,fontFamily:T.font,fontSize:11,outline:'none',padding:'0 10px'}} />
                    </div>
                    <div className="fs-note-edit-head-actions" style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
                      <button onClick={()=>setPreviewModal(p=>!p)} style={{height:30,borderRadius:10,border:`1px solid ${previewModal?c1(0.28):'rgba(255,255,255,0.075)'}`,background:previewModal?c1(0.10):'rgba(255,255,255,0.04)',color:previewModal?T.c1:T.muted,padding:'0 12px',cursor:'pointer',fontSize:11,fontWeight:800,fontFamily:T.font}}>{previewModal?'Éditer':'Aperçu'}</button>
                      <button onClick={()=>{const d=editingNote;const nx=notes.filter(n=>n.id!==d.id);setNotes(nx);setSelectedId(nx[0]?.id||null);setEditingId(null);addToast({message:`"${d.title}" supprimée`,type:'success',icon:'x',action:{label:'Annuler',fn:()=>{setNotes(l=>[d,...l]);setSelectedId(d.id);}}});}} title="Supprimer" style={{width:30,height:30,borderRadius:10,border:'1px solid rgba(251,113,133,0.24)',background:'rgba(251,113,133,0.09)',color:T.rose,cursor:'pointer',fontSize:16,display:'grid',placeItems:'center'}}>×</button>
                      <button onClick={()=>setEditingId(null)} title="Fermer" style={{width:30,height:30,borderRadius:10,border:'1px solid rgba(255,255,255,0.075)',background:'rgba(255,255,255,0.04)',color:T.muted,cursor:'pointer',display:'grid',placeItems:'center'}}>
                        <svg width={10} height={10} viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" strokeWidth={2} strokeLinecap="round"/></svg>
                      </button>
                    </div>
                  </div>
                  <input className="fs-note-edit-title" value={editingNote.title} onChange={e=>persistNote(editingNote.id,{title:e.target.value})} placeholder="Titre de la note" style={{width:'100%',background:'none',border:'none',outline:'none',color:T.text,fontFamily:T.display,fontSize:34,fontWeight:850,letterSpacing:'-0.05em',lineHeight:1.05}} />
                  <div style={{color:T.muted,fontSize:11,marginTop:8,display:'flex',gap:12,flexWrap:'wrap'}}>
                    <span>Modifiée {fmtDate(editingNote.updatedAt)}</span>
                    <span>·</span>
                    <span>{noteWords(editingNote)} mots</span>
                    <span>·</span>
                    <span style={{opacity:.6}}>Markdown · [[liens internes]] · #tags</span>
                  </div>
                </div>
                <div className="fs-note-edit-body" style={{flex:1,overflow:'hidden',padding:'22px 28px 20px',display:'flex',flexDirection:'column',gap:0}}>
                  {previewModal ? (
                    <div style={{flex:1,overflowY:'auto',borderRadius:20,background:'rgba(255,255,255,0.018)',border:'1px solid rgba(255,255,255,0.055)',padding:'26px 30px',boxSizing:'border-box',scrollbarWidth:'thin',scrollbarColor:'rgba(255,255,255,0.10) transparent'}}>
                      <MarkdownPreview content={editingNote.content} />
                    </div>
                  ) : (
                    <textarea
                      value={editingNote.content}
                      onChange={e=>persistNote(editingNote.id,{content:e.target.value})}
                      placeholder={"Commence à écrire...\n\n# Titre\n\n- Point important\n- Relie avec [[Nom d'une note]] ou #tag\n\nLes notes longues sont maintenant faciles à lire ici."}
                      autoFocus
                      style={{flex:1,width:'100%',resize:'none',outline:'none',border:'none',background:'transparent',color:'rgba(248,246,252,0.88)',padding:'0',boxSizing:'border-box',fontFamily:T.font,fontSize:15,lineHeight:1.9,caretColor:'var(--mineral-cyan)',scrollbarWidth:'thin',scrollbarColor:'rgba(255,255,255,0.12) transparent',letterSpacing:'-0.006em'}}
                    />
                  )}
                  <div style={{flexShrink:0,marginTop:14,paddingTop:12,borderTop:'1px solid rgba(255,255,255,0.042)',display:'flex',gap:12,fontSize:10,color:T.muted,fontFamily:T.mono,letterSpacing:'0.04em',alignItems:'center'}}>
                    <span style={{color:T.c1,fontWeight:700}}>{noteWords(editingNote)} mots</span>
                    <span>·</span>
                    <span>{String(editingNote.content||'').length} caractères</span>
                    <div style={{flex:1}}/>
                    <span style={{opacity:.5}}>Échap ou clic en dehors pour fermer</span>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };
    window.NotesScreen = NotesScreen;
  </script>

  <script type="text/babel">
    const { useState: _uSAuth } = React;

    if (!document.getElementById('fs-auth-css')) {
      const s = document.createElement('style');
      s.id = 'fs-auth-css';
      s.textContent = `
    @keyframes fsSlideUp {
      from { opacity:0; transform:translateY(30px) scale(0.97); }
      to   { opacity:1; transform:translateY(0)    scale(1);    }
    }
    @keyframes fsShake {
      0%,100%{transform:translateX(0)}
      18%{transform:translateX(-10px)}
      36%{transform:translateX(10px)}
      54%{transform:translateX(-6px)}
      72%{transform:translateX(6px)}
      90%{transform:translateX(-2px)}
    }
    @keyframes fsOrb1 {
      0%,100%{transform:translate(0,0) scale(1)}
      40%{transform:translate(42px,-30px) scale(1.07)}
      70%{transform:translate(-20px,18px) scale(0.93)}
    }
    @keyframes fsOrb2 {
      0%,100%{transform:translate(0,0) scale(1)}
      35%{transform:translate(-34px,24px) scale(1.1)}
      65%{transform:translate(20px,-14px) scale(0.9)}
    }
    @keyframes fsSpinAuth { to { transform:rotate(360deg); } }
    @keyframes fsCheckDraw { from{stroke-dashoffset:22} to{stroke-dashoffset:0} }
    @keyframes fsFadeErr {
      from{opacity:0;transform:translateY(-6px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes fsFieldIn {
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:translateY(0)}
    }
    .fs-auth-card { animation:fsSlideUp 0.58s cubic-bezier(0.16,1,0.3,1) both; }
    .fs-auth-shake { animation:fsShake 0.44s cubic-bezier(0.36,0.07,0.19,0.97) both; }
    .fs-auth-orb1  { animation:fsOrb1 15s ease-in-out infinite; }
    .fs-auth-orb2  { animation:fsOrb2 19s ease-in-out infinite; }
    .fs-auth-spin  { animation:fsSpinAuth 0.8s linear infinite; }
    .fs-auth-check path { stroke-dasharray:22; stroke-dashoffset:22; animation:fsCheckDraw 0.4s 0.05s ease both; }
    .fs-auth-field { animation:fsFieldIn 0.28s ease both; }
    .fs-ai {
      width:100%; background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.1); border-radius:14px;
      padding:14px 16px; color:rgba(248,246,252,0.95);
      font-size:14px; font-family:var(--font-body);
      outline:none; box-sizing:border-box;
      transition:border-color 0.22s ease,box-shadow 0.22s ease,background 0.22s ease;
    }
    .fs-ai::placeholder { color:rgba(248,246,252,0.2); }
    .fs-ai:focus {
      border-color:rgba(165,184,255,0.55);
      background:rgba(165,184,255,0.05);
      box-shadow:0 0 0 3.5px rgba(165,184,255,0.12),inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .fs-ai:disabled { opacity:0.5; cursor:default; }
    .fs-auth-err { animation:fsFadeErr 0.2s ease both; }
    .fs-auth-pill-row { animation:fsSlideUp 0.7s 0.15s cubic-bezier(0.16,1,0.3,1) both; }
  `;
      document.head.appendChild(s);
    }

    function AuthScreen({ onAuth }) {
      const [mode, setMode] = _uSAuth('login');
      const [uname, setUname] = _uSAuth('');
      const [email, setEmail] = _uSAuth('');
      const [pass, setPass] = _uSAuth('');
      const [showPw, setShowPw] = _uSAuth(false);
      const [status, setStatus] = _uSAuth('idle');
      const [errMsg, setErrMsg] = _uSAuth('');
      const [shaking, setShaking] = _uSAuth(false);

      const validate = () => {
        if (mode === 'signup' && !uname.trim()) return "Entrez un nom d'utilisateur";
        if (!email.trim() || !email.includes('@')) return 'Adresse email invalide';
        if (pass.length < 6) return 'Mot de passe min. 6 caractères';
        return null;
      };

      const submit = async () => {
        const err = validate();
        if (err) {
          setErrMsg(err); setShaking(true);
          setTimeout(() => setShaking(false), 460);
          return;
        }
        setStatus('loading'); setErrMsg('');

        const sb = window._fsSb;
        const trimmedEmail = email.trim();
        const displayName = uname.trim() || trimmedEmail.split('@')[0];

        try {
          const authResult = mode === 'signup'
            ? await sb.auth.signUp({ email: trimmedEmail, password: pass, options: { data: { name: displayName } } })
            : await sb.auth.signInWithPassword({ email: trimmedEmail, password: pass });

          if (authResult.error) throw authResult.error;
          const sbUser = authResult.data.user;
          const session = authResult.data.session;

          if (!session) {
            setStatus('idle');
            setErrMsg('Vérifiez votre email pour confirmer votre compte.');
            return;
          }

          window._fsSbUser = sbUser;
          const remote = await window._fsLoadRemote(sbUser.id);
          const syncResult = await window._fsReconcileRemote(sbUser.id, remote);
          const effectiveRemote = syncResult.source === 'remote' ? remote : window._fsSnapshotLocalData(sbUser.id);

          const finalName = (effectiveRemote && effectiveRemote.name) || sbUser.user_metadata?.name || displayName;
          const u = { name: finalName, email: trimmedEmail, id: sbUser.id, ts: Date.now() };
          try { localStorage.setItem('fs_user', JSON.stringify(u)); } catch (e) { }

          /* Always upsert name + email so friend lookup always works */
          try {
            await sb.from('user_data').upsert(
              { user_id: sbUser.id, name: finalName, email: trimmedEmail.toLowerCase(), updated_at: new Date().toISOString() },
              { onConflict: 'user_id' }
            );
          } catch (e) { console.warn('[fs] save user info failed', e); }

          setStatus('success');
          const isNewUser = mode === 'signup' || !effectiveRemote || !effectiveRemote.onboarded;
          setTimeout(() => onAuth(u, isNewUser, effectiveRemote), 680);
        } catch (e) {
          console.warn('[fs] auth failed', e);
          setStatus('idle');
          setShaking(true);
          setTimeout(() => setShaking(false), 460);
          let msg = e?.message || 'Erreur de connexion';
          if (/Invalid login credentials/i.test(msg)) msg = 'Email ou mot de passe incorrect';
          else if (/already registered|already exists/i.test(msg)) msg = 'Compte existant — connectez-vous';
          else if (/Password should be/i.test(msg)) msg = 'Mot de passe min. 6 caractères';
          else if (/rate limit|too many/i.test(msg)) msg = 'Trop de tentatives, réessayez dans quelques minutes';
          else if (/Email not confirmed/i.test(msg)) msg = 'Confirmez votre email avant de vous connecter';
          setErrMsg(msg);
        }
      };

      const switchMode = () => {
        setMode(m => m === 'login' ? 'signup' : 'login');
        setErrMsg(''); setStatus('idle'); setUname(''); setEmail(''); setPass('');
      };

      const busy = status === 'loading' || status === 'success';
      const isOk = status === 'success';

      const FL = ({ ch, htmlFor, required }) => (
        <label htmlFor={htmlFor} style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(248,246,252,0.35)', marginBottom: 8, display: 'block', cursor: htmlFor ? 'pointer' : 'default' }}>{ch}{required && <span style={{ color: '#fb7185', marginLeft: 4 }}>*</span>}</label>
      );

      const EyeIcon = () => showPw
        ? <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></svg>
        : <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></svg>;

      return (
        <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden' }}>

          {/* Ambient orbs */}
          <div className="fs-auth-orb1" style={{ position: 'absolute', width: 720, height: 720, top: '-20%', left: '-14%', borderRadius: '50%', background: 'radial-gradient(circle, rgba(124,140,255,0.16), transparent 62%)', pointerEvents: 'none' }} />
          <div className="fs-auth-orb2" style={{ position: 'absolute', width: 580, height: 580, bottom: '-16%', right: '-10%', borderRadius: '50%', background: 'radial-gradient(circle, rgba(107,226,179,0.12), transparent 62%)', pointerEvents: 'none' }} />
          <div style={{ position: 'absolute', width: 400, height: 400, top: '35%', right: '10%', borderRadius: '50%', background: 'radial-gradient(circle, rgba(196,181,253,0.07), transparent 60%)', pointerEvents: 'none' }} />

          {/* Card */}
          <div className={`fs-auth-card${shaking ? ' fs-auth-shake' : ''}`} style={{ width: '100%', maxWidth: 432, padding: '0 20px', position: 'relative', zIndex: 1 }}>
            <div style={{
              background: 'rgba(9,9,17,0.76)',
              backdropFilter: 'blur(48px) saturate(160%)', WebkitBackdropFilter: 'blur(48px) saturate(160%)',
              border: '1px solid rgba(255,255,255,0.1)', borderRadius: 34,
              padding: '46px 46px 40px',
              boxShadow: '0 0 0 1px rgba(255,255,255,0.04),0 44px 110px rgba(0,0,0,0.68),inset 0 1px 0 rgba(255,255,255,0.11)',
              position: 'relative', overflow: 'hidden',
            }}>
              {/* Top shimmer */}
              <div style={{ position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)', width: '52%', height: 1, background: 'linear-gradient(90deg,transparent,rgba(165,184,255,0.65),transparent)', pointerEvents: 'none' }} />
              {/* Inner glow */}
              <div style={{ position: 'absolute', inset: 0, borderRadius: 34, background: 'radial-gradient(ellipse at 50% -10%, rgba(165,184,255,0.07), transparent 52%)', pointerEvents: 'none' }} />

              {/* Brand */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 40 }}>
                <div style={{ width: 44, height: 44, borderRadius: 16, flexShrink: 0, position: 'relative', background: 'linear-gradient(145deg,rgba(165,184,255,0.95),rgba(74,222,128,0.72))', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.28),0 10px 26px rgba(80,100,255,0.32)', display: 'grid', placeItems: 'center' }}>
                  <img src="logo.png" alt="LumenOS" style={{ width: 26, height: 26, objectFit: 'contain', position: 'relative', zIndex: 1 }}/>
                  <div style={{ position: 'absolute', inset: 10, borderRadius: 12, border: '1px solid rgba(255,255,255,0.36)' }} />
                </div>
                <div>
                  <div style={{ fontFamily: T.display, fontWeight: 800, fontSize: 16, letterSpacing: '-0.025em' }}>LumenOS</div>
                  <div style={{ fontSize: 11, color: T.muted, marginTop: 2, letterSpacing: '0.01em' }}>Crystal Productivity Focus</div>
                </div>
              </div>

              {/* Headline */}
              <div style={{ marginBottom: 32 }}>
                <div style={{ fontFamily: T.display, fontWeight: 800, fontSize: 32, letterSpacing: '-0.048em', lineHeight: 1.1, marginBottom: 10 }}>
                  {mode === 'login' ? 'Bon retour.' : 'Commencez ici.'}
                </div>
                <div style={{ fontSize: 13, color: 'rgba(248,246,252,0.4)', lineHeight: 1.6, maxWidth: '30ch' }}>
                  {mode === 'login'
                    ? 'Connectez-vous à votre espace de travail.'
                    : 'Créez votre compte et entrez en état de flow.'}
                </div>
              </div>

              {/* Fields */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginBottom: 20 }}>
                {mode === 'signup' && (

    }

    function clampChannel(v) {
      return Math.max(0, Math.min(255, Math.round(v)));
    }
    function rgbStrToArray(rgb) {
      return String(rgb || '143,220,255').split(',').map(v => clampChannel(Number(v.trim()) || 0));
    }
    function rgbArrayToStr(rgb) {
      return rgb.map(clampChannel).join(', ');
    }
    function rgbArrayToHex(rgb) {
      return '#' + rgb.map(v => clampChannel(v).toString(16).padStart(2, '0')).join('');

      const a = rgbStrToArray(theme?.g1?.rgb);
      const b = rgbStrToArray(theme?.g2?.rgb);
      return [0, 1, 2].map(i => ((a[i] + b[i]) / 2) * strength);

      return {

        bg2Hex: rgbArrayToHex(bg2),

    function hexToRgbStr(hex) {

    }
    function buildCustomTheme(c1hex, c2hex) {

        g1: { rgb: g1rgb, o: 0.14, x: '18%', y: '15%' },
        g2: { rgb: g2rgb, o: 0.10, x: '82%', y: '82%' }
      };
    }
    window.buildCustomTheme = buildCustomTheme;

      const [customOpen, setCustomOpen] = _uPX(initId === 'custom');
      const customRef = React.useRef(null);

      const customTheme = buildCustomTheme(customC1, customC2);
      const allThemes = [...KEPT, customTheme];
      const prev = allThemes.find(t => t.id === previewId) || KEPT[0];

      const saveCustom = (c1h, c2h) => { try { localStorage.setItem('fs_custom_bg', JSON.stringify({ c1: c1h, c2: c2h })); } catch (e) { } };
      const apply = t => { setAppliedId(t.id); setPreviewId(t.id); onApply(t); addToast({ message: `Thème ${t.name} appliqué`, type: 'success', icon: '✓' }); };

      React.useEffect(() => {
        if (!customOpen) return;
        const close = e => { if (customRef.current && !customRef.current.contains(e.target)) setCustomOpen(false); };
        document.addEventListener('mousedown', close);
        return () => document.removeEventListener('mousedown', close);
      }, [customOpen]);

      const handleC1 = e => {
        const v = e.target.value; setCustomC1(v); saveCustom(v, customC2);
        if (appliedId === 'custom') onApply(buildCustomTheme(v, customC2));
      };
      const handleC2 = e => {
        const v = e.target.value; setCustomC2(v); saveCustom(customC1, v);
        if (appliedId === 'custom') onApply(buildCustomTheme(customC1, v));
      };

      return (
        <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

  <script type="text/babel">
    /* ── Crystallization Reveal ─────────────────────────────────────────────── */
    window._crShown = false; // reset to false on every page load

    function CrystalReveal({ onComplete }) {
      const overlayRef = React.useRef(null);
      const logoRef = React.useRef(null);
      const haloRef = React.useRef(null);

      React.useEffect(() => {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { onComplete(); return; }
        if (window._crShown) { onComplete(); return; }

        const overlay = overlayRef.current;
        const logo = logoRef.current;
        const halo = haloRef.current;
        if (!overlay || !logo || !halo) { onComplete(); return; }

        const sidebar = document.querySelector('.fs-sidebar');
        const staggerTargets = [sidebar].filter(Boolean);

        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          window._crShown = true;
          onComplete();
        };

        /* ── GSAP path ── */
        const gsap = window.gsap;
        if (gsap) {
          gsap.set(logo, { opacity: 0, scale: 0.92, filter: 'blur(8px)', willChange: 'transform, opacity' });
          gsap.set(halo, { opacity: 0, scale: 0.85, willChange: 'transform, opacity' });
          gsap.set(staggerTargets, { opacity: 0, y: 12, willChange: 'transform, opacity' });

          const tl = gsap.timeline({
            onComplete: () => {
              gsap.set(staggerTargets, { clearProps: 'willChange' });
              finish();
            }
          });

          /* Phase 1 – logo crystallises in (0 → 0.4 s) */
          tl.to(logo, { opacity: 1, scale: 1, filter: 'blur(0px)', duration: 0.4, ease: 'power3.out' }, 0);
          /* Glassmorphism halo: bloom then dissolve */
          tl.to(halo, { opacity: 0.58, scale: 1.14, duration: 0.22, ease: 'power2.out' }, 0.06);
          tl.to(halo, { opacity: 0, scale: 1.68, duration: 0.28, ease: 'power2.in' }, 0.28);

          /* Phase 2 – overlay dissolves while widgets crystallise in (0.4 s →) */
          tl.to(overlay, { opacity: 0, duration: 0.55, ease: 'power2.in' }, 0.4);
          tl.to(staggerTargets, {
            opacity: 1, y: 0, duration: 0.38, ease: 'power2.out', stagger: 0.08,
          }, 0.4);

          const skip = () => {
            if (done) return;
            done = true;
            tl.kill();
            gsap.killTweensOf([logo, halo, overlay, ...staggerTargets]);
            gsap.set(staggerTargets, { opacity: 1, y: 0, clearProps: 'willChange' });
            window._crShown = true;
            onComplete();
          };

          document.addEventListener('click', skip, { once: true });
          document.addEventListener('touchstart', skip, { once: true, passive: true });

          return () => {
            document.removeEventListener('click', skip);
            document.removeEventListener('touchstart', skip);
            if (!done) {
              tl.kill();
              gsap.killTweensOf(staggerTargets);
              gsap.set(staggerTargets, { opacity: 1, y: 0, clearProps: 'willChange' });
            }
          };
        }

        /* ── CSS fallback (GSAP unavailable) ── */
        overlay.classList.add('cr-css-anim');
        staggerTargets.forEach((el, i) => {
          el.style.willChange = 'transform, opacity';
          el.style.opacity = '0';
          el.style.transform = 'translateY(12px)';
          el.style.transition = `opacity 0.38s ease-out ${(0.4 + i * 0.08).toFixed(2)}s,`
            + `transform 0.38s ease-out ${(0.4 + i * 0.08).toFixed(2)}s`;
        });
        const rAF = requestAnimationFrame(() => {
          staggerTargets.forEach(el => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
        });
        const tOverlay = setTimeout(() => {
          overlay.style.transition = 'opacity 0.3s ease-in';
          overlay.style.opacity = '0';
        }, 400);
        const tDone = setTimeout(finish, (0.4 + staggerTargets.length * 0.08 + 0.38) * 1000);

        const skipCSS = () => {
          if (done) return;
          done = true;
          clearTimeout(tOverlay); clearTimeout(tDone); cancelAnimationFrame(rAF);
          staggerTargets.forEach(el => {
            el.style.transition = 'none'; el.style.opacity = '1';
            el.style.transform = 'none'; el.style.willChange = 'auto';
          });
          window._crShown = true;
          onComplete();

              <div className="fs-app-main" style={{ position: 'relative', overflow: 'hidden', borderRadius: 34, background: 'linear-gradient(180deg,rgba(255,255,255,0.045),rgba(255,255,255,0.02))', border: '1px solid rgba(255,255,255,0.06)', boxShadow: '0 10px 34px rgba(0,0,0,0.28)' }}>
                {screen === 'dashboard' && <DashboardScreen onNavigate={go} widgets={widgets} session={activeSession} onEndSession={handleEndSession} user={user} animateWidgets={dashboardReady} />}
                {screen === 'tasks' && <TasksScreen />}
                {screen === 'cristaux' && window.FocusScreen && React.createElement(window.FocusScreen, { user, sessions: sessionHistory, onStart: () => setShowSession(true), initialTab: 'cristaux' })}
                {screen === 'notes' && window.NotesScreen && React.createElement(window.NotesScreen, { onNavigate: go })}
                {screen === 'edit' && <EditModeScreen onNavigate={go} widgets={widgets} onSave={setWidgets} />}
                {screen === 'perso' && <PersonnalisationScreen onNavigate={go} bgThemeId={bgThemeId} />}
                {screen === 'fond' && <FondScreen onNavigate={go} bgThemeId={bgThemeId} onApply={applyBgTheme} />}
                {screen === 'fonts' && window.FontScreen && React.createElement(window.FontScreen, { onNavigate: go, fontId: fontPresetId, onApply: applyFontPreset })}
                {screen === 'notes-style' && window.NotesDesignScreen && React.createElement(window.NotesDesignScreen, { onNavigate: go, bgThemeId })}
                {screen === 'variants'    && <WidgetVariantsScreen onNavigate={go} onUseVariant={handleUseVariant} widgetStyle={widgetStyle} onWidgetStyleChange={setWidgetStyle} />}
                {screen === 'session' && window.FocusScreen && React.createElement(window.FocusScreen, { user, sessions: sessionHistory, onStart: () => setShowSession(true) })}
                {screen === 'evolution' && window.EvolutionScreen && React.createElement(window.EvolutionScreen, { user })}
                {screen === 'progression' && window.EvolutionScreen && React.createElement(window.EvolutionScreen, { user, initialTab: 'progression' })}
              </div>
            </div>
          )}
          {showSession && <SessionModal onClose={() => setShowSession(false)} onLaunch={handleLaunch} />}
          {isApp && showReveal && <CrystalReveal onComplete={() => { setShowReveal(false); setDashboardReady(true); }} />}
          {isApp && activeSession && window.FocusCrystalOverlay && React.createElement(window.FocusCrystalOverlay, { session: activeSession, user, onEnd: handleEndSession })}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App /></ToastProvider>);
  </script>

  <script type="text/babel">
    /* ── Friends System ─────────────────────────────────────────────────────── */
    if (!document.getElementById('fs-friends-css')) {
      const s = document.createElement('style');
      s.id = 'fs-friends-css';
      s.textContent = `

        from { opacity:0; transform:translateX(-16px) scale(0.97); }
        to   { opacity:1; transform:translateX(0)    scale(1);    }
      }
      @keyframes friendCardIn {
        from { opacity:0; transform:translateY(8px); }
        to   { opacity:1; transform:translateY(0); }
      }
      .fs-friends-panel {
        position:fixed; top:28px; bottom:28px;
        left: max(136px, calc(50vw - 170px));
        width: min(340px, calc(100vw - 24px));
        z-index:10041;
        background:rgba(8,7,18,0.98);
        border:1px solid rgba(255,255,255,0.09);
        border-radius:28px;
        backdrop-filter:blur(60px) saturate(160%);
        -webkit-backdrop-filter:blur(60px) saturate(160%);
        box-shadow:0 32px 80px rgba(0,0,0,0.75),0 0 0 1px rgba(255,255,255,0.04),0 0 80px rgba(100,120,255,0.06);
        display:flex; flex-direction:column; overflow:hidden;
        animation: friendsSlideIn 0.36s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      .fs-friends-panel::before {
        content:''; position:absolute; top:0; left:25%; right:25%; height:1px;
        background:linear-gradient(90deg,transparent,rgba(165,184,255,0.55),transparent);
        pointer-events:none;
      }
      .fs-friends-panel::after {
        content:''; position:absolute; top:-60px; left:50%; transform:translateX(-50%);
        width:280px; height:180px; border-radius:50%;
        background:radial-gradient(ellipse, rgba(100,120,255,0.1) 0%, transparent 70%);
        pointer-events:none;
      }
      .fs-friends-backdrop {
        position:fixed; inset:0; z-index:10040;
        background:rgba(0,0,0,0.5);
        backdrop-filter:blur(6px);

      }
      .fs-friend-card {
        border-radius:18px;
        background:rgba(255,255,255,0.03);

        display:flex; align-items:center; gap:13px;

      }
      .fs-friend-actions { display:none; gap:6px; align-items:center; flex-shrink:0; }
      .fs-friend-card:hover .fs-friend-actions { display:flex; }
      .fs-friend-card:focus-visible {
        outline:2px solid rgba(165,184,255,0.65);
        outline-offset:3px;
      }
      .fs-friend-action {
        appearance:none;
        -webkit-appearance:none;
        font-family:var(--font-body);
      }
      .fs-add-input {
        width:100%; background:rgba(255,255,255,0.06);
        border:1.5px solid rgba(255,255,255,0.1); border-radius:14px;
        padding:12px 16px; color:rgba(248,246,252,0.95);
        font-size:13px; font-family:var(--font-body);
        outline:none; box-sizing:border-box;
        transition:border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
      }
      .fs-add-input:focus {
        border-color:rgba(165,184,255,0.55);
        background:rgba(165,184,255,0.05);
        box-shadow:0 0 0 3.5px rgba(165,184,255,0.12);
      }
      .fs-add-input::placeholder { color:rgba(248,246,252,0.22); }
      .fs-preview-modal {
        position:fixed; inset:0; z-index:9999;
        background:rgba(0,0,0,0.82);
        backdrop-filter:blur(28px);
        display:flex; align-items:center; justify-content:center; padding:40px;
      }
      .fs-preview-inner {
        width:100%; max-width:1120px; height:84vh;
        background:rgba(8,7,18,0.99);
        border:1px solid rgba(255,255,255,0.08);
        border-radius:34px;
        backdrop-filter:blur(60px);
        box-shadow:0 52px 130px rgba(0,0,0,0.92),0 0 0 1px rgba(255,255,255,0.04);
        display:flex; flex-direction:column; overflow:hidden;
        animation:scaleIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      @media (hover: none), (max-width: 768px) {
        .fs-friend-actions { display:flex; }
        .fs-friend-card { align-items:flex-start; }
      }
      @media (max-width: 768px) {
        .fs-preview-modal {
          padding:0;
          align-items:stretch;

          border-radius:0;
        }
