      `;
      document.head.appendChild(s);
    }

    const FRIEND_COLORS = ['#a5b8ff','#4ade80','#c084fc','#ffd27d','#2dd4bf','#fb7185','#fb923c','#67e8f9'];
    function friendColor(name) {
      const code = (name||'?').charCodeAt(0) % FRIEND_COLORS.length;
      return FRIEND_COLORS[code];
    }

    /* ── FriendDashboardPreview ─────────────────────────────────────────── */
    function FriendDashboardPreview({ friend, onClose }) {
      const [data, setData] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [loadError, setLoadError] = React.useState(false);
      const fc = friendColor(friend.name || friend.email);
      const initials = (friend.name || friend.email || '?')[0].toUpperCase();

      React.useEffect(() => {
        let cancelled = false;
        (async () => {
          setLoading(true);
          setLoadError(false);
          let remote = null;
          try {
            if (window._fsSb) {
              const { data: slim, error } = await window._fsSb
                .from('user_data')
                .select('widgets, bg_theme, custom_bg, widget_style, images, updated_at')
                .eq('user_id', friend.id)
                .maybeSingle();
              if (error) console.warn('[fs] friend dashboard slim load failed', error);
              remote = slim || null;
            }
            if (!remote && window._fsLoadRemote) remote = await window._fsLoadRemote(friend.id);
          } catch (e) {
            console.warn('[fs] friend dashboard load threw', e);
          }
          if (!cancelled) {
            setData(remote);
            setLoadError(!remote);
            setLoading(false);
          }
        })();
        return () => { cancelled = true; };
      }, [friend.id]);

      const formatLastConnection = value => {
        if (!value) return 'indisponible';
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return 'indisponible';
        return d.toLocaleDateString('fr-FR', {
          day: '2-digit',
          month: 'long',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      };
      const lastConnection = data?.updated_at || friend.updatedAt || friend.lastSeen || friend.addedAt;

      const widgets = data?.widgets || [];
      const friendTheme = React.useMemo(() => {
        if (data?.bg_theme === 'custom' && data?.custom_bg && window.buildCustomTheme) {
          return window.buildCustomTheme(data.custom_bg.c1 || '#a5b8ff', data.custom_bg.c2 || '#c084fc');
        }
        return (window.BG_THEMES || []).find(t => t.id === data?.bg_theme) || (window.BG_THEMES || []).find(t => t.id === 'cosmos');
      }, [data?.bg_theme, data?.custom_bg]);
      const friendWidgetStyle = data?.widget_style || {};
      const hexToRgba = (hex, a) => {
        if (!hex || !/^#[0-9a-f]{6}$/i.test(hex)) return `rgba(165,184,255,${a})`;
        const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${a})`;
      };
      const previewVars = friendTheme ? {
        '--bg-g1': `rgba(${friendTheme.g1.rgb},${friendTheme.g1.o})`,
        '--bg-g1-x': friendTheme.g1.x,
        '--bg-g1-y': friendTheme.g1.y,
        '--bg-g2': `rgba(${friendTheme.g2.rgb},${friendTheme.g2.o})`,
        '--bg-g2-x': friendTheme.g2.x,
        '--bg-g2-y': friendTheme.g2.y,
        '--theme-c1-rgb': friendTheme.g1.rgb,
        '--theme-c2-rgb': friendTheme.g2.rgb,
        '--theme-c1': `rgb(${friendTheme.g1.rgb})`,
        '--theme-c2': `rgb(${friendTheme.g2.rgb})`,
        '--widget-opacity': String(friendWidgetStyle.opacity ?? 1),
        '--widget-radius': `${friendWidgetStyle.radius ?? 24}px`,
        '--widget-glow-size': friendWidgetStyle.glowIntensity > 0 ? `${(friendWidgetStyle.glowIntensity * 60).toFixed(1)}px` : '0px',
        '--widget-glow': friendWidgetStyle.glowIntensity > 0 ? hexToRgba(friendWidgetStyle.glowColor || '#a5b8ff', friendWidgetStyle.glowIntensity * 0.50) : 'transparent',
        '--widget-glow-ring': friendWidgetStyle.glowIntensity > 0 ? hexToRgba(friendWidgetStyle.glowColor || '#a5b8ff', friendWidgetStyle.glowIntensity * 0.78) : 'transparent',
      } : {};
      const friendBg = friendTheme && window.buildGrad
        ? `${window.buildGrad(friendTheme)}, ${friendTheme.base}`
        : 'rgba(8,7,18,0.99)';
      const renderFriendWidget = w => {
        const type = (w.id || w.label || '').toLowerCase().split('_')[0];
        if (type === 'image') {
          const src = data?.images?.[`fs_img_${w.id}`] || data?.images?.fs_img_widget || null;
          return <ImageWidget widgetId={w.id} initialSrc={src} readOnly style={{ height:'100%' }} />;
        }
        const factory = window.WIDGET_COMPONENTS?.[type] || window.WIDGET_COMPONENTS?.[w.label?.toLowerCase?.()];
        return factory
          ? factory(w.variant||1, w.id)
          : <div style={{ width:'100%', height:'100%', background:'rgba(255,255,255,0.04)', borderRadius:20, display:'flex', alignItems:'center', justifyContent:'center' }}><span style={{ fontSize:10, color:T.muted, textTransform:'uppercase', letterSpacing:'0.06em', fontWeight:600 }}>{w.label}</span></div>;
      };

      return (
        <div className="fs-preview-modal" onClick={onClose}>
          <div className="fs-preview-inner" onClick={e => e.stopPropagation()} style={{ ...previewVars, background: friendBg, position:'relative' }}>
            {/* Ambient top glow */}
            <div style={{ position:'absolute', top:-80, left:'50%', transform:'translateX(-50%)', width:500, height:200, borderRadius:'50%', background:`radial-gradient(ellipse,${fc}18 0%,transparent 70%)`, pointerEvents:'none' }}/>
            {/* Top shimmer */}
            <div style={{ position:'absolute', top:0, left:'20%', right:'20%', height:1, background:`linear-gradient(90deg,transparent,${fc}55,transparent)`, pointerEvents:'none' }}/>

            {/* Header */}
            <div style={{ padding:'24px 32px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid rgba(255,255,255,0.06)', flexShrink:0, position:'relative' }}>
              <div style={{ display:'flex', alignItems:'center', gap:16 }}>
                <div style={{ width:50, height:50, borderRadius:'50%', background:`linear-gradient(135deg,${fc},${fc}99)`, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:T.display, fontWeight:800, fontSize:20, color:'#07070d', boxShadow:`0 8px 24px ${fc}44,0 0 0 2px ${fc}22`, flexShrink:0 }}>
                  {initials}
                </div>
                <div>
                  <div style={{ fontSize:9, fontWeight:800, letterSpacing:'0.14em', textTransform:'uppercase', color:T.muted, marginBottom:5 }}>Aperçu du tableau de bord · Lecture seule</div>
                  <div style={{ fontFamily:T.display, fontWeight:800, fontSize:22, letterSpacing:'-0.035em' }}>{friend.name || friend.email.split('@')[0]}</div>
                  <div style={{ fontSize:11, color:T.muted, marginTop:2 }}>{friend.email}</div>
                  <div style={{ fontSize:11, color:T.muted, marginTop:5 }}>
                    Dernière connexion le : <span style={{ color:T.text, fontWeight:700 }}>{formatLastConnection(lastConnection)}</span>
                  </div>
                </div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, background:'rgba(74,222,128,0.09)', border:'1px solid rgba(74,222,128,0.22)', borderRadius:99, padding:'7px 14px' }}>
                  <div style={{ width:6, height:6, borderRadius:'50%', background:T.green, boxShadow:`0 0 8px ${T.green}`, animation:'livePulse 2s ease-in-out infinite' }}/>
                  <span style={{ fontSize:9, fontWeight:800, color:T.green, letterSpacing:'0.12em', textTransform:'uppercase' }}>Vue en direct</span>
                </div>
                <button onClick={onClose} style={{ width:36, height:36, borderRadius:'50%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.08)', cursor:'pointer', color:T.muted, fontSize:18, display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.18s' }}
                  onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.1)';e.currentTarget.style.color=T.text;}}
                  onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.05)';e.currentTarget.style.color=T.muted;}}>×</button>
              </div>
            </div>

            {/* Dashboard grid */}
            <div style={{ flex:1, padding:'20px 28px 28px', overflow:'hidden', position:'relative' }}>
              <div style={{ position:'absolute', inset:0, background: friendBg, opacity:0.72, pointerEvents:'none' }}/>
              {loading ? (
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:16 }}>
                  <svg width={36} height={36} viewBox="0 0 24 24" fill="none" style={{animation:'fwSpin 1s linear infinite'}}>
                    <circle cx={12} cy={12} r={10} stroke="rgba(165,184,255,0.14)" strokeWidth={2}/>
                    <path d="M12 2a10 10 0 0 1 10 10" stroke={T.c1} strokeWidth={2} strokeLinecap="round"/>
                  </svg>
                  <div style={{ fontSize:13, color:T.muted, letterSpacing:'-0.01em' }}>Chargement de l'espace de {friend.name}…</div>
                </div>
              ) : loadError ? (
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:12, textAlign:'center', padding:24 }}>
                  <div style={{ fontSize:14, fontWeight:800, color:T.text }}>Dashboard indisponible</div>
                  <div style={{ fontSize:12, color:T.muted, maxWidth:360, lineHeight:1.55 }}>Impossible de charger le tableau de bord de cet ami pour le moment. Réessaie dans quelques secondes.</div>
                  <button onClick={() => { setLoading(true); setLoadError(false); window._fsLoadRemote?.(friend.id).then(remote => { setData(remote); setLoadError(!remote); setLoading(false); }); }} style={{ marginTop:6, height:34, borderRadius:12, border:`1px solid ${c1(0.28)}`, background:c1(0.11), color:T.c1, padding:'0 14px', fontSize:11, fontWeight:800, cursor:'pointer', fontFamily:T.font }}>Réessayer</button>
                </div>
              ) : widgets.length === 0 ? (
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:12 }}>
                  <div style={{ fontSize:14, fontWeight:700, color:T.text }}>Aucun widget configuré</div>
                  <div style={{ fontSize:12, color:T.muted }}>Cet espace est encore vide.</div>
                </div>
              ) : (
                <div style={{ display:'grid', gridTemplateColumns:'repeat(12,1fr)', gridTemplateRows:'repeat(4,1fr)', gap:12, height:'100%', pointerEvents:'none', position:'relative', zIndex:1 }}>
                  {widgets.map((w, i) => (
                    <div key={w.id} className="fs-dashboard-widget-in" style={{ gridColumn:w.col, gridRow:w.row, overflow:'hidden', borderRadius:20, animationDelay:`${140 + i * 76}ms` }}>
                      {renderFriendWidget(w)}
                    </div>
                  ))}
                </div>
              )}
              {/* Read-only overlay */}
              {!loading && <div style={{ position:'absolute', inset:0, zIndex:10, cursor:'default', pointerEvents:'none' }}/>}
            </div>
          </div>
        </div>
      );
    }

    /* ── FriendCard ─────────────────────────────────────────────────────── */
    function FriendCard({ friend, onPreview, onRemove, index }) {
      const [hov, setHov] = React.useState(false);
      const fc = friendColor(friend.name || friend.email);
      const initials = (friend.name || friend.email || '?')[0].toUpperCase();
      return (
        <div className="fs-friend-card" role="button" tabIndex={0} aria-label={`Voir le dashboard de ${friend.name || friend.email}`} style={{ animationDelay: `${index * 0.05}s` }}
          onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
          onKeyDown={e=>{ if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onPreview(); } }}
          onClick={onPreview}>
          {/* Avatar */}
          <div style={{ width:42, height:42, borderRadius:'50%', background:`linear-gradient(135deg,${fc},${fc}88)`, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:T.display, fontWeight:800, fontSize:17, color:'#07070d', flexShrink:0, boxShadow:`0 4px 16px ${fc}44` }}>
            {initials}
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:13, fontWeight:700, color:T.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{friend.name || friend.email.split('@')[0]}</div>
            <div style={{ fontSize:11, color:T.muted, marginTop:2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{friend.email}</div>
          </div>
          <div className="fs-friend-actions">
            <button type="button" className="fs-friend-action" style={{ display:'flex', alignItems:'center', gap:4, background:c1(0.1), border:`1px solid ${c1(0.26)}`, borderRadius:10, padding:'5px 10px', fontSize:10, fontWeight:700, color:T.c1, letterSpacing:'0.04em', cursor:'pointer', transition:'all 0.18s' }}
              onClick={e=>{e.stopPropagation();onPreview();}}
              onMouseEnter={e=>{e.currentTarget.style.background=c1(0.2);}}
              onMouseLeave={e=>{e.currentTarget.style.background=c1(0.1);}}>
              Voir
              <svg width={9} height={9} viewBox="0 0 10 10" fill="none" style={{marginLeft:3}}><path d="M2 5h6M5.5 2l3 3-3 3" stroke="currentColor" strokeWidth={1.6} strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
            <button type="button" className="fs-friend-action" aria-label={`Retirer ${friend.name || friend.email}`} style={{ width:28, height:28, borderRadius:9, background:'rgba(251,113,133,0.09)', border:'1px solid rgba(251,113,133,0.2)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'all 0.18s', flexShrink:0, padding:0 }}
              onClick={e=>{e.stopPropagation();onRemove();}}
              onMouseEnter={e=>{e.currentTarget.style.background='rgba(251,113,133,0.2)';}}
              onMouseLeave={e=>{e.currentTarget.style.background='rgba(251,113,133,0.09)';}}>
              <svg width={9} height={9} viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2L2 8" stroke="#fb7185" strokeWidth={1.6} strokeLinecap="round"/></svg>
            </button>
          </div>
        </div>
      );
    }

    /* ── FriendsPanel ───────────────────────────────────────────────────── */
    function FriendsPanel({ open, onClose, user }) {
      const { addToast } = window.useToast ? window.useToast() : { addToast: () => {} };
      const uid = user?.id || 'guest';
      const storageKey = `fs_friends_${uid}`;

      const [friends, setFriends] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem(storageKey)||'[]'); } catch(e) { return []; }
      });
      const [reverseFriends, setReverseFriends] = React.useState([]);
      const [loaded, setLoaded] = React.useState(false);
      const [email, setEmail] = React.useState('');
      const [status, setStatus] = React.useState('idle');
      const [msg, setMsg] = React.useState('');
      const [preview, setPreview] = React.useState(null);
      const inputRef = React.useRef(null);

      const normalizeFriend = f => {
        if (!f?.id || !f?.email) return null;
        const name = f.name || f.email.split('@')[0] || 'Unknown';
        return {
          id: f.id,
          name,
          email: String(f.email).toLowerCase(),
          initial: f.initial || (name || f.email || '?')[0].toUpperCase(),
          color: f.color || '#4ade80',
          addedAt: f.addedAt || Date.now(),
          updatedAt: f.updatedAt
        };
      };
      const uniqueFriends = (list, excludedId = user?.id) => {
        const map = new Map();
        (Array.isArray(list) ? list : []).forEach(f => {
          const n = normalizeFriend(f);
          if (!n || (excludedId && n.id === excludedId)) return;
          map.set(n.id, { ...(map.get(n.id) || {}), ...n });
        });
        return Array.from(map.values());
      };
      const persistOwnFriends = async next => {
        const clean = uniqueFriends(next);
        try { localStorage.setItem(storageKey, JSON.stringify(clean)); } catch(e) {}
        if (!user?.id || !window._fsSb) return { clean, error: null };
        const base = {
          name: user.name || window._fsSbUser?.user_metadata?.name || user.email?.split('@')[0] || 'Unknown',
          email: (user.email || window._fsSbUser?.email || '').toLowerCase(),
          friends: clean,
          updated_at: new Date().toISOString()
        };
        let { error } = await window._fsSb.from('user_data').update(base).eq('user_id', user.id);
        if (error) {
          const result = await window._fsSb.from('user_data').upsert({ user_id: user.id, ...base }, { onConflict: 'user_id' });
          error = result.error;
        }
        return { clean, error };
      };

      /* Load from Supabase (authoritative) when panel opens.
         Also reverse-lookup: find any user who has added ME, so friendship is always bidirectional. */
      React.useEffect(() => {
        if (!open || !user?.id) return;
        setLoaded(false);
        const myId = user.id;
        const ownP = window._fsLoadRemote(myId);
        const revP = window._fsSb
          ? window._fsSb.from('user_data').select('user_id, name, email, updated_at')
              .filter('friends', 'cs', JSON.stringify([{ id: myId }]))
          : Promise.resolve({ data: [] });
        Promise.all([ownP, revP]).then(([remote, revResult]) => {
          const raw = Array.isArray(remote?.friends) ? remote.friends : [];
          let localCached = [];
          try { localCached = JSON.parse(localStorage.getItem(storageKey) || '[]'); } catch(e) {}
          const clean = uniqueFriends([...localCached, ...raw]);
          setFriends(clean);
          try { localStorage.setItem(storageKey, JSON.stringify(clean)); } catch(e) {}
          const revData = revResult?.data || [];
          const reverse = revData
            .filter(r => r.user_id !== myId && !clean.some(f => f.id === r.user_id))
            .map(r => ({
              id: r.user_id,
              name: r.name || r.email?.split('@')[0] || 'Unknown',
              email: r.email || '',
              initial: (r.name || r.email || '?')[0].toUpperCase(),
              color: '#4ade80',
              updatedAt: r.updated_at
            }));
          setReverseFriends(reverse);
          setLoaded(true);
        });
      }, [open, user?.id]);

      /* Save — only after load, use UPDATE (not upsert) to guarantee only own row is touched */
      React.useEffect(() => {
        if (!loaded) return;
        const clean = uniqueFriends(friends);
        try { localStorage.setItem(storageKey, JSON.stringify(clean)); } catch(e) {}
        if (!user?.id || !window._fsSb) return;
        window._fsSb.from('user_data')
          .update({
            name: user.name || window._fsSbUser?.user_metadata?.name || user.email?.split('@')[0] || 'Unknown',
            email: (user.email || window._fsSbUser?.email || '').toLowerCase(),
            friends: clean,
            updated_at: new Date().toISOString()
          })
          .eq('user_id', user.id)
          .then(({ error }) => { if (error) console.warn('[fs] friends save failed', error); });
      }, [friends, loaded]);

      React.useEffect(() => {
        const h = e => {
          if (!Array.isArray(e.detail?.friends)) return;
          const clean = uniqueFriends(e.detail.friends);
          setFriends(prev => {
            const merged = uniqueFriends([...prev, ...clean]);
            return JSON.stringify(uniqueFriends(prev)) === JSON.stringify(merged) ? prev : merged;
          });
        };
        window.addEventListener('fs-remote-update', h);
        return () => window.removeEventListener('fs-remote-update', h);
      }, [user?.id]);

      React.useEffect(() => {
        if (open && inputRef.current) setTimeout(() => inputRef.current?.focus(), 200);
      }, [open]);

      const addFriend = async () => {
        const trimmed = email.trim();
        if (!trimmed || !trimmed.includes('@')) return;
        setStatus('loading');
        const found = await window._fsLookupUserByEmail(trimmed);
        if (!found) { setStatus('error'); setMsg('No LumenOS account found'); addToast({ message: 'Aucun compte LumenOS trouve', type: 'error', icon: '!' }); setTimeout(()=>setStatus('idle'),2600); return; }
        const myId = user?.id || window._fsSbUser?.id;
        if (found.id === myId) { setStatus('error'); setMsg("That's your own account!"); addToast({ message: 'Tu ne peux pas ajouter ton propre compte', type: 'warning', icon: '!' }); setTimeout(()=>setStatus('idle'),2600); return; }
        const existing = uniqueFriends([...friends, ...reverseFriends]);
        if (existing.some(f=>f.id===found.id)) { setStatus('error'); setMsg('Already in your friends'); addToast({ message: 'Cet ami est deja dans ta liste', type: 'info', icon: 'i' }); setTimeout(()=>setStatus('idle'),2600); return; }

        const friendEntry = normalizeFriend({ ...found, addedAt: Date.now() });
        const nextFriends = uniqueFriends([...friends, friendEntry]);
        setFriends(nextFriends);
        const saved = await persistOwnFriends(nextFriends);
        if (saved.error) {
          setStatus('error');
          setMsg('Synchronisation en attente');
          addToast({ message: "Ami ajoute localement, synchronisation en attente", type: 'warning', icon: '!' });
          if (window._fsFlushPush) window._fsFlushPush();
          setTimeout(()=>setStatus('idle'),2600);
          return;
        }

        if (myId && window._fsSb) {
          const myEmail = (user?.email || window._fsSbUser?.email || '').toLowerCase();
          const myName  = user?.name  || window._fsSbUser?.email?.split('@')[0] || 'Unknown';
          const { data: theirRow } = await window._fsSb
            .from('user_data').select('friends').eq('user_id', found.id).maybeSingle();
          const theirFriends = Array.isArray(theirRow?.friends) ? theirRow.friends : [];
          if (!theirFriends.some(f => f?.id === myId)) {
            const meEntry = { id: myId, name: myName, email: myEmail,
              initial: (myName[0] || '?').toUpperCase(), color: '#4ade80', addedAt: Date.now() };
            await window._fsSb.from('user_data').upsert({
              user_id: found.id,
              name: found.name || found.email?.split('@')[0] || 'Unknown',
              email: found.email,
              friends: uniqueFriends([...theirFriends, meEntry], found.id),
              updated_at: new Date().toISOString()
            }, { onConflict: 'user_id' });
          }
        }

        setEmail('');
        setStatus('success'); setMsg(`${found.name} added!`);
        addToast({ message: `${found.name} ajoute a tes amis`, type: 'success', icon: '?' });
        setTimeout(()=>setStatus('idle'), 2200);
      };
      const removeFriend = async (id) => {
        const removed = [...friends, ...reverseFriends].find(f => f.id === id);
        setFriends(prev => prev.filter(f => f.id !== id));
        setReverseFriends(prev => prev.filter(f => f.id !== id));
        if (removed) addToast({ message: `${removed.name || removed.email} retiré de tes amis`, type: 'info', icon: '−' });
        /* Best-effort: remove self from their list (silent if RLS blocks) */
        const myId = user?.id || window._fsSbUser?.id;
        if (myId && window._fsSb) {
          const { data: theirRow } = await window._fsSb
            .from('user_data').select('friends').eq('user_id', id).maybeSingle();
          const theirFriends = Array.isArray(theirRow?.friends) ? theirRow.friends : [];
          const updated = theirFriends.filter(f => f?.id !== myId);
          if (updated.length !== theirFriends.length) {
            await window._fsSb.from('user_data').upsert({
              user_id: id,
              friends: uniqueFriends(updated, id),
              updated_at: new Date().toISOString()
            }, { onConflict: 'user_id' });
          }
        }
      };

      /* Merge own-added friends + reverse-found friends (people who added me) */
      const selfId = user?.id;
      const selfEmail = (user?.email || '').toLowerCase();
      const allFriends = uniqueFriends([...friends, ...reverseFriends]);
      const displayFriends = allFriends.filter(f =>
        f?.id && f?.email &&
        f.id !== selfId &&
        f.email.toLowerCase() !== selfEmail
      );

      const btnBg = { idle: T.c1, loading: c1(0.3), success: T.green, error: T.rose }[status];

      if (!open) return null;
      return (
        <>
          <div className="fs-friends-backdrop" onPointerDown={e => { if (e.target === e.currentTarget) onClose(); }} onClick={e=>e.stopPropagation()}/>
          <div className="fs-friends-panel" onPointerDown={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
            {/* Header */}
            <div style={{ padding:'26px 24px 20px', flexShrink:0 }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:22 }}>
                <div>
                  <div style={{ fontSize:9, fontWeight:800, letterSpacing:'0.14em', textTransform:'uppercase', color:T.muted, marginBottom:6 }}>LumenOS</div>
                  <div style={{ fontFamily:T.display, fontWeight:800, fontSize:24, letterSpacing:'-0.04em', lineHeight:1 }}>Amis</div>
                  {allFriends.length>0 && <div style={{ fontSize:11, color:T.muted, marginTop:5 }}>{allFriends.length} connexion{allFriends.length>1?'s':''}</div>}
                </div>
                <button onClick={onClose} style={{ width:34, height:34, borderRadius:'50%', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.08)', cursor:'pointer', color:T.muted, fontSize:18, display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.18s' }}
                  onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.1)';e.currentTarget.style.color=T.text;}}
                  onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.color=T.muted;}}>×</button>
              </div>

              {/* Add friend input */}
              <div style={{ marginBottom:4 }}>
                <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:T.muted, marginBottom:9 }}>Ajouter un ami</div>
                <div style={{ display:'flex', gap:8 }}>
                  <input ref={inputRef} className="fs-add-input" type="email" value={email}
                    onChange={e=>setEmail(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&addFriend()}
                    placeholder="ami@example.com"
                    style={{ flex:1 }}/>
                  <button onClick={addFriend} disabled={status==='loading'}
                    style={{ width:46, height:46, borderRadius:14, background:btnBg, border:'none', cursor:status==='loading'?'default':'pointer', color:'#07070d', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'all 0.28s cubic-bezier(0.34,1.56,0.64,1)', boxShadow:`0 4px 20px ${btnBg}44` }}
                    onMouseEnter={e=>{if(status==='idle')e.currentTarget.style.transform='scale(1.08) translateY(-1px)';}}
                    onMouseLeave={e=>{e.currentTarget.style.transform='scale(1) translateY(0)';}}>
                    {status==='loading'
                      ? <svg width={16} height={16} viewBox="0 0 24 24" fill="none" style={{animation:'fwSpin 0.8s linear infinite'}}><circle cx={12} cy={12} r={10} stroke="rgba(255,255,255,0.2)" strokeWidth={2}/><path d="M12 2a10 10 0 0 1 10 10" stroke="#07070d" strokeWidth={2} strokeLinecap="round"/></svg>
                      : status==='success'
                      ? <svg width={14} height={14} viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-7" stroke="#07070d" strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round"/></svg>
                      : status==='error'
                      ? <svg width={13} height={13} viewBox="0 0 13 13" fill="none"><path d="M2 2l9 9M11 2L2 11" stroke="#07070d" strokeWidth={2} strokeLinecap="round"/></svg>
                      : <svg width={14} height={14} viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="#07070d" strokeWidth={2.2} strokeLinecap="round"/></svg>
                    }
                  </button>
                </div>
                {msg && (
                  <div style={{ fontSize:11, color:status==='error'?T.rose:T.green, marginTop:8, paddingLeft:2, display:'flex', alignItems:'center', gap:5, animation:'scaleIn 0.2s ease both' }}>
                    {status==='error'
                      ? <svg width={11} height={11} viewBox="0 0 12 12" fill="none"><circle cx={6} cy={6} r={5} stroke="currentColor" strokeWidth={1.4}/><path d="M6 3.5v3M6 8.5h.01" stroke="currentColor" strokeWidth={1.4} strokeLinecap="round"/></svg>
                      : <svg width={11} height={11} viewBox="0 0 12 12" fill="none"><circle cx={6} cy={6} r={5} stroke="currentColor" strokeWidth={1.4}/><path d="M3.5 6l2 2 3-3" stroke="currentColor" strokeWidth={1.4} strokeLinecap="round" strokeLinejoin="round"/></svg>
                    }
                    {msg}
                  </div>
                )}
              </div>
            </div>

            {/* Divider */}
            <div style={{ height:1, background:'rgba(255,255,255,0.06)', flexShrink:0, margin:'0 0 4px' }}/>

            {/* Friends list */}
            <div style={{ flex:1, overflowY:'auto', padding:'12px 16px 24px' }}>
              {displayFriends.length===0 ? (
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'80%', gap:16, padding:'20px 0' }}>
                  <div style={{ width:70, height:70, borderRadius:'50%', background:c1(0.07), border:`1px solid ${c1(0.15)}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <svg width={30} height={30} viewBox="0 0 24 24" fill="none">
                      <circle cx={9} cy={7} r={4} stroke={T.c1} strokeWidth={1.5}/>
                      <path d="M2 20c0-4 3.1-7 7-7s7 3 7 7" stroke={T.c1} strokeWidth={1.5} strokeLinecap="round"/>
                      <path d="M19 8v6M16 11h6" stroke={T.c1} strokeWidth={1.5} strokeLinecap="round"/>
                    </svg>
                  </div>
                  <div style={{ textAlign:'center' }}>
                    <div style={{ fontSize:14, fontWeight:700, color:T.text, marginBottom:7 }}>Aucun ami pour l'instant</div>
                    <div style={{ fontSize:12, color:T.muted, lineHeight:1.7 }}>Ajoute un ami par son email<br/>pour voir son tableau de bord en direct.</div>
                  </div>
                </div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  <div style={{ fontSize:9, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:T.muted, paddingLeft:4, marginBottom:4 }}>Tes amis</div>
                  {displayFriends.map((f, i) => (
                    <FriendCard key={f.id} friend={f} index={i}
                      onPreview={()=>setPreview(f)}
                      onRemove={()=>removeFriend(f.id)}/>
                  ))}
                </div>
              )}
            </div>
          </div>
          {preview && <FriendDashboardPreview friend={preview} onClose={()=>setPreview(null)}/>}
        </>
      );
    }

    window.FriendsPanel = FriendsPanel;
    window.FriendCard = FriendCard;
    window.FriendDashboardPreview = FriendDashboardPreview;
  </script>

  <script type="text/babel">
    /* ── Crystal Gamification System ─────────────────────────────────────── */
    if (!document.getElementById('fs-crystal-css')) {
      const s = document.createElement('style');
      s.id = 'fs-crystal-css';
      s.textContent = `
        @keyframes crystalFloat {
          0%,100%{transform:translateY(0) rotate(0deg)}
          33%{transform:translateY(-8px) rotate(1.8deg)}
          66%{transform:translateY(-4px) rotate(-1.2deg)}
        }
        @keyframes crystalPulse {
          0%,100%{filter:brightness(1) saturate(1)}
          50%{filter:brightness(1.22) saturate(1.3)}
        }
        @keyframes crystalSparkle {
          0%,100%{opacity:0;transform:scale(0.2) rotate(0deg)}
          50%{opacity:1;transform:scale(1.3) rotate(20deg)}
        }
        @keyframes crystalBeam {
          0%,100%{opacity:0.25;stroke-width:1.5}
          50%{opacity:0.85;stroke-width:2.8}
        }
        @keyframes crystalComplete {
          0%{transform:scale(1)}
          25%{transform:scale(1.22)}
          55%{transform:scale(0.93)}
          80%{transform:scale(1.07)}
          100%{transform:scale(1)}
        }
        @keyframes crystalShake {
          0%,100%{transform:rotate(0deg) scale(1)}
          20%{transform:rotate(-8deg) scale(1.06)}
          40%{transform:rotate(6deg) scale(1.04)}
          60%{transform:rotate(-4deg) scale(1.02)}
          80%{transform:rotate(3deg)}
        }
        @keyframes cristauxSlideIn {
          from{opacity:0;transform:translateX(-18px) scale(0.97)}
          to{opacity:1;transform:translateX(0) scale(1)}
        }
        @keyframes crystalCardIn {
          from{opacity:0;transform:translateY(12px) scale(0.94)}
          to{opacity:1;transform:translateY(0) scale(1)}
        }
        @keyframes crystalOverlayIn {
          from{opacity:0;transform:translateY(20px) scale(0.95)}
          to{opacity:1;transform:translateY(0) scale(1)}
        }
        @keyframes crystalRingGlow {
          0%,100%{filter:drop-shadow(0 0 4px currentColor)}
          50%{filter:drop-shadow(0 0 12px currentColor)}
        }
        @keyframes pulse-glow {
          0%,100%{opacity:0.86;transform:translateX(-50%) scale(1)}
          50%{opacity:1;transform:translateX(-50%) scale(1.045)}
        }
        @keyframes float {
          0%,100%{transform:translateY(0)}
          50%{transform:translateY(-6px)}
        }
        @keyframes caveVeinFlicker {
          0%{opacity:0.3}
          45%{opacity:0.76}
          100%{opacity:0.48}
        }
        @keyframes caveMistDrift {
          0%,100%{transform:translate3d(-1.5%,0,0);opacity:0.42}
          50%{transform:translate3d(1.5%,-2%,0);opacity:0.66}
        }
        .fs-cristaux-panel {
          position:fixed;inset:0;width:auto;
          background:#0a0a1a;
          backdrop-filter:blur(56px) saturate(200%);
          -webkit-backdrop-filter:blur(56px) saturate(200%);
          border:0;
          border-radius:0;z-index:200;
          display:flex;flex-direction:column;overflow:hidden;
          box-shadow:none;
          animation:cristauxSlideIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .fs-cristaux-backdrop { position:fixed;inset:0;z-index:199; }
        .fs-cristaux-panel.embedded {
          position:absolute;inset:0;width:auto;height:auto;
          z-index:1;border-radius:0;box-shadow:none;animation:none;
          backdrop-filter:none;-webkit-backdrop-filter:none;
        }
        .fs-crystal-cave {
          position:relative;flex:1;min-height:0;overflow:hidden;
          background:
            radial-gradient(ellipse at 50% 58%,rgba(26,237,226,0.32) 0%,rgba(5,77,102,0.34) 31%,rgba(3,9,28,0.92) 72%),
            linear-gradient(180deg,#06152f 0%,#031026 43%,#020615 100%);
        }
        .fs-crystal-cave::before {
          content:"";position:absolute;inset:0;pointer-events:none;opacity:0.96;
          background:
            radial-gradient(ellipse at 50% 57%,transparent 0 28%,rgba(2,8,27,0.26) 47%,rgba(0,2,12,0.88) 88%),
            radial-gradient(ellipse at -7% 50%,rgba(0,3,17,0.95) 0 30%,transparent 55%),
            radial-gradient(ellipse at 107% 50%,rgba(0,3,17,0.95) 0 30%,transparent 55%),
            linear-gradient(180deg,rgba(0,4,20,0.78),transparent 26%,transparent 66%,rgba(0,2,12,0.52));
          z-index:4;
        }
        .fs-crystal-cave::after {
          content:"";position:absolute;left:8%;right:8%;bottom:11%;height:34%;pointer-events:none;z-index:5;
          background:
            radial-gradient(ellipse at 50% 50%,rgba(64,255,245,0.58),rgba(16,217,219,0.36) 34%,rgba(9,124,156,0.14) 62%,transparent 74%);
          filter:blur(18px);
        }
        .fs-cave-svg { position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none; }
        .fs-cave-vein { animation:caveVeinFlicker 2s infinite alternate;filter:drop-shadow(0 0 8px currentColor); }
        .fs-cave-rock-left,.fs-cave-rock-right,.fs-cave-ceiling,.fs-cave-floor {
          position:absolute;pointer-events:none;
        }
        .fs-cave-rock-left {
          left:-1%;top:0;bottom:0;width:27%;z-index:3;
          background:linear-gradient(95deg,#02030b 0%,#0b1026 44%,rgba(12,13,30,0.25) 100%);
          clip-path:polygon(0 0,78% 0,62% 12%,86% 24%,58% 36%,77% 50%,51% 64%,66% 78%,42% 100%,0 100%);
          box-shadow:inset -26px 0 50px rgba(77,180,255,0.08);
        }
        .fs-cave-rock-right {
          right:-1%;top:0;bottom:0;width:28%;z-index:3;
          background:linear-gradient(270deg,#02030b 0%,#11102a 48%,rgba(12,13,30,0.25) 100%);
          clip-path:polygon(22% 0,100% 0,100% 100%,55% 100%,35% 82%,55% 67%,29% 52%,50% 37%,21% 22%,42% 10%);
          box-shadow:inset 26px 0 50px rgba(220,92,255,0.08);
        }
        .fs-cave-ceiling {
          left:0;right:0;top:0;height:25%;z-index:3;
          background:linear-gradient(180deg,#02030b 0%,rgba(8,10,24,0.92) 46%,transparent 100%);
          clip-path:polygon(0 0,100% 0,100% 68%,88% 49%,77% 72%,66% 43%,56% 65%,47% 38%,37% 66%,27% 44%,17% 70%,8% 48%,0 68%);
        }
        .fs-cave-floor {
          left:-4%;right:-4%;bottom:-3%;height:27%;z-index:6;
          background:
            radial-gradient(ellipse at 10% 45%,#10254a 0 8%,transparent 9%),
            radial-gradient(ellipse at 25% 58%,#071a37 0 14%,transparent 15%),
            radial-gradient(ellipse at 78% 44%,#211640 0 11%,transparent 12%),
            radial-gradient(ellipse at 91% 66%,#0b1d3b 0 12%,transparent 13%),
            linear-gradient(180deg,rgba(8,18,40,0.24),#020617 54%,#01030d);
          clip-path:polygon(0 40%,9% 18%,18% 29%,28% 13%,38% 31%,49% 22%,61% 34%,73% 13%,83% 30%,93% 19%,100% 39%,100% 100%,0 100%);
          box-shadow:inset 0 24px 32px rgba(51,255,243,0.05),0 -18px 34px rgba(0,0,0,0.5);
        }
        .fs-cave-mist {
          position:absolute;left:8%;right:8%;bottom:14%;height:25%;z-index:6;pointer-events:none;
          background:radial-gradient(ellipse at 50% 72%,rgba(108,255,247,0.24),transparent 66%);
          filter:blur(12px);animation:caveMistDrift 7s ease-in-out infinite;
        }
        .fs-cave-header {
          position:absolute;left:24px;right:24px;top:20px;z-index:8;
          display:flex;align-items:flex-start;justify-content:space-between;gap:18px;
        }
        .fs-cave-title {
          padding:14px 16px;border:1px solid rgba(126,244,255,0.14);border-radius:18px;
          background:linear-gradient(135deg,rgba(5,8,24,0.74),rgba(26,12,48,0.36));
          box-shadow:0 16px 44px rgba(0,0,0,0.36),0 0 34px rgba(102,244,255,0.08);
        }
        .fs-cave-stats { display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;max-width:460px; }
        .fs-cave-stat {
          min-width:74px;padding:8px 9px;border-radius:14px;text-align:center;

    }

    /* ── Palette & helpers ───────────────────────────────────────────────── */
    const CRYSTAL_PALETTES = [
      { id:'raw',      name:'Éclat brut',  a:'#8fa8b4', b:'#dce8ee', c:'#4a6878', glow:'rgba(143,168,180,0.5)'  },
      { id:'amethyst', name:'Améthyste',   a:'#a735c0', b:'#ecc8f4', c:'#620e80', glow:'rgba(186,104,200,0.62)' },
      { id:'sapphire', name:'Saphir',      a:'#1565c0', b:'#93c5fd', c:'#07235c', glow:'rgba(66,165,245,0.65)'  },
      { id:'diamond',  name:'Diamant',     a:'#67e8f9', b:'#ffffff', c:'#007a8a', glow:'rgba(103,232,249,0.78)' },
    ];
    window.CRYSTAL_PALETTES = CRYSTAL_PALETTES;

    function _cStateIdx(progress) {
      if (progress < 0.25) return 0;
      if (progress < 0.5)  return 1;
      if (progress < 0.75) return 2;
      return 3;
    }
    function _cStateProgress(si) { return [0.12, 0.37, 0.62, 0.92][si] || 0.92; }
    window._cStateIdx = _cStateIdx;

    /* ── Crystal Gem SVG ────────────────────────────────────────────────── */
    function CrystalGem({ progress = 0, size = 90, shattered = false, animate = false, completed = false, skin = null }) {
      const si  = _cStateIdx(progress);
      const skinDef = skin && skin !== 'default' && window.SKINS ? (window.SKINS || []).find(s => s.id === skin) : null;
      const pal = skinDef || CRYSTAL_PALETTES[si];
      const glow = 3 + si * 3.5 + progress * 9;
      const uid  = `cg-${size}-${si}`;
      const rg   = si === 0 ? 7 : 0; // rough offset for raw shard

      return (
        <svg viewBox="0 0 100 145" style={{
          width: size, height: size * 1.45, display: 'block', overflow: 'visible',
          filter: skinDef?.rainbow
            ? undefined
            : `drop-shadow(0 0 ${glow}px ${pal.glow}) drop-shadow(0 ${glow*0.5}px ${glow*1.2}px ${pal.glow})`,
          transition: 'filter 2s ease, transform 0.55s cubic-bezier(0.34,1.56,0.64,1), opacity 0.5s ease',
          transform: shattered ? 'scale(0) rotate(24deg)' : 'scale(1)',
          opacity:   shattered ? 0 : 1,
          animation: completed ? 'crystalComplete 0.85s cubic-bezier(0.34,1.56,0.64,1)' :
                     skinDef?.rainbow && animate ? 'crystalFloat 4.2s ease-in-out infinite, auroraHue 4s linear infinite' :
                     animate   ? 'crystalFloat 4.2s ease-in-out infinite, crystalPulse 3.2s ease-in-out infinite' :
                     skinDef?.rainbow ? 'auroraHue 4s linear infinite' : 'crystalPulse 5s ease-in-out infinite',
        }}>
          <defs>
            <linearGradient id={`${uid}-crown`} x1="18%" y1="0%" x2="82%" y2="100%">
              <stop offset="0%"   stopColor={pal.b} stopOpacity="0.94"/>
              <stop offset="42%"  stopColor={pal.a} stopOpacity="0.87"/>
              <stop offset="100%" stopColor={pal.c} stopOpacity="0.97"/>
            </linearGradient>
            <linearGradient id={`${uid}-pav`} x1="28%" y1="0%" x2="72%" y2="100%">
              <stop offset="0%"   stopColor={pal.a} stopOpacity="0.70"/>
              <stop offset="100%" stopColor={pal.c} stopOpacity="0.97"/>
            </linearGradient>
            <radialGradient id={`${uid}-table`} cx="42%" cy="38%" r="62%">
              <stop offset="0%"   stopColor="#fff"  stopOpacity="0.95"/>
              <stop offset="100%" stopColor={pal.b} stopOpacity="0.42"/>
            </radialGradient>
          </defs>

          {/* ── Crown ── */}
          <polygon
            points={`${33-rg},${8-rg*0.5} ${67+rg},8 ${83+rg*0.6},${33-rg*0.3} ${91+rg*0.3},52 9,52 ${17-rg*0.6},${33+rg*0.2}`}
            fill={`url(#${uid}-crown)`} stroke={pal.b} strokeWidth="0.5" strokeOpacity="0.45"/>
          {/* ── Pavilion ── */}
          <polygon points="9,52 91,52 50,138"
            fill={`url(#${uid}-pav)`} stroke={pal.b} strokeWidth="0.5" strokeOpacity="0.28"/>
          {/* ── Table face ── */}
          <polygon points={`${33-rg},${8-rg*0.5} ${67+rg},8 ${74+rg*0.3},22 ${26-rg*0.3},22`}
            fill={`url(#${uid}-table)`}/>
          {/* ── Left crown highlight ── */}
          <polygon points={`${33-rg},${8-rg*0.5} ${26-rg*0.3},22 ${17-rg*0.6},${33+rg*0.2} 9,52`}
            fill={pal.b} opacity="0.19"/>
          {/* ── Right crown shadow ── */}
          <polygon points={`${67+rg},8 ${74+rg*0.3},22 ${83+rg*0.6},${33-rg*0.3} 91,52`}
            fill={pal.c} opacity="0.28"/>
          {/* ── Facet lines crown ── */}
          {[
            [`${33-rg}`,`${8-rg*0.5}`,'50','52',0.38],[`${67+rg}`,'8','50','52',0.30],
            [`${26-rg*0.3}`,'22','50','52',0.26],[`${74+rg*0.3}`,'22','50','52',0.21],
            [`${17-rg*0.6}`,`${33+rg*0.2}`,'50','52',0.16],[`${83+rg*0.6}`,`${33-rg*0.3}`,'50','52',0.14],
          ].map(([x1,y1,x2,y2,op],i) => (
            <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={pal.b} strokeWidth="0.45" strokeOpacity={op}/>
          ))}
          {/* ── Facet lines pavilion ── */}
          {[['50','52','50','138',0.22],['9','52','50','138',0.17],['91','52','50','138',0.17],
            ['30','52','50','138',0.12],['70','52','50','138',0.12]].map(([x1,y1,x2,y2,op],i) => (
            <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={pal.b} strokeWidth="0.4" strokeOpacity={op}/>
          ))}
          {/* ── Table highlight bar ── */}
          <polygon points={`${38-rg*0.3},${9-rg*0.2} ${62+rg*0.3},9 ${68+rg*0.2},19 ${32-rg*0.2},19`}
            fill="rgba(255,255,255,0.7)"/>
          {/* ── Secondary shine (state 1+) ── */}
          {si >= 1 && <polygon points={`${26-rg*0.3},22 ${33-rg},37 9,52`} fill="rgba(255,255,255,0.13)"/>}
          {/* ── Pavilion inner glow (state 2+) ── */}
          {si >= 2 && <polygon points="30,52 70,52 50,95" fill={pal.b} opacity="0.07"/>}

          {/* ── Prismatic refraction beams (state 2+) ── */}
          {si >= 2 && (
            <g style={{animation:'crystalBeam 2.4s ease-in-out infinite'}}>
              <line x1="9"  y1="52" x2="-12" y2="40" stroke="#ff6b6b" strokeWidth="2.2" strokeOpacity="0.58" strokeLinecap="round"/>
              <line x1="9"  y1="52" x2="-13" y2="60" stroke="#ffd166" strokeWidth="1.6" strokeOpacity="0.50" strokeLinecap="round"/>
              <line x1="17" y1="33" x2="-3"  y2="25" stroke="#06d6a0" strokeWidth="1.5" strokeOpacity="0.48" strokeLinecap="round"/>
              <line x1="91" y1="52" x2="112" y2="40" stroke="#118ab2" strokeWidth="2.2" strokeOpacity="0.58" strokeLinecap="round"/>
              <line x1="83" y1="33" x2="103" y2="23" stroke="#c77dff" strokeWidth="1.6" strokeOpacity="0.50" strokeLinecap="round"/>
              <line x1="91" y1="52" x2="112" y2="60" stroke="#ff9f43" strokeWidth="1.3" strokeOpacity="0.40" strokeLinecap="round"/>
            </g>
          )}

          {/* ── Diamond sparkle stars (state 3) ── */}
          {si >= 3 && [{x:5,y:20,d:0},{x:94,y:27,d:0.45},{x:50,y:2,d:0.9},{x:11,y:66,d:1.3},{x:89,y:70,d:0.65},{x:50,y:141,d:1.8}].map((pt,i)=>(
            <g key={i} transform={`translate(${pt.x},${pt.y})`} style={{animation:`crystalSparkle ${1.7+i*0.28}s ease-in-out infinite ${pt.d}s`}}>
              <line x1="-5.5" y1="0" x2="5.5" y2="0" stroke="white" strokeWidth="2"   strokeOpacity="0.92" strokeLinecap="round"/>
              <line x1="0" y1="-5.5" x2="0" y2="5.5" stroke="white" strokeWidth="2"   strokeOpacity="0.92" strokeLinecap="round"/>
              <line x1="-3.2" y1="-3.2" x2="3.2" y2="3.2" stroke="white" strokeWidth="0.9" strokeOpacity="0.62" strokeLinecap="round"/>
              <line x1="3.2"  y1="-3.2" x2="-3.2" y2="3.2" stroke="white" strokeWidth="0.9" strokeOpacity="0.62" strokeLinecap="round"/>
            </g>
          ))}

          {/* ── Crack overlay when shattered ── */}
          {shattered && (
            <g stroke="rgba(255,255,255,0.85)" strokeLinecap="round">
              <line x1="50" y1="8" x2="28" y2="58" strokeWidth="1.3"/>
              <line x1="50" y1="8" x2="70" y2="45" strokeWidth="1"/>

              <line x1="70" y1="45" x2="84" y2="78" strokeWidth="0.9"/>
              <line x1="50" y1="52" x2="20" y2="100" strokeWidth="0.7"/>
            </g>
          )}
        </svg>
      );
    }
    window.CrystalGem = CrystalGem;

    /* ── Focus Crystal Overlay ──────────────────────────────────────────── */
    function FocusCrystalOverlay({ session, user, onEnd }) {
      const [elapsed, setElapsed] = React.useState(0);
      const [phase, setPhase]     = React.useState('growing');
      const [shattered, setShattered] = React.useState(false);
      const { addToast } = window.useToast ? window.useToast() : { addToast:()=>{} };
      const totalMs = (session?.duration || 25) * 60 * 1000;

      /* Timer */
      React.useEffect(() => {
        if (!session || phase !== 'growing') return;
        const start = session.startTime || Date.now();
        const tick  = () => {
          const e = Date.now() - start;
          setElapsed(e);
          if (e >= totalMs) setPhase('complete');
        };
        tick();
        const id = setInterval(tick, 250); // 4 fps → smooth sine-wave vertex oscillation
        return () => clearInterval(id);
      }, [session, phase, totalMs]);

      /* Page Visibility → shatter */
      React.useEffect(() => {
        if (!session || phase !== 'growing') return;
        const handler = () => {
          if (!document.hidden) return;
          setPhase('shattered');
          setShattered(true);
          addToast({ message: '💎 Ton cristal a été brisé !', type: 'error', duration: 4500 });
          setTimeout(() => onEnd && onEnd(null), 1500);
        };
        document.addEventListener('visibilitychange', handler);
        return () => document.removeEventListener('visibilitychange', handler);
      }, [session, phase]);

      /* Auto-save on complete */
      React.useEffect(() => {
        if (phase !== 'complete') return;
        const crystal = _buildCrystal(1, session);
        addToast({ message: '✦ Diamant forgé ! Magnifique concentration.', type: 'success', duration: 5000 });
        const t = setTimeout(() => onEnd && onEnd(crystal), 2800);
        return () => clearTimeout(t);
      }, [phase]);

      const [hovered, setHovered] = React.useState(false);

      if (!session) return null;

      const progress  = Math.min(elapsed / totalMs, 1);
      const si        = phase === 'complete' ? 3 : _cStateIdx(progress);
      /* Use session gradient if available, otherwise fall back to CRYSTAL_PALETTES */
      const sessionGrad = session?.crystalGradient && window.CRYSTAL_GRADIENTS
        ? window.CRYSTAL_GRADIENTS.find(g => g.id === session.crystalGradient)
        : null;
      /* colorProgress for the compact disc ring/border (matches crystal reveal) */
      const cpDisc = phase === 'complete' ? 1 : Math.pow(Math.min(progress * 1.4, 1), 0.65);
      const pal = sessionGrad
        ? {
            name: sessionGrad.name,
            a: cpDisc < 0.15 ? '#8fa8b4' : sessionGrad.stops[0],
            b: sessionGrad.stops[sessionGrad.stops.length - 1],
            c: sessionGrad.stops[0],
            glow: sessionGrad.glow.replace(/[\d.]+\)$/, `${(0.08 + cpDisc * 0.64).toFixed(2)})`),
          }
        : CRYSTAL_PALETTES[si];
      const remaining = Math.max(0, totalMs - elapsed);
      const remM      = String(Math.floor(remaining / 60000)).padStart(2,'0');
      const remS      = String(Math.floor((remaining % 60000) / 1000)).padStart(2,'0');
      /* Compact ring: R=33 inside an 82px viewBox */
      const Rc = 33, Cc = 2 * Math.PI * Rc;
      const dashC = Cc * (phase === 'complete' ? 1 : progress);

      const handleEnd = () => {
        const crystal = progress >= 0.5 ? _buildCrystal(progress, session) : null;
        if (crystal) addToast({ message: `💎 Cristal ${pal.name || ''} sauvegardé !`.trim(), type: 'success', duration: 3000 });
        onEnd && onEnd(crystal);
      };

      return (
        <div className="fs-crystal-overlay"
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}>

          {/* ── Expanded tooltip (hover only) ── */}
          <div style={{
            marginBottom: 10, overflow: 'hidden',
            maxHeight: hovered ? 120 : 0,
            opacity: hovered ? 1 : 0,
            transition: 'max-height 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.22s ease',
            pointerEvents: hovered ? 'all' : 'none',
          }}>
            <div style={{
              background: 'rgba(7,6,17,0.96)',
              backdropFilter: 'blur(48px)',
              border: `1px solid ${pal.a}44`,
              borderRadius: 18,
              padding: '12px 18px',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
              boxShadow: `0 16px 48px rgba(0,0,0,0.6), 0 0 32px ${pal.glow}`,
            }}>
              {/* State name */}
              <div style={{ fontSize:9, fontWeight:800, letterSpacing:'0.13em', textTransform:'uppercase',
                color: pal.a }}>
                {phase==='complete' ? '✦ Cristal forgé !' : phase==='shattered' ? '✧ Brisé' : pal.name}
              </div>
              {/* Time */}
              {phase === 'growing' && (
                <div style={{ fontFamily:T.mono, fontSize:20, fontWeight:700, color:T.text, letterSpacing:'-0.02em', lineHeight:1 }}>
                  {remM}:{remS}
                  <span style={{ fontSize:10, color:T.muted, fontFamily:T.font, marginLeft:6, fontWeight:500 }}>
                    {Math.round(progress*100)}%
                  </span>
                </div>
              )}
              {phase === 'complete' && (
                <div style={{ fontSize:13, fontWeight:700, color:pal.b }}>Session complète !</div>
              )}
              {/* End button */}
              {phase === 'growing' && (
                <button onClick={handleEnd} style={{
                  background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)',
                  borderRadius:10, padding:'6px 18px', color:T.muted, fontSize:11, fontWeight:600,
                  cursor:'pointer', fontFamily:T.font, transition:'all 0.15s' }}
                  onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.12)';e.currentTarget.style.color=T.text;}}
                  onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.color=T.muted;}}>
                  Arrêter
                </button>
              )}
            </div>
          </div>

          {/* ── Compact disc (always visible) ── */}
          <div style={{
            width: 80, height: 80, borderRadius: '50%', position: 'relative',
            cursor: 'pointer',
            background: 'rgba(7,6,17,0.88)',
            backdropFilter: 'blur(32px)',
            border: `1.5px solid ${pal.a}55`,
            boxShadow: `0 8px 32px rgba(0,0,0,0.55), 0 0 28px ${pal.glow}`,
            transition: 'border-color 1.8s ease, box-shadow 1.8s ease, transform 0.22s cubic-bezier(0.34,1.56,0.64,1)',
            transform: hovered ? 'scale(1.08)' : 'scale(1)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            {/* Progress ring */}
            <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', transform:'rotate(-90deg)' }} viewBox="0 0 80 80">
              <circle cx={40} cy={40} r={Rc} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={4}/>
              <circle cx={40} cy={40} r={Rc} fill="none" stroke={pal.a} strokeWidth={4}
                strokeDasharray={`${dashC} ${Cc}`} strokeLinecap="round"
                style={{ transition:'stroke-dasharray 1.2s ease, stroke 2s ease',
                  filter:`drop-shadow(0 0 5px ${pal.a})` }}/>
            </svg>

  <script type="text/babel">

  /* ── Curated gradient presets (color-theory: analogous/split-comp) ── */
  window.CRYSTAL_GRADIENTS = [
    { id:'aurora',   name:'Aurore',       stops:['#43e97b','#38f9d7'], glow:'rgba(56,249,215,0.72)'  },

    { id:'jade2',    name:'Jade',         stops:['#26d0ce','#1a2980'], glow:'rgba(38,208,206,0.72)'  },

  window._randomGradient = () => window.CRYSTAL_GRADIENTS[Math.floor(Math.random() * window.CRYSTAL_GRADIENTS.length)].id;

  /* ── Shape definitions ── */
  window.CRYSTAL_SHAPE_DEFS = {
    diamond: { name:'Diamant',  desc:'Taille brillant classique'  },
    shard:   { name:'Éclat',    desc:'Pointe asymétrique élancée' },
    geode:   { name:'Géode',    desc:'Forme organique arrondie'   },
    prism:   { name:'Prisme',   desc:'Section hexagonale nette'   },
    cluster: { name:'Grappe',   desc:'Trois pointes cristallines' },
    quartz:  { name:'Quartz',   desc:'Pilier hexagonal naturel'   },

  /* ── Seeded RNG ── */
  window._seedRng = (seed) => {
    const v = []; let s = (seed || 12345) >>> 0;
    for (let i = 0; i < 120; i++) { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; v.push(s / 4294967296 - 0.5); }
    return v;
  };

  /* ── Hex color interpolation ── */
  function _lerpHex(a, b, t) {
    const h = s => [parseInt(s.slice(1,3),16), parseInt(s.slice(3,5),16), parseInt(s.slice(5,7),16)];
    const [ar,ag,ab] = h(a), [br,bg,bb] = h(b);
    const c = v => Math.max(0,Math.min(255,Math.round(v)));
    return `#${c(ar+(br-ar)*t).toString(16).padStart(2,'0')}${c(ag+(bg-ag)*t).toString(16).padStart(2,'0')}${c(ab+(bb-ab)*t).toString(16).padStart(2,'0')}`;
  }

  /* ── Jitter polygon builder ── */
  /* ── Polygon builder ──
     stableAmt: irreversible sculpting that GROWS over the session
                (0 at start = exact base shape, maxVal at end = unique organic form)
     liveAmt:   tiny continuous sine oscillation for "alive" feel (optional)
     timeMs:    elapsed ms for the live oscillation ── */
  function _poly(pts, rng, stableAmt, off = 0, liveAmt = 0, timeMs = 0) {
    const n = rng.length;
    return pts.map(([x, y], i) => {
      const idx = (i * 6 + off * 7) % n;
      /* Stable directional deformation per vertex — unique, irreversible */
      const sdx = rng[idx]         * stableAmt;
      const sdy = rng[(idx+1) % n] * stableAmt * 0.58;
      /* Tiny living pulse — barely perceptible, stops when crystal is complete */
      let ldx = 0, ldy = 0;
      if (liveAmt > 0.01 && timeMs > 0) {
        const freqX = 0.0007 + Math.abs(rng[(idx+2)%n]) * 0.0005;
        const freqY = 0.0006 + Math.abs(rng[(idx+3)%n]) * 0.0006;
        const phX   = rng[(idx+4)%n] * Math.PI * 4;
        const phY   = rng[(idx+5)%n] * Math.PI * 4;
        ldx = Math.sin(timeMs * freqX + phX) * liveAmt;
        ldy = Math.cos(timeMs * freqY + phY) * liveAmt * 0.55;
      }
      return `${(x + sdx + ldx).toFixed(1)},${(y + sdy + ldy).toFixed(1)}`;
    }).join(' ');
  }

  /* ══════════════════════════════════════════════════════════════
     ShapedCrystalGem
     colorProgress : 0 = raw white/silver → 1 = full vivid gradient
     timeOffset    : elapsed ms → continuous organic shape sculpting
  ══════════════════════════════════════════════════════════════ */
  function ShapedCrystalGem({ shape = 'diamond', gradientId = null, progress = 0, size = 90,
                               animate = false, shattered = false, seed,
                               colorProgress = 1,
                               timeOffset = 0 }) {
    const _s  = React.useRef(seed != null ? seed : Math.floor(Math.random() * 999983));
    /* Single stable RNG — fixed for the whole session */
    const rng = React.useMemo(() => window._seedRng(_s.current), [_s.current]);

    /* ── Growth model ──────────────────────────────────────────────
       Crystal starts as the EXACT chosen shape (no deformation).
       Faces gradually sculpt into a unique organic variation.
       stableDeform: 0 → 10px  (irreversible face displacement)
       liveDeform:   0 → 2px   (tiny oscillation, crystal feels alive)
       scale:        0.88 → 1.0 (subtle swelling as crystal matures)
       alpha:        0.82 → 1.0 (solidifies as it crystallises)      ── */
    const organicP    = Math.pow(progress, 0.58);   // fast start, decelerates
    const stableDeform = organicP * 10;              // 0 → 10 px face displacement
    const liveDeform   = organicP * 1.8;             // 0 → 1.8 px pulse
    const scale        = 0.88 + progress * 0.12;
    const alpha        = 0.82 + progress * 0.18;

    /* ── Colour: starts white/silver, gradually reveals gradient ── */
    const GREY1 = '#cdd5dc', GREY2 = '#a8b4be';
    const grad = (window.CRYSTAL_GRADIENTS || []).find(g => g.id === gradientId)
                 || (window.CRYSTAL_GRADIENTS||[])[0]
                 || { stops:['#a5b8ff','#c084fc'], glow:'rgba(165,184,255,0.72)' };
    const targetC1 = grad.stops[0], targetC2 = grad.stops[grad.stops.length - 1];
    const cp = Math.max(0, Math.min(1, colorProgress));
    const c1 = cp >= 1 ? targetC1 : _lerpHex(GREY1, targetC1, cp);
    const c2 = cp >= 1 ? targetC2 : _lerpHex(GREY2, targetC2, cp);

    /* Glow: near-invisible silver at cp=0, full vivid at cp=1 */
    const glowAlpha = (0.08 + cp * 0.64).toFixed(2);
    const rawGlow   = grad.glow.replace(/[\d.]+\)$/, `${glowAlpha})`);
    const glowPx   = 2 + progress * 7 + cp * 9;

    const uid = `shcg-${shape}-${_s.current}`;

    const p   = (pts, off = 0) => _poly(pts, rng, stableDeform, off, liveDeform, timeOffset);

    /* ── 3D facet system ─────────────────────────────────────────────
       Simplified crystal outlines for clip-path (one per shape)     */
    const OUTLINES = {

      shard:   [[52,6],[86,46],[65,92],[50,140],[35,92],[12,44],[26,18]],
      geode:   [[50,10],[86,22],[94,44],[90,68],[76,88],[50,95],[24,86],[10,66],[6,44],[14,22],[30,10]],
      prism:   [[50,8],[77,24],[77,58],[50,138],[23,58],[23,24]],
      cluster: [[50,5],[81,30],[80,58],[68,88],[50,140],[32,88],[20,58],[19,30],[30,6]],
      quartz:  [[50,5],[66,14],[66,90],[50,140],[34,90],[34,14]],
    };

    /* Clip region sculpts alongside the crystal (offset 70 → different deformation) */
    const clipPts = _poly(OUTLINES[shape] || OUTLINES.diamond, rng, stableDeform * 0.52, 70);

    /* Random light/shadow facets — computed once per session seed */
    const facets = React.useMemo(() => {
      const n = rng.length, res = [];
      for (let i = 0; i < 18; i++) {
        const idx = (i * 11 + 7) % n;
        /* Anchor distributed across crystal face */
        const ax = 12 + ((i % 5) / 4) * 76  + rng[idx]       * 7;
        const ay = 8  + (Math.floor(i/5)/3)  * 120 + rng[(idx+1)%n] * 9;
        const angle = rng[(idx+2)%n] * Math.PI * 2;
        const da    = Math.PI * (0.18 + Math.abs(rng[(idx+3)%n]) * 0.72);
        const r1    = 18 + Math.abs(rng[(idx+4)%n]) * 65;
        const r2    = 18 + Math.abs(rng[(idx+5)%n]) * 65;
        const p1    = [ax + Math.cos(angle)    * r1, ay + Math.sin(angle)    * r1 * 0.7];
        const p2    = [ax + Math.cos(angle+da) * r2, ay + Math.sin(angle+da) * r2 * 0.7];

        const topLight = 1 - ay / 145;
        const bright   = rng[(idx+6)%n] * 0.65 + topLight * 0.32;

        opacity: shattered ? 0 : alpha,
        transition: 'filter 2s ease, transform 0.55s cubic-bezier(0.34,1.56,0.64,1), opacity 0.5s ease',
        animation: animate ? 'crystalFloat 4.2s ease-in-out infinite, crystalPulse 3.2s ease-in-out infinite' : 'crystalPulse 5s ease-in-out infinite',
      }}>
        <defs>
          <linearGradient id={`${uid}-g`} x1="18%" y1="0%" x2="82%" y2="100%">
            <stop offset="0%" stopColor={c2} stopOpacity="0.93"/>
            <stop offset="48%" stopColor={c1} stopOpacity="0.87"/>
            <stop offset="100%" stopColor={c1} stopOpacity="0.96"/>
          </linearGradient>
          <linearGradient id={`${uid}-g2`} x1="28%" y1="0%" x2="72%" y2="100%">
            <stop offset="0%" stopColor={c1} stopOpacity="0.68"/>
            <stop offset="100%" stopColor={c2} stopOpacity="0.94"/>
          </linearGradient>
          <radialGradient id={`${uid}-t`} cx="42%" cy="38%" r="62%">
            <stop offset="0%" stopColor="#ffffff" stopOpacity="0.94"/>
            <stop offset="100%" stopColor={c2} stopOpacity="0.40"/>
          </radialGradient>
          {/* Crystal outline for facet clipping */}
          <clipPath id={`${uid}-clip`}>
            <polygon points={clipPts}/>
          </clipPath>
        </defs>

        {/* ── Base shape polygons ── */}
        {content}

        {/* ── 3D facet overlays (clipped to crystal shape) ── */}
        {organicP > 0.02 && (
          <g clipPath={`url(#${uid}-clip)`}>
            {/* Light + shadow facet polygons */}
            {facets.map((f, i) => {
              const absB = Math.abs(f.bright);
              if (absB < 0.05) return null;
              const col = f.bright > 0
                ? `rgba(255,255,255,${(Math.min(f.bright * 0.82, 0.52) * facetOp).toFixed(3)})`
                : `rgba(0,5,22,${(Math.min(absB * 0.78, 0.48) * facetOp).toFixed(3)})`;
              return <polygon key={i} points={f.pStr} fill={col}/>;
            })}

            {/* Ridge lines — facet boundary edges */}
            {facets.slice(0, ridgeMax).map((f, i) => {
              const absB = Math.abs(f.bright);
              if (absB < 0.09) return null;
              const strokeCol = f.bright > 0.12
                ? `rgba(255,255,255,${(organicP * 0.42).toFixed(2)})`
                : `rgba(0,8,44,${(organicP * 0.36).toFixed(2)})`;
              return (
                <line key={`r${i}`}
                  x1={f.ax.toFixed(1)} y1={f.ay.toFixed(1)}
                  x2={f.p1x.toFixed(1)} y2={f.p1y.toFixed(1)}
                  stroke={strokeCol} strokeWidth="0.6" strokeLinecap="round"/>
              );
            })}

            {/* Specular highlight — main bright spot */}
            <circle cx={spCx.toFixed(1)} cy={spCy.toFixed(1)} r={(spR * organicP).toFixed(2)}
              fill={`rgba(255,255,255,${(organicP * 0.62).toFixed(2)})`}/>

            {/* Refraction streak from specular */}
            {organicP > 0.35 && (
              <line
                x1={spCx.toFixed(1)} y1={spCy.toFixed(1)}
                x2={sp2x.toFixed(1)} y2={sp2y.toFixed(1)}
                stroke={`rgba(255,255,255,${(organicP * 0.30).toFixed(2)})`}
                strokeWidth="1.3" strokeLinecap="round"/>
            )}

            {/* Secondary specular — smaller, offset */}
            {organicP > 0.55 && (
              <circle
                cx={(spCx + rng[93] * 18).toFixed(1)}
                cy={(spCy + Math.abs(rng[94]) * 20 + 15).toFixed(1)}
                r={(1.5 + Math.abs(rng[95]) * 2.5).toFixed(2)}
                fill={`rgba(255,255,255,${(organicP * 0.38).toFixed(2)})`}/>
            )}
          </g>
        )}

        {sparkle}
        {cracks}
      </svg>
    );
  }
  window.ShapedCrystalGem = ShapedCrystalGem;

  /* ══════════════════════════════════════════════════════════════
     ShapeGradientPicker — embedded in SessionModal step 2
  ══════════════════════════════════════════════════════════════ */
  function ShapeGradientPicker({ selectedShape, onShape, selectedGradient, onGradient }) {
    const [hov, setHov] = React.useState(null);
    const shapes = Object.entries(window.CRYSTAL_SHAPE_DEFS || {}).map(([id,d]) => ({ id,...d }));

    return (
      <div style={{paddingBottom:28}}>
        {/* Shape grid */}
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.09em',textTransform:'uppercase',color:T.muted,marginBottom:14}}>Forme du cristal</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:24}}>
          {shapes.map((s,idx) => {
            const sel = selectedShape === s.id;
            const isHov = hov === s.id;
            const grd = activeGrad || grads[0];
            return (
              <button key={s.id} onClick={() => onShape(s.id)}
                onMouseEnter={() => setHov(s.id)} onMouseLeave={() => setHov(null)}
                style={{
                  display:'flex', flexDirection:'column', alignItems:'center', gap:8,
                  padding:'18px 12px 14px', borderRadius:20, outline:'none',
                  background: sel ? `${grd.glow.replace(/[\d.]+\)$/,'0.09)')}` : isHov ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.025)',
                  border: `1.5px solid ${sel ? grd.stops[0] : isHov ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.07)'}`,
                  cursor:'pointer',
                  transition:'all 0.28s cubic-bezier(0.34,1.56,0.64,1)',
                  transform: sel ? 'scale(1.05) translateY(-3px)' : isHov ? 'scale(1.02) translateY(-1px)' : 'scale(1)',
                  boxShadow: sel ? `0 0 28px ${grd.glow}, 0 8px 20px rgba(0,0,0,0.4)` : isHov ? '0 4px 14px rgba(0,0,0,0.3)' : 'none',
                }}>
                <div style={{width:68,height:68,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {window.ShapedCrystalGem && React.createElement(window.ShapedCrystalGem, {
                    shape: s.id, gradientId: selectedGradient,
                    progress: sel ? 0.82 : isHov ? 0.58 : 0.35,
                    size: 46, seed: (s.id.charCodeAt(0) * 137 + (s.id.charCodeAt(1) || 0) * 59),
                  })}
                </div>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:12,fontWeight:700,color:sel?(grd.stops[0]):'rgba(248,246,252,0.9)',letterSpacing:'-0.01em',transition:'color 0.22s'}}>{s.name}</div>
                  <div style={{fontSize:9,color:T.muted,marginTop:2,lineHeight:1.4}}>{s.desc}</div>
                </div>
              </button>
            );
          })}
        </div>

        {/* Gradient swatches */}
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.09em',textTransform:'uppercase',color:T.muted,marginBottom:12}}>Couleur du cristal</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:20}}>
          {grads.map(g => {
            const sel = selectedGradient === g.id;
            return (
              <button key={g.id} onClick={() => onGradient(g.id)} title={g.name}
                style={{
                  width:30,height:30,borderRadius:'50%',padding:0,outline:'none',cursor:'pointer',
                  background:`linear-gradient(135deg,${g.stops[0]},${g.stops[g.stops.length-1]})`,
                  border:`2.5px solid ${sel?'rgba(255,255,255,0.92)':'transparent'}`,
                  boxShadow: sel ? `0 0 0 3px ${g.glow}, 0 0 20px ${g.glow}` : '0 2px 6px rgba(0,0,0,0.3)',
                  transition:'all 0.24s cubic-bezier(0.34,1.56,0.64,1)',
                  transform: sel ? 'scale(1.28)' : 'scale(1)',
                }}/>
            );
          })}
        </div>

        {/* Live preview */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,padding:'12px 0 4px'}}>
          <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',width:96,height:96}}>
            {/* Soft ambient glow behind preview */}
            <div style={{position:'absolute',inset:-16,borderRadius:'50%',background:activeGrad?`radial-gradient(circle,${activeGrad.glow},transparent 70%)`:'none',pointerEvents:'none'}}/>
            {window.ShapedCrystalGem && React.createElement(window.ShapedCrystalGem, {
              shape: selectedShape, gradientId: selectedGradient, progress: 0.72,
              size: 66, animate: true,
              seed: ((selectedShape||'diamond').charCodeAt(0) * 211 + ((selectedShape||'diamond').charCodeAt(1)||0) * 73),
            })}
          </div>
          <div style={{fontSize:10,color:T.muted,letterSpacing:'0.05em',fontWeight:500}}>
            {(window.CRYSTAL_SHAPE_DEFS||{})[selectedShape]?.name} · {activeGrad?.name}
          </div>
        </div>
      </div>
    );
  }
  window.ShapeGradientPicker = ShapeGradientPicker;
  </script>

  <script type="text/babel">
  /* ══════════════════════════════════════════════════════════════
     LUMENOS — GAMIFICATION SYSTEM
     Streaks · Quests · Focus Points · Store · Heatmap · Fusion
  ══════════════════════════════════════════════════════════════ */
  if (!document.getElementById('fs-gamif-css')) {

        padding:14px 16px; border-radius:18px;

      .gf-quest-card.done::after {

        transition:transform 0.15s, opacity 0.15s;
      }
      .heat-cell:hover { transform:scale(1.5); opacity:0.85; }
      .fp-badge {
        display:inline-flex; align-items:center; gap:4px; padding:3px 9px;
        border-radius:99px; font-size:10px; font-weight:700; letter-spacing:0.04em;
        background:rgba(255,210,125,0.12); border:1px solid rgba(255,210,125,0.25); color:#ffd27d;
      }
      .xp-badge {
        display:inline-flex; align-items:center; gap:4px; padding:3px 9px;
        border-radius:99px; font-size:10px; font-weight:700; letter-spacing:0.04em;
        background:rgba(165,184,255,0.12); border:1px solid rgba(165,184,255,0.25); color:#a5b8ff;
      }
      .gf-unlock-badge {
        flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;
        padding:14px 8px; border-radius:18px;
        background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07);
        transition:all 0.22s;
