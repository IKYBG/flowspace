      .gf-unlock-badge.unlocked { background:rgba(255,255,255,0.05); }
    `;
    document.head.appendChild(s);
  }

  /* ── Constants ─────────────────────────────────────────────── */
  window.SKINS = [
    { id:'default',  name:'Cristal pur',  price:0,   unlockType:'free',     a:'#8fa8b4', b:'#dce8ee', c:'#4a6878', glow:'rgba(143,168,180,0.5)'  },
    { id:'lava',     name:'Lave',          price:150, unlockType:'fp',       a:'#e25822', b:'#ffab40', c:'#7f2200', glow:'rgba(226,88,34,0.72)'  },
    { id:'glacier',  name:'Glacier',       price:150, unlockType:'fp',       a:'#4fc3f7', b:'#e1f5fe', c:'#0d47a1', glow:'rgba(79,195,247,0.7)'  },
    { id:'meteor',   name:'Météore',       price:200, unlockType:'fp',       a:'#b71c1c', b:'#ff6f00', c:'#3e0000', glow:'rgba(183,28,28,0.75)'  },
    { id:'obsidian', name:'Obsidienne',    price:0,   unlockType:'streak7',  a:'#9c27b0', b:'#e1bee7', c:'#12005e', glow:'rgba(156,39,176,0.82)', streak:7  },
    { id:'aurora',   name:'Aurora',        price:0,   unlockType:'streak14', a:'#00bcd4', b:'#ffffff', c:'#006064', glow:'rgba(0,188,212,0.8)',   streak:14, rainbow:true },
    { id:'void',     name:'Vide',          price:0,   unlockType:'streak21', a:'#7c4dff', b:'#b388ff', c:'#120030', glow:'rgba(124,77,255,0.88)', streak:21 },
  ];

  window.QUEST_DEFS = {
    daily: [
      { id:'d_crystals', label:'Cristallise 3 gemmes',  desc:"Complète 3 sessions focus aujourd'hui", target:3,   key:'sessions', fp:50,  xp:100 },
      { id:'d_marathon',  label:'Marathon de focus',      desc:'Une session de 45 min ou plus',          target:1,   key:'marathon', fp:80,  xp:150 },
      { id:'d_early',     label:'Lève-tôt',               desc:'Complète une session avant 9h00',        target:1,   key:'early',    fp:60,  xp:120 },
    ],
    weekly: [
      { id:'w_5h',   label:'Alchimiste du temps',  desc:'Forge 5 heures de cristaux cette semaine',   target:300, key:'minutes', fp:300, xp:500  },
      { id:'w_7days',label:'Régularité parfaite',  desc:'7 sessions en 7 jours → gemme légendaire',   target:7,   key:'days',    fp:500, xp:1000 },
    ],
  };

  const XP_TH = [0,100,250,500,1000,2000,3500,5500,8500,13000,20000];
  window._gLevel  = xp => { for (let i=XP_TH.length-1;i>=0;i--) if(xp>=XP_TH[i]) return i+1; return 1; };
  window._gLvlPct = xp => { const l=window._gLevel(xp),ci=l-1,curr=XP_TH[ci]||0,nxt=XP_TH[ci+1]||curr*1.5; return (xp-curr)/(nxt-curr); };
  window._gToday  = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  window._gMon    = () => { const d=new Date(),dw=d.getDay(),m=new Date(d); m.setDate(d.getDate()-(dw===0?6:dw-1)); return `${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`; };
  window._gMul    = (d,w) => w>=1?3.0:d>=7?2.0:d>=3?1.5:1.0;

  function _gDefault() {
    return { streaks:{daily:0,weekly:0,lastDate:null,weekStart:null,jokers:1,jokersUsed:0},
      fp:0, xp:0, heatmap:{}, fpmap:{}, unlocks:['default'], activeSkin:'default',
      quests:{daily:[],weekly:[],dailyReset:null,weeklyReset:null,weekSessions:{}} };
  }
  window._gLoad = uid => { try{ return JSON.parse(localStorage.getItem(`fs_gamif_${uid||'g'}`)||'null')||_gDefault(); }catch(e){ return _gDefault(); } };
  window._gSave = (uid,data) => {
    try{ localStorage.setItem(`fs_gamif_${uid||'g'}`,JSON.stringify(data)); }catch(e){}
    window.dispatchEvent(new CustomEvent('fs-gamif-update',{detail:data}));
    if(uid&&window._fsSb) window._fsSb.from('user_data').update({gamification:data,updated_at:new Date().toISOString()}).eq('user_id',uid).then(()=>{});
  };

  function _gResetQuests(g) {
    const today=window._gToday(),mon=window._gMon();
    if(!g.quests) g.quests={daily:[],weekly:[],dailyReset:null,weeklyReset:null,weekSessions:{}};
    if(g.quests.dailyReset!==today){ g.quests.daily=window.QUEST_DEFS.daily.map(q=>({id:q.id,progress:0,completed:false})); g.quests.dailyReset=today; }
    if(g.quests.weeklyReset!==mon){ g.quests.weekly=window.QUEST_DEFS.weekly.map(q=>({id:q.id,progress:0,completed:false})); g.quests.weeklyReset=mon; g.quests.weekSessions={}; }
  }

  window._gProcessSession = (uid, session, onToast) => {
    const g=window._gLoad(uid), today=window._gToday(), mon=window._gMon(), dur=session?.duration||0, hr=new Date().getHours();
    const yest=(()=>{ const d=new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
    /* streaks */
    if(g.streaks.lastDate!==today){ g.streaks.daily=(g.streaks.lastDate===yest)?g.streaks.daily+1:1; g.streaks.lastDate=today; }
    if(g.streaks.weekStart!==mon){ g.streaks.weekStart=mon; g.streaks.jokers=1; g.streaks.jokersUsed=0; }
    g.streaks.weekly=Math.floor(g.streaks.daily/7);
    /* fp */
    const mul=window._gMul(g.streaks.daily,g.streaks.weekly), earned=Math.round(dur*mul);
    g.fp=(g.fp||0)+earned; g.xp=(g.xp||0)+dur*2;
    if(!g.heatmap)g.heatmap={}; if(!g.fpmap)g.fpmap={};
    g.heatmap[today]=(g.heatmap[today]||0)+dur;
    g.fpmap[today]=(g.fpmap[today]||0)+earned;
    /* quests */
    _gResetQuests(g);
    g.quests.daily.forEach(q=>{
      if(q.completed)return; const def=window.QUEST_DEFS.daily.find(d=>d.id===q.id); if(!def)return;
      if(q.id==='d_crystals') q.progress=Math.min(q.progress+1,def.target);
      if(q.id==='d_marathon'&&dur>=45) q.progress=1;
      if(q.id==='d_early'&&hr<9) q.progress=1;
      if(q.progress>=def.target&&!q.completed){ q.completed=true; g.fp+=def.fp; g.xp+=def.xp; onToast&&onToast(`✦ Quête : ${def.label} (+${def.fp} FP)`); }
    });
    g.quests.weekly.forEach(q=>{
      if(q.completed)return; const def=window.QUEST_DEFS.weekly.find(d=>d.id===q.id); if(!def)return;
      if(q.id==='w_5h') q.progress=Math.min((q.progress||0)+dur,def.target);
      if(q.id==='w_7days'){ g.quests.weekSessions[today]=true; q.progress=Object.keys(g.quests.weekSessions).length; }
      if(q.progress>=def.target&&!q.completed){ q.completed=true; g.fp+=def.fp; g.xp+=def.xp; onToast&&onToast(`🌟 Quête hebdo : ${def.label} (+${def.fp} FP)`); }
    });
    /* skin unlocks */
    if(g.streaks.daily>=7  &&!g.unlocks.includes('obsidian')) g.unlocks.push('obsidian');
    if(g.streaks.daily>=14 &&!g.unlocks.includes('aurora'))   g.unlocks.push('aurora');
    if(g.streaks.daily>=21 &&!g.unlocks.includes('void'))     g.unlocks.push('void');
    window._gSave(uid,g);
    return { g, earned, mul };
  };

  /* ── useGamif hook ─────────────────────────────────────────── */
  function useGamif(userId) {
    const [g, setG] = React.useState(() => window._gLoad(userId));
    React.useEffect(() => {
      setG(window._gLoad(userId));
      const h = e => setG(e.detail||window._gLoad(userId));
      window.addEventListener('fs-gamif-update', h);
      return () => window.removeEventListener('fs-gamif-update', h);
    }, [userId]);
    return [g, (data) => { setG(data); window._gSave(userId, data); }];
  }

  /* ── Shared panel header ──────────────────────────────────── */
  function GfHeader({ title, sub, onClose }) {
    return (
      <div style={{padding:'28px 24px 0',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <div>
            <div style={{fontSize:9,fontWeight:800,letterSpacing:'0.14em',textTransform:'uppercase',color:T.muted,marginBottom:6}}>LumenOS</div>
            <div style={{fontFamily:T.display,fontWeight:800,fontSize:24,letterSpacing:'-0.04em',lineHeight:1}}>{title}</div>
            {sub&&<div style={{fontSize:11,color:T.muted,marginTop:5}}>{sub}</div>}

  function StorePanel({ open, onClose, user, embed = false }) {
    const [g, setG] = useGamif(user?.id);

    const { fp=0, unlocks=[], activeSkin='default' } = g;

    const buy = (skin) => {
      if (unlocks.includes(skin.id) || fp < skin.price) return;
      const ng = { ...g, fp: fp - skin.price, unlocks: [...unlocks, skin.id] };
      setG(ng);
      addToast({ message: `💎 ${skin.name} débloquée !`, type: 'success', duration: 3000 });
    };

    const equip = (skinId) => {
      const ng = { ...g, activeSkin: skinId };
      setG(ng);
    };

    const SkinCard = ({ skin, i }) => {
      const owned = unlocks.includes(skin.id);
      const equipped = activeSkin === skin.id;
      const canBuy = skin.price > 0 && !owned && fp >= skin.price;
      const locked = !owned && (skin.unlockType === 'fp' ? fp < skin.price : !owned);
      return (
        <div className={`gf-skin-card${equipped?' active-skin':''}${locked&&!canBuy?' locked':''}`}
          style={{animationDelay:`${i*0.04}s`,borderColor:equipped?skin.a:'rgba(255,255,255,0.07)',boxShadow:equipped?`0 0 24px ${skin.glow},0 4px 16px rgba(0,0,0,0.4)`:undefined}}

          {equipped&&<div style={{position:'absolute',top:8,right:8,width:8,height:8,borderRadius:'50%',background:skin.a,boxShadow:`0 0 8px ${skin.a}`}}/>}
          {skin.rainbow&&owned&&<div style={{position:'absolute',inset:0,borderRadius:22,background:'linear-gradient(135deg,rgba(255,0,128,0.06),rgba(124,77,255,0.06),rgba(0,188,212,0.06),rgba(16,185,129,0.06))',pointerEvents:'none'}}/>}

          <div style={{textAlign:'center',width:'100%'}}>
            <div style={{fontSize:11,fontWeight:700,color:skin.b,letterSpacing:'-0.01em'}}>{skin.name}</div>
            <div style={{fontSize:9,color:T.muted,marginTop:3}}>
              {owned
                ? equipped ? <span style={{color:skin.a}}>✦ Équipé</span> : <span style={{color:T.muted}}>Cliquer pour équiper</span>
                : skin.price > 0
                  ? <span style={{color:fp>=skin.price?'#ffd27d':T.muted}}>{skin.price} FP</span>
                  : <span style={{color:T.muted}}>{skin.streak}j de streak</span>
              }
            </div>
          </div>
          {!owned&&skin.price>0&&fp>=skin.price&&(
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${skin.a},transparent)`,opacity:0.7}}/>

      );
    };

    const _storeInner = (
      <>
        <div style={{padding:'0 20px 16px',flexShrink:0}}>
            {/* FP balance */}

              <svg width={28} height={28} viewBox="0 0 24 24" fill="none">
                <polygon points="12,2 15.5,8.5 22,9.5 17,14.5 18.5,21 12,17.5 5.5,21 7,14.5 2,9.5 8.5,8.5" stroke="#ffd27d" strokeWidth={1.5} fill="rgba(255,210,125,0.15)" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              <div>
                <div style={{fontFamily:T.mono,fontSize:28,fontWeight:800,color:'#ffd27d',lineHeight:1,letterSpacing:'-0.03em',animation:'fpCount 0.4s ease both'}}>{fp.toLocaleString('fr')}</div>
                <div style={{fontSize:10,color:'rgba(255,210,125,0.6)',fontWeight:600,marginTop:2}}>Focus Points disponibles</div>
              </div>
            </div>

          <div style={{flex:1,overflowY:'auto',padding:'0 16px 24px'}}>
            <span className="gf-sec-title" style={{paddingLeft:4}}>Cristaux disponibles</span>

              {(window.SKINS||[]).map((skin,i) => <SkinCard key={skin.id} skin={skin} i={i}/>)}

  /* ─────────────────────────────────────────────────────────────
     4. PROGRESS SCREEN  (Heatmap · FP Chart · Vault)
  ───────────────────────────────────────────────────────────── */
  function FocusHeatmap({ heatmap={} }) {
    const days = [];
    for (let i=364; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      days.push({ k, min: heatmap[k]||0 });
    }
    const maxMin = Math.max(...days.map(d=>d.min), 1);
    const getCol = min => {
      if (!min) return 'rgba(255,255,255,0.05)';
      const t = min/maxMin;
      if (t < 0.25) return `rgba(103,232,249,${0.22+t*1.2})`;
      if (t < 0.5)  return `rgba(103,232,249,${0.55+t*0.5})`;
      if (t < 0.75) return `rgba(165,128,255,${0.65+t*0.4})`;
      return `rgba(255,255,255,${0.75+t*0.25})`;
    };
    const weeks = [];
    for (let i=0; i<days.length; i+=7) weeks.push(days.slice(i,i+7));
    const months=['J','F','M','A','M','J','J','A','S','O','N','D'];
    return (
      <div style={{overflowX:'auto',paddingBottom:6}}>
        <div style={{display:'flex',gap:3,minWidth:'fit-content'}}>
          {weeks.map((wk,wi)=>(
            <div key={wi} style={{display:'flex',flexDirection:'column',gap:3}}>
              {wk.map((day,di)=>(
                <div key={di} className="heat-cell" title={`${day.k} · ${day.min} min`} style={{background:getCol(day.min)}}/>
              ))}
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:6,marginTop:10,alignItems:'center'}}>
          <span style={{fontSize:9,color:T.muted}}>Moins</span>
          {[0,0.25,0.5,0.75,1].map((t,i)=>(
            <div key={i} style={{width:11,height:11,borderRadius:3,background:getCol(t*maxMin||0)}}/>
          ))}
          <span style={{fontSize:9,color:T.muted}}>Plus</span>
        </div>
      </div>
    );
  }

  function FPBarChart({ fpmap={} }) {
    const days = [];
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const labels = ['D','L','M','M','J','V','S'];
      days.push({ k, fp: fpmap[k]||0, label: labels[d.getDay()] });
    }
    const maxFP = Math.max(...days.map(d=>d.fp), 1);
    return (
      <div style={{display:'flex',gap:8,alignItems:'flex-end',height:80}}>
        {days.map((day,i) => {
          const h = Math.max((day.fp/maxFP)*72, day.fp>0?4:1);
          const isToday = i===6;
          return (
            <div key={i} className="bar-col">
              {day.fp>0&&<div style={{fontSize:8,color:T.muted,marginBottom:3}}>{day.fp}</div>}
              <div className="bar-fill" style={{height:h,background:isToday?'linear-gradient(180deg,#ffd27d,rgba(255,210,125,0.4))':'rgba(255,255,255,0.1)',boxShadow:isToday?'0 0 12px rgba(255,210,125,0.4)':undefined,animationDelay:`${i*0.05}s`}}/>
              <div style={{fontSize:9,color:isToday?'#ffd27d':T.muted,fontWeight:isToday?700:400,marginTop:5}}>{day.label}</div>
            </div>
          );
        })}
      </div>
    );
  }

  function ProgressScreen({ onNavigate, user, embedded = false }) {
    const [g] = useGamif(user?.id);
    const crystals = React.useMemo(()=>{ try{ return JSON.parse(localStorage.getItem(`fs_crystals_${user?.id}`))||[]; }catch(e){ return []; } },[user?.id]);
    const { heatmap={}, fpmap={}, fp=0, xp=0 } = g;
    const totalMin = Object.values(heatmap).reduce((a,b)=>a+b,0);
    const totalFP  = Object.values(fpmap).reduce((a,b)=>a+b,0);

    return (
      <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',fontFamily:T.font}}>
        {/* Header — hidden when embedded in EvolutionScreen */}
        {!embedded && (
          <div style={{padding:'32px 36px 0',flexShrink:0}}>
            <button onClick={()=>onNavigate('dashboard')} style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,padding:'7px 15px',color:T.muted,fontSize:12,cursor:'pointer',fontFamily:T.font,transition:'all 0.15s',marginBottom:24}}
              onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.09)';e.currentTarget.style.color=T.text;}}
              onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.05)';e.currentTarget.style.color=T.muted;}}>← Retour</button>
            <div style={{fontSize:9,fontWeight:800,letterSpacing:'0.1em',textTransform:'uppercase',color:T.muted,marginBottom:8}}>LumenOS · Progression</div>
            <div style={{fontFamily:T.display,fontWeight:800,fontSize:32,letterSpacing:'-0.04em',lineHeight:1.05,marginBottom:6}}>Ta progression</div>
          </div>
        )}
        <div className="fs-prog-body" style={{flex:1,overflowY:'auto',padding:'20px 36px 36px'}}>

          {/* Stats row */}
          <div className="fs-prog-stats" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:28}}>
            {[
              { label:'Cristaux forgés', value:crystals.length, unit:'gemmes' },
              { label:'Temps total',     value:Math.round(totalMin/60*10)/10, unit:'heures' },
              { label:'FP gagnés',       value:totalFP.toLocaleString('fr'), unit:'points' },
            ].map((s,i)=>(
              <div key={i} style={{padding:'16px 18px',borderRadius:20,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)'}}>
                <div style={{fontFamily:T.mono,fontSize:24,fontWeight:800,color:T.text,letterSpacing:'-0.03em',lineHeight:1}}>{s.value}</div>
                <div style={{fontSize:9,color:T.muted,marginTop:6,letterSpacing:'0.02em'}}>{s.unit.toUpperCase()}</div>
                <div style={{fontSize:10,color:T.muted,marginTop:3}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Heatmap */}
          <div style={{padding:'20px 20px',borderRadius:22,background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.07)',marginBottom:20}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:T.text}}>Carte d'activité</div>
              <div style={{fontSize:10,color:T.muted}}>365 derniers jours</div>
            </div>
            <div className="fs-heatmap-wrap" style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}><FocusHeatmap heatmap={heatmap}/></div>
          </div>

          {/* Weekly FP chart */}
          <div style={{padding:'20px 20px',borderRadius:22,background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.07)',marginBottom:20}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:T.text}}>Focus Points — 7 derniers jours</div>
              <span className="fp-badge">{(g.fp||0).toLocaleString('fr')} FP total</span>
            </div>
            <FPBarChart fpmap={fpmap}/>
          </div>

          {/* Crystal Vault */}
          {crystals.length > 0 && (
            <div style={{padding:'20px 20px',borderRadius:22,background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.07)'}}>
              <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:16}}>Coffre de cristaux</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(72px,1fr))',gap:10}}>
                {crystals.slice(0,24).map((c,i)=>{
                  const si=Math.min(c.stateIdx??3,3);
                  const pal=CRYSTAL_PALETTES[si];
                  const sz=36+Math.min((c.duration||25)/90,1)*24;
                  return (
                    <div key={c.id} title={`${pal.name} · ${c.duration}min · ${new Date(c.completedAt).toLocaleDateString('fr-FR')}`}
                      style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5,padding:'10px 6px',borderRadius:16,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',transition:'all 0.22s',cursor:'pointer',animationDelay:`${i*0.04}s`,animation:'crystalCardIn 0.3s both'}}
                      onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.07)';e.currentTarget.style.transform='translateY(-3px)';}}
                      onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.03)';e.currentTarget.style.transform='translateY(0)';}}>
                      {c.crystalShape && window.ShapedCrystalGem
                        ? React.createElement(window.ShapedCrystalGem, { shape:c.crystalShape, gradientId:c.crystalGradient, progress:0.88, size:sz, seed:c.seed||c.id })
                        : React.createElement(window.CrystalGem, { progress:window._cStateProgress(si), size:sz, skin:c.skin })
                      }
                      <div style={{fontSize:8,color:T.muted,fontWeight:600}}>{c.duration}m</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }
  window.ProgressScreen = ProgressScreen;

  /* ─────────────────────────────────────────────────────────────
     ÉVOLUTION SCREEN — Régularité · Quêtes · Boutique · Progression
  ───────────────────────────────────────────────────────────── */
  function EvolutionScreen({ user, initialTab = null }) {
    const readInitialTab = () => {
      if (initialTab) return initialTab;
      try { return localStorage.getItem('fs_evolution_initial_tab') || 'streaks'; } catch(e) { return 'overview'; }
    };
    const [tab, setTab] = React.useState(readInitialTab);
    React.useEffect(() => setTab(readInitialTab()), [initialTab]);
    const [g] = useGamif(user?.id);
    const { fp=0, xp=0, streaks={}, quests={} } = g;
    const lvl = window._gLevel(xp);
    const pending = [...(quests.daily||[]),...(quests.weekly||[])].filter(q=>!q.completed).length;
    const crystals = React.useMemo(()=>{ try{ return JSON.parse(localStorage.getItem(`fs_crystals_${user?.id}`))||[]; }catch(e){ return []; } },[user?.id]);
    const totalMin = Object.values(g.heatmap||{}).reduce((a,b)=>a+b,0);

    const TABS = [
      { id:'streaks',     label:'Régularité', meta:`${streaks.daily||0} jour${(streaks.daily||0)>1?'s':''}` },
      { id:'quests',      label:'Quêtes', meta:`${pending} en cours` },
      { id:'store',       label:'Boutique', meta:`${fp.toLocaleString('fr')} FP` },
      { id:'progression', label:'Progression', meta:`Niv. ${lvl}` },
    ];

    return (
      <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',fontFamily:T.font}}>
        <div className="fs-evo-head" style={{padding:'32px 36px 0',flexShrink:0}}>
          <div className="fs-evo-head-inner" style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:24,marginBottom:24}}>
            <div style={{minWidth:0}}>
              <div style={{fontSize:9,fontWeight:800,letterSpacing:'0.12em',textTransform:'uppercase',color:T.muted,marginBottom:8}}>LumenOS · Évolution</div>
              <div className="fs-evo-title" style={{fontFamily:T.display,fontWeight:800,fontSize:36,letterSpacing:'-0.045em',lineHeight:1.02,color:T.text}}>Évolution</div>
              <div className="fs-evo-desc" style={{fontSize:13,color:T.muted,marginTop:8,maxWidth:520,lineHeight:1.55}}>Régularité, quêtes, boutique et progression réunies dans un seul espace.</div>
            </div>
            <div className="fs-evo-badges" style={{display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
              <span className="fp-badge">{fp.toLocaleString('fr')} FP</span>
              <span className="xp-badge">{xp.toLocaleString('fr')} XP</span>
            </div>
          </div>
          <div className="fs-evo-tabs" style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:10,padding:4,borderRadius:24,background:'rgba(255,255,255,0.035)',border:'1px solid rgba(255,255,255,0.065)',boxShadow:'inset 0 1px 0 rgba(255,255,255,0.04)'}}>
            {TABS.map(t => {
              const active = tab === t.id;
              return (
                <button key={t.id} onClick={() => setTab(t.id)} className={"fs-evo-tab-btn"+(active?' active':'')} style={{
                  minWidth:0, border:'none', borderRadius:20, padding:'14px 16px', cursor:'pointer',
                  background: active ? 'linear-gradient(180deg,rgba(var(--theme-c1-rgb),0.20),rgba(255,255,255,0.07))' : 'transparent',
                  color: active ? T.text : T.muted,
                  boxShadow: active ? '0 14px 30px rgba(var(--theme-c1-rgb),0.14), inset 0 1px 0 rgba(255,255,255,0.10)' : 'none',
                  border: `1px solid ${active ? 'rgba(var(--theme-c1-rgb),0.22)' : 'transparent'}`,
                  fontFamily:T.font, textAlign:'left', transition:'all 0.22s cubic-bezier(0.34,1.56,0.64,1)',
                }}>
                  <div style={{fontSize:13,fontWeight:800,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.label}</div>
                  <div style={{fontSize:10,color:active?'rgba(248,246,252,0.52)':T.muted,marginTop:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.meta}</div>
                </button>
              );
            })}
          </div>
        </div>
        <div className="fs-evo-content" style={{flex:1,overflow:'hidden',padding:'20px 36px 36px'}}>
          <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',borderRadius:28,background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.06)',boxShadow:'inset 0 1px 0 rgba(255,255,255,0.035)'}}>
            <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',paddingTop:20}}>
              {tab==='streaks'     && window.StreaksPanel     && React.createElement(window.StreaksPanel,     { embed:true, user })}
              {tab==='quests'      && window.QuestsPanel      && React.createElement(window.QuestsPanel,      { embed:true, user })}
              {tab==='store'       && window.StorePanel       && React.createElement(window.StorePanel,       { embed:true, user })}
              {tab==='progression' && window.ProgressScreen   && React.createElement(window.ProgressScreen,   { onNavigate:()=>{}, user, embedded:true })}
            </div>
          </div>
        </div>
      </div>
    );
  }
  window.EvolutionScreen = EvolutionScreen;

  /* ─────────────────────────────────────────────────────────────
     6. GAMIF MINI WIDGET  (Dashboard compact stats)
  ───────────────────────────────────────────────────────────── */
  function GamifMiniWidget({ user, onOpenQuests, onOpenStreaks }) {
    const [g] = useGamif(user?.id);
    const { fp=0, xp=0, streaks={}, quests={} } = g;
    const lvl = window._gLevel(xp);
    const pending = [...(quests.daily||[]),...(quests.weekly||[])].filter(q=>!q.completed).length;
    const mul = window._gMul(streaks.daily||0, streaks.weekly||0);

    return (
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        {/* Streak badge */}
        <button onClick={onOpenStreaks} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:12,background:'rgba(255,210,125,0.08)',border:'1px solid rgba(255,210,125,0.2)',cursor:'pointer',transition:'all 0.18s'}}
          onMouseEnter={e=>e.currentTarget.style.background='rgba(255,210,125,0.15)'}
          onMouseLeave={e=>e.currentTarget.style.background='rgba(255,210,125,0.08)'}>
          <svg width={12} height={14} viewBox="0 0 36 52" fill="url(#mFlame)" style={{filter:'drop-shadow(0 0 5px rgba(255,150,0,0.6))'}}>
            <defs><linearGradient id="mFlame" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stopColor="#e25822"/><stop offset="100%" stopColor="#ffd700"/></linearGradient></defs>
            <path d="M18 50C8 50 2 42 2 34C2 24 9 16 18 10C18 18 22 22 26 20C22 26 30 30 30 38C30 45 25 50 18 50Z" fill="url(#mFlame)"/>
          </svg>
          <span style={{fontFamily:T.mono,fontWeight:800,fontSize:12,color:'#ffd27d'}}>{streaks.daily||0}</span>
          {mul>1&&<span style={{fontSize:8,fontWeight:700,color:'rgba(255,210,125,0.7)',letterSpacing:'0.02em'}}>×{mul}</span>}
        </button>
        {/* Level badge */}
        <div style={{display:'flex',alignItems:'center',gap:5,padding:'6px 11px',borderRadius:12,background:'rgba(165,184,255,0.08)',border:'1px solid rgba(165,184,255,0.18)'}}>
          <svg width={11} height={11} viewBox="0 0 14 14" fill="none"><polygon points="7,1 8.5,5 13,5.5 9.5,8.5 10.5,13 7,10.5 3.5,13 4.5,8.5 1,5.5 5.5,5" stroke="#a5b8ff" strokeWidth={1} fill="rgba(165,184,255,0.2)"/></svg>
          <span style={{fontFamily:T.mono,fontWeight:800,fontSize:11,color:'#a5b8ff'}}>Niv.{lvl}</span>
        </div>
        {/* Quest badge */}
        {pending>0&&(
          <button onClick={onOpenQuests} style={{display:'flex',alignItems:'center',gap:5,padding:'6px 10px',borderRadius:12,background:'rgba(74,222,128,0.08)',border:'1px solid rgba(74,222,128,0.2)',cursor:'pointer',transition:'all 0.18s'}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(74,222,128,0.15)'}
            onMouseLeave={e=>e.currentTarget.style.background='rgba(74,222,128,0.08)'}>
            <svg width={11} height={11} viewBox="0 0 14 14" fill="none"><circle cx={7} cy={7} r={6} stroke={T.green} strokeWidth={1.2}/><path d="M4.5 7l2 2 3-3" stroke={T.green} strokeWidth={1.2} strokeLinecap="round" strokeLinejoin="round"/></svg>
            <span style={{fontSize:10,fontWeight:700,color:T.green}}>{pending}</span>
          </button>
        )}
      </div>
    );
  }
  window.GamifMiniWidget = GamifMiniWidget;

  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>

</html>
