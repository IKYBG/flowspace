<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1220"/>
      <stop offset="100%" stop-color="#070810"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8fdcff" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#b891ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#070810" stop-opacity="0"/>
    </radialGradient>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Glow overlay -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>
  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#8fdcff" stroke-width="1.5" stroke-opacity="0.18"/>

  <!-- Letter L -->
  <text
    x="256" y="310"
    font-family="'Sora','Inter','Helvetica Neue',sans-serif"
    font-weight="700"
    font-size="248"
    text-anchor="middle"
    fill="#8fdcff"
    filter="url(#textglow)"
    opacity="0.95"
  >L</text>
</svg>
